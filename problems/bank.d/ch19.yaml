    structural_tags: ["topic2", "density", "normalizing-constant"]
    difficulty: 2
    statement: |
      A density f(x) = c x^2 on 0 < x < 3 (and 0 elsewhere). Find the constant c.
      (A) 1/27  (B) 1/9  (C) 1/3  (D) 2/9  (E) 1
    solution: |
      Integral of x^2 on (0,3) = 27/3 = 9, so c = 1/9.  Answer B.
    answer: "B (1/9)"
    shortcut_used: ["normalize: total area = 1"]
