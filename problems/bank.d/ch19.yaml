    outcomes: ["2d"]
    distributions: ["exponential"]
    structural_tags: ["topic2", "exponential", "memoryless"]
    difficulty: 2
    statement: |
      A fainted Pokemon's recovery time is Exponential(theta = 10) minutes. Given it
