    answer: "C (~0.549)"
    shortcut_used: ["exponential memorylessness: condition drops away"]
    verify: "abs(math.exp(-0.6) - 0.549) < 1e-3"

  - id: M1.17
    chapter: 19
    tier: mock
    outcomes: ["2d", "3i"]
    distributions: ["binomial", "normal"]
    structural_tags: ["topic2", "clt", "continuity-correction"]
    difficulty: 3
    statement: |
      The League runs 100 independent exhibition matches, each an upset with
      probability 0.3. Using the normal approximation WITH continuity correction,
      find P(at most 25 upsets). Use Phi(0.98) = 0.8365.
      (A) 0.115  (B) 0.137  (C) 0.163  (D) 0.211  (E) 0.250
    solution: |
      S~Bin(100,0.3): mu=30, sigma=sqrt(21)=4.583. Discrete => correct at 25.5:
      P(S<=25) ~ Phi((25.5-30)/4.583) = Phi(-0.98) = 1 - 0.8365 = 0.1635. Answer C.
    answer: "C (~0.163)"
    shortcut_used: ["CLT normal approx to binomial", "continuity correction +0.5"]
    verify: "abs((1 - 0.8365) - 0.1635) < 1e-9 and abs((25.5-30)/(21**0.5) + 0.98) < 1e-2"

  - id: M1.18
    chapter: 19
    tier: mock
    outcomes: ["2e", "2f"]
    distributions: ["exponential"]
    structural_tags: ["topic2", "deductible", "limit", "coinsurance"]
    difficulty: 4
    statement: |
      Loss X ~ Exponential(theta = 8) (thousands), ordinary deductible d = 2,
      maximum covered loss u = 10, coinsurance alpha = 0.8. Find the expected payment
      PER LOSS.  (Use e^{-0.25}=0.7788, e^{-1.25}=0.2865.)
      (A) 2.52  (B) 3.15  (C) 3.94  (D) 4.57  (E) 5.71
    solution: |
      E[X^u] uses E[X ^ m] = theta(1 - e^{-m/theta}).
      E[X^10] = 8(1 - e^{-1.25}) = 8(0.7135) = 5.708;
      E[X^2]  = 8(1 - e^{-0.25}) = 8(0.2212) = 1.770.
      Per-loss payment = alpha(E[X^10] - E[X^2]) = 0.8(3.938) = 3.151.  Answer B.
    answer: "B (~3.15)"
    shortcut_used: ["E[X ^ m] = theta(1-e^{-m/theta})", "payment = alpha(cap-deduct)"]
    verify: "abs(0.8*(8*(1-math.exp(-1.25)) - 8*(1-math.exp(-0.25))) - 3.15) < 1e-2"

  - id: M1.19
    chapter: 19
    tier: mock
    outcomes: ["2d"]
    distributions: ["poisson"]
    structural_tags: ["topic2", "poisson", "identity"]
    difficulty: 2
    statement: |
