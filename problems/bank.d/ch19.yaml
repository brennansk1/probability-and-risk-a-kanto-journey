      deviation of the daily visit count.
      (A) 1.5  (B) 3.0  (C) 4.5  (D) 9.0  (E) 81.0
    solution: |
      Poisson identity mu = sigma^2 = lambda = 9, so sigma = sqrt(9) = 3.  Answer B.
    answer: "B (3.0)"
    shortcut_used: ["Poisson mu = sigma^2 = lambda"]
    verify: "abs(9**0.5 - 3.0) < 1e-9"

  - id: M1.20
    chapter: 19
