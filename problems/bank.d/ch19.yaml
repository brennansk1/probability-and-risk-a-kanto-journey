# Problem bank — Chapter 19 (Indigo Plateau / the Championship = the exam):
# THREE full weight-matched mock exams. No new theory; this is execution under the
# clock. Outcomes: all (1a-1g, 2a-2f, 3a-3i).  Tier: mock.  Locale: Indigo Plateau
# (Gary, the rival, as the final opponent).  TIA: exam finale (not a TIA leaf).
#
# Blueprint (MASTER_PLAN_V3 §24): each mock = 30 questions / 3 hours / scored 0-10,
# weight-matched ~8 General (Topic 1) / ~14 Univariate (Topic 2) / ~8 Multivariate
# (Topic 3), five options A-E with exactly one correct, spanning every outcome and
# in-scope distribution at true SOA difficulty.
#
# Per-mock weight split (verified): Mock A (M1) 8/14/8; Mock B (M2) 8/14/8;
# Mock C (M3) 8/14/8.  Topic tag lives in structural_tags as "topic1|topic2|topic3".
#
# Schema per problem: id, chapter, tier (mock), outcomes, distributions,
# structural_tags, difficulty (1-5), statement (with options A-E), solution,
# answer (the correct letter + value), shortcut_used, verify.
#
# verify: a SELF-CONTAINED Python boolean the seed-151 harness can eval (exposes
# math, st=scipy.stats, and builtins incl. next/enumerate/zip). Each recomputes the
# numeric answer and checks the lettered option matches it. Normal-table problems
# use the Z-table 2-dp values the chapter prints (e.g. Phi(1.5)=0.9332).

problems:

  # =====================================================================
  # ============================ MOCK A (M1) ============================
  # =====================================================================

  # ---- Topic 1 — General Probability (8) ----

  - id: M1.1
    chapter: 19
    tier: mock
    outcomes: ["1a", "1d"]
    distributions: []
    structural_tags: ["topic1", "axioms", "complement"]
    difficulty: 2
    statement: |
      In a wild encounter, P(grass-type) = 0.5, P(bug-type) = 0.3, and
      P(grass and bug) = 0.2. Find P(neither grass nor bug).
      (A) 0.20  (B) 0.30  (C) 0.40  (D) 0.50  (E) 0.60
    solution: |
      Inclusion-exclusion: P(grass or bug) = 0.5 + 0.3 - 0.2 = 0.6, so
      P(neither) = 1 - 0.6 = 0.4.  Answer C.
    answer: "C (0.40)"
    shortcut_used: ["inclusion-exclusion", "complement"]
    verify: "abs((1 - (0.5 + 0.3 - 0.2)) - 0.40) < 1e-9"

  - id: M1.2
    chapter: 19
    tier: mock
    outcomes: ["1c", "1f"]
    distributions: []
    structural_tags: ["topic1", "bayes", "false-positive"]
    difficulty: 3
    statement: |
      A wild Pokemon is Ghost-type with prior 0.02. A scanner flags a true Ghost
      with probability 0.95 and false-flags a non-Ghost with probability 0.10. It
      just flagged one. Find P(Ghost | flagged).
      (A) 0.095  (B) 0.162  (C) 0.500  (D) 0.760  (E) 0.950
    solution: |
      Bayes: P(G|+) = .95(.02) / [.95(.02) + .10(.98)] = .0190/.1170 = 0.1624.
      Answer B.
    answer: "B (0.162)"
    shortcut_used: ["Bayes grid", "low base rate => posterior stays small"]
    verify: "abs((0.95*0.02)/(0.95*0.02 + 0.10*0.98) - 0.162) < 1e-3"

  - id: M1.3
    chapter: 19
    tier: mock
    outcomes: ["1b"]
    distributions: []
    structural_tags: ["topic1", "combinatorics", "permutation"]
    difficulty: 2
    statement: |
      From 8 caught Pokemon, how many distinct ORDERED battle line-ups of 3 can
      Ash field?
      (A) 56  (B) 112  (C) 168  (D) 336  (E) 512
    solution: |
      Ordered selection => permutation P(8,3) = 8*7*6 = 336.  Answer D.
    answer: "D (336)"
    shortcut_used: ["nPr = ordered count"]
    verify: "8*7*6 == 336"

  - id: M1.4
    chapter: 19
    tier: mock
    outcomes: ["1a", "1d"]
    distributions: []
    structural_tags: ["topic1", "equally-likely", "disjoint-union"]
    difficulty: 1
    statement: |
      Roll two fair six-sided dice at the Game Corner. Find P(sum = 7 or sum = 11).
      (A) 1/9  (B) 1/6  (C) 2/9  (D) 1/4  (E) 1/3
    solution: |
      Sum 7: 6 ways; sum 11: 2 ways; disjoint, over 36 => (6+2)/36 = 8/36 = 2/9.
      Answer C.
    answer: "C (2/9 ~ 0.2222)"
    shortcut_used: ["count favorable / 36", "disjoint events add"]
    verify: "abs((6+2)/36 - 2/9) < 1e-9"

  - id: M1.5
    chapter: 19
    tier: mock
    outcomes: ["1f", "1g"]
    distributions: []
    structural_tags: ["topic1", "independence"]
    difficulty: 2
    statement: |
      Three independent Poke Balls each catch with probability 0.4. Find the
      probability of AT LEAST ONE successful catch in three throws.
      (A) 0.216  (B) 0.400  (C) 0.640  (D) 0.784  (E) 0.936
    solution: |
      "At least one" of independent trials = 1 - P(none) = 1 - (0.6)^3
      = 1 - 0.216 = 0.784.  Answer D.
    answer: "D (0.784)"
    shortcut_used: ["at-least-one = 1 - (miss)^n"]
    verify: "abs((1 - 0.6**3) - 0.784) < 1e-9"

  - id: M1.6
    chapter: 19
    tier: mock
    outcomes: ["1c", "1e"]
    distributions: []
    structural_tags: ["topic1", "conditional", "total-probability"]
    difficulty: 3
    statement: |
      Route A holds 70% of Pokemon (10% of them rare); Route B holds 30%
      (25% of them rare). A captured Pokemon is rare. Find P(it came from Route B).
      (A) 0.30  (B) 0.42  (C) 0.52  (D) 0.58  (E) 0.75
    solution: |
      P(rare) = .7(.10) + .3(.25) = .07 + .075 = .145.
      P(B | rare) = .075/.145 = 0.5172.  Answer C.
    answer: "C (~0.52)"
    shortcut_used: ["total probability denominator", "Bayes"]
    verify: "abs((0.3*0.25)/(0.7*0.10 + 0.3*0.25) - 0.517) < 1e-3"

  - id: M1.7
    chapter: 19
    tier: mock
    outcomes: ["1d"]
    distributions: []
    structural_tags: ["topic1", "demorgan", "complement"]
    difficulty: 2
    statement: |
      An event A occurs with probability 0.6, B with 0.5, and at least one of them
      with 0.8. Find P(A and B).
      (A) 0.10  (B) 0.20  (C) 0.30  (D) 0.40  (E) 0.55
    solution: |
      P(A and B) = P(A) + P(B) - P(A or B) = 0.6 + 0.5 - 0.8 = 0.3.  Answer C.
    answer: "C (0.30)"
    shortcut_used: ["inclusion-exclusion solved for intersection"]
    verify: "abs((0.6 + 0.5 - 0.8) - 0.30) < 1e-9"

  - id: M1.8
