  - id: M1.21
    chapter: 19
    tier: mock
    outcomes: ["2c", "2d"]
    distributions: ["discrete_uniform"]
    structural_tags: ["topic2", "discrete-uniform", "variance"]
    difficulty: 2
    statement: |
      Ditto copies one of the forms numbered 1..6, each equally likely (discrete
      uniform). Find Var of the chosen number.
      (A) 2.50  (B) 2.92  (C) 3.50  (D) 5.83  (E) 17.5
    solution: |
      Discrete uniform on 1..n: Var = (n^2 - 1)/12 = (36-1)/12 = 35/12 = 2.9167.
