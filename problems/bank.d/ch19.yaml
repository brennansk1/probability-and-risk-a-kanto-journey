  # ---- Topic 2 — Univariate RVs (14) ----

  - id: M1.9
    chapter: 19
    tier: mock
    outcomes: ["2d"]
    distributions: ["poisson"]
    structural_tags: ["topic2", "poisson", "complement"]
    difficulty: 2
    statement: |
      On Route 1, Spearow swoop in at an average rate of 3 per minute (Poisson,
      independent). In one minute, find P(at least 2).
      (A) 0.199  (B) 0.423  (C) 0.577  (D) 0.801  (E) 0.950
    solution: |
      "Average rate per interval" => Poisson(3). "At least 2" => complement of
      {0,1}: 1 - e^-3 - 3e^-3 = 1 - 4e^-3 = 0.8009.  Answer D.
    answer: "D (~0.801)"
    shortcut_used: ["Poisson tell", "at-least via complement of low values"]
    verify: "abs((1 - 4*math.exp(-3)) - 0.801) < 1e-3"

  - id: M1.10
    chapter: 19
    tier: mock
    outcomes: ["2d", "2c"]
    distributions: ["gamma"]
    structural_tags: ["topic2", "gamma-kernel", "expectation"]
    difficulty: 3
    statement: |
      A Charizard's flame lasts X minutes with density f(x) = (1/16) x e^{-x/4},
      x > 0. Find E[X].
      (A) 2  (B) 4  (C) 6  (D) 8  (E) 16
    solution: |
      Density is proportional to x^{2-1} e^{-x/4} = Gamma(alpha=2, theta=4) kernel,
      so E[X] = alpha*theta = 2*4 = 8.  Answer D.
    answer: "D (8)"
    shortcut_used: ["gamma kernel recognition", "E = alpha*theta (no parts)"]
    verify: "abs(2*4 - 8) < 1e-9 and abs((1/(math.gamma(2)*4**2)) - 1/16) < 1e-9"

