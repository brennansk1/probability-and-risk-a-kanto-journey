  - id: M1.12
    chapter: 19
    tier: mock
    outcomes: ["2d"]
    distributions: ["normal"]
    structural_tags: ["topic2", "normal", "standardize"]
    difficulty: 2
    statement: |
      A psychic-power reading X is Normal(mu = 50, sigma^2 = 64). Using the Z-table,
      find P(X > 62).
      (A) 0.0668  (B) 0.0934  (C) 0.1056  (D) 0.1587  (E) 0.3085
    solution: |
      sigma = 8, z = (62-50)/8 = 1.5; P(X>62) = 1 - Phi(1.5) = 1 - 0.9332 = 0.0668.
      Answer A.
    answer: "A (0.0668)"
    shortcut_used: ["standardize by sigma (not sigma^2)", "upper tail = 1 - Phi"]
    verify: "abs((1 - 0.9332) - 0.0668) < 1e-9 and abs((62-50)/8 - 1.5) < 1e-9"

  - id: M1.13
