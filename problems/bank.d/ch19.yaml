  - id: M1.22
    chapter: 19
    tier: mock
    outcomes: ["2c"]
    distributions: []
    structural_tags: ["topic2", "survival-method", "darth-vader"]
    difficulty: 3
    statement: |
      A non-negative integer count X has survival values S(0)=1, S(1)=0.6,
      S(2)=0.3, S(3)=0.1, S(k>=4)=0. Find E[X] by the survival method.
      (A) 1.0  (B) 1.5  (C) 2.0  (D) 2.4  (E) 3.0
    solution: |
      E[X] = sum_{k>=0} S(k) ... but P(X>k): use S(k)=P(X>k). Here S(0)=P(X>0)=1?
      Take S(k)=P(X>k): E[X] = S(0)+S(1)+S(2)+S(3) treating these as P(X>k):
      = 1 + 0.6 + 0.3 + 0.1 = 2.0.  Answer C.
    answer: "C (2.0)"
    shortcut_used: ["E[X] = sum_{k>=0} P(X>k) for non-neg integer X"]
    verify: "abs((1 + 0.6 + 0.3 + 0.1) - 2.0) < 1e-9"

  # ---- Topic 3 — Multivariate RVs (8) ----

  - id: M1.23
    chapter: 19
    tier: mock
    outcomes: ["3a", "3b"]
    distributions: []
    structural_tags: ["topic3", "joint", "region-integral"]
    difficulty: 4
    statement: |
      (X,Y) has joint density f(x,y) = 2 on the triangle 0 < x < y < 1. Find
      P(Y < 2X).
      (A) 0.25  (B) 0.33  (C) 0.50  (D) 0.67  (E) 0.75
    solution: |
      Within 0<x<y<1, the sub-region y<2x. Split at x=1/2:
      int_0^{1/2} int_x^{2x} 2 dy dx + int_{1/2}^1 int_x^1 2 dy dx
      = int_0^{1/2} 2x dx + int_{1/2}^1 2(1-x) dx = 1/4 + 1/4 = 0.5.  Answer C.
    answer: "C (0.5)"
    shortcut_used: ["double integral over a region", "split limits at the corner"]
    verify: "abs((0.5**2) + ((2*1 - 1**2) - (2*0.5 - 0.5**2)) - 0.5) < 1e-9"

  - id: M1.24
    chapter: 19
    tier: mock
    outcomes: ["3f"]
    distributions: ["uniform"]
    structural_tags: ["topic3", "order-statistics", "maximum"]
    difficulty: 3
    statement: |
      Five independent challengers each have strength X_i ~ Uniform(0,1). Find the
      expected strength of the STRONGEST.
      (A) 0.50  (B) 0.625  (C) 0.75  (D) 0.833  (E) 0.90
    solution: |
      For Unif(0,1), F_max(x)=x^5, density 5x^4, E[max] = int_0^1 5x^5 dx
      = 5/6 = 0.8333. (Or n/(n+1) = 5/6.)  Answer D.
    answer: "D (~0.833)"
    shortcut_used: ["F_max = F^n", "E[max] of Unif(0,1) = n/(n+1)"]
    verify: "abs(5/6 - 0.8333) < 1e-3"

  - id: M1.25
    chapter: 19
    tier: mock
    outcomes: ["3c", "3e", "3g"]
    distributions: []
    structural_tags: ["topic3", "covariance", "linear-combination"]
    difficulty: 3
    statement: |
      For X, Y with Var(X)=4, Var(Y)=9, Corr(X,Y)=0.5, find Var(2X - Y).
      (A) 7  (B) 13  (C) 19  (D) 25  (E) 37
    solution: |
      Cov(X,Y) = 0.5*sqrt(4*9) = 3. Var(2X - Y) = 4Var(X) + Var(Y) - 2*2*Cov
      = 16 + 9 - 12 = 13.  Answer B.
    answer: "B (13)"
    shortcut_used: ["Cov = rho*sd*sd", "Var(aX+bY) = a^2Vx + b^2Vy + 2ab Cov"]
    verify: "abs(4*4 + 9 - 2*2*1*(0.5*math.sqrt(4*9)) - 13) < 1e-9"

  - id: M1.26
    chapter: 19
    tier: mock
    outcomes: ["3c", "3d"]
    distributions: []
    structural_tags: ["topic3", "conditional-expectation"]
    difficulty: 3
    statement: |
      X has density f(x) = x/8 on 0 < x < 4. Find E[X | X > 2].
      (A) 2.67  (B) 3.00  (C) 3.11  (D) 3.33  (E) 3.50
    solution: |
      P(X>2) = int_2^4 x/8 dx = (16-4)/16 = 0.75.
      int_2^4 x*(x/8) dx = (64-8)/24 = 56/24 = 2.3333.
      E[X|X>2] = 2.3333/0.75 = 3.111.  Answer C.
    answer: "C (~3.11)"
    shortcut_used: ["E[X|A] = E[X;A]/P(A)"]
    verify: "abs(((4**3-2**3)/24)/((4**2-2**2)/16) - 3.111) < 1e-3"

  - id: M1.27
    chapter: 19
    tier: mock
    outcomes: ["3e", "3g", "3i"]
    distributions: ["normal"]
    structural_tags: ["topic3", "sum-of-normals", "clt"]
    difficulty: 3
    statement: |
      Two teammates' contributions are independent: A ~ Normal(20, 16) and
      B ~ Normal(30, 9). Find P(A + B > 60). Use Phi(2.0) = 0.9772.
