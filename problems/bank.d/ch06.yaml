    narrative_hook: "Catching Gary remove a deductible with d*P(X>d) instead of the limited value."
    statement: |
      Gary prices a policy with deductible d=1 and maximum covered loss u=3 by
      capping the loss at 3, then computing E[X^3] - d*P(X>d) "to remove the
      deductible." Given E[X^3]=1.40, E[X^1]=0.70, and P(X>1)=0.45, find the
      CORRECT per-loss payment E[X^3]-E[X^1] and explain why Gary's shortcut is
      wrong.
    solution: |
      Correct layer between d=1 and u=3: E[X^3]-E[X^1] = 1.40-0.70 = 0.70.
      Gary's shortcut E[X^3] - d*P(X>d) = 1.40 - 1(0.45) = 0.95 is wrong:
      subtracting d*P(X>d) is not how a deductible removes the bottom of a capped
      loss. The deductible removes the limited value E[X^d]=E[X^1]=0.70, not
      d*P(X>d)=0.45. The correct covered layer is the difference of two limited
      expected values, 0.70.
    answer: "0.70; Gary's d*P(X>d) shortcut wrong"
    shortcut_used: ["layer = E[X^u] - E[X^d], NOT E[X^u] - d*P(X>d)"]
    verify: "abs((1.40 - 0.70) - 0.70) < 1e-9 and abs((1.40 - 1*0.45) - 0.95) < 1e-9"
