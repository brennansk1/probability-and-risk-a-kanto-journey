    statement: |
      For the Safari loss with survival S = 0.70,0.45,0.25,0.12,0.04,0, pmf
      p = 0.30,0.25,0.20,0.13,0.08,0.04 and E[X]=1.56, a policy has d=1, maximum
      covered loss u=4, coinsurance alpha=0.9. (a) Find E[X^4] and E[X^1].
      (b) Find the per-loss payment. (c) Find the per-payment payment.
      (d) Confirm E[X^4]+E[(X-4)+] = E[X].
    solution: |
      (a) E[X^4] = S(0)+S(1)+S(2)+S(3) = 0.70+0.45+0.25+0.12 = 1.52;
          E[X^1] = S(0) = 0.70.
      (b) Per loss: E[Y_L] = 0.9(1.52-0.70) = 0.9(0.82) = 0.738.
      (c) Per payment: a cheque is written iff X>1, so divide by P(X>1)=S(1)=0.45:
          E[Y_P] = 0.738 / 0.45 = 1.64.
      (d) E[(X-4)+] = (5-4)(0.04) = 0.04, and E[X^4]+E[(X-4)+] = 1.52+0.04 = 1.56
          = E[X]. Checks.
    answer: "E[X^4]=1.52, E[X^1]=0.70; per loss 0.738; per payment 1.64; identity 1.52+0.04=1.56"
    shortcut_used: ["E[Y_L]=alpha(E[X^u]-E[X^d])", "per payment = E[Y_L]/P(X>d)", "E[X^u]+E[(X-u)+]=E[X]"]
