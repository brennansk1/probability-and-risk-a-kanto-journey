    verify: "abs(0.75*1.56 - 1.17) < 1e-9"

  - id: C6.13
    chapter: 6
    tier: gym_battle
    archetype: rival_trap
    outcomes: ["2f"]
    distributions: []
    structural_tags: ["discrete", "per_payment"]
    provenance: original
    difficulty: 4
    actor: "Gary Oak"
    stakes: "Gary reads his per-loss figure as the size of an actual cheque and calls the policy barely worth it."
    consequence: "Confusing per-loss with per-payment understates the typical cheque fourfold."
    quest_step: 13
    tia_section: "A.6.3"
    narrative_hook: "Catching Gary quote the per-loss average as the size of an actual cheque."
    statement: |
      Gary buys the deductible-2 policy and crows: "My expected payment per loss is
      0.41, so when I file a claim I'll average a 0.41-thousand cheque." With
      P(X>2)=S(2)=0.25, find the true expected payment per payment and explain
      Gary's error.
    solution: |
      The 0.41 is the PER-LOSS average -- it already includes the 75% of flees that
      pay 0. The actual cheque is the PER-PAYMENT average:
      E[X-2 | X>2] = 0.41 / P(X>2) = 0.41 / 0.25 = 1.64. Gary's error: he read the
      per-loss figure (which averages over the zeros) as the typical cheque. The
      typical cheque is 1.64 thousand -- four times larger.
    answer: "1.64 (per payment); Gary confused per-loss with per-payment"
    shortcut_used: ["per payment = per loss / P(X>d)"]
    verify: "abs((0.41 / 0.25) - 1.64) < 1e-9"

  - id: C6.14
    chapter: 6
    tier: gym_battle
    archetype: standard
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "ordinary_deductible", "policy_limit"]
    provenance: original
    difficulty: 3
    actor: "the Safari Zone Warden"
    stakes: "She wants the cost of insuring only the layer between a deductible of 1 and a cap of 4."
    consequence: "The layer cost is the difference of two limited expected values."
    quest_step: 14
    tia_section: "A.6.2"
    narrative_hook: "The full covered layer between d=1 and u=4 at full coinsurance."
    statement: |
      For the Safari loss with pmf p = 0.30,0.25,0.20,0.13,0.08,0.04, a policy pays
      the layer between d=1 and u=4 at full coinsurance (alpha=1). Find the expected
      payment per loss, E[X^4]-E[X^1].
    solution: |
      E[X^4]-E[X^1] = 1.52 - 0.70 = 0.82. (Direct: min(k,4)-min(k,1)
      = 0,0,1,2,3,3, so 1(0.20)+2(0.13)+3(0.08)+3(0.04) = 0.20+0.26+0.24+0.12
      = 0.82.)
    answer: 0.82
    shortcut_used: ["layer = E[X^u] - E[X^d]"]
    verify: "(lambda p:abs(sum((min(k,4)-min(k,1))*p[k] for k in range(6)) - 0.82) < 1e-9)([0.30,0.25,0.20,0.13,0.08,0.04])"

  - id: C6.15
    chapter: 6
    tier: gym_battle
    archetype: decision
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "ordinary_deductible", "policy_limit"]
    provenance: original
    difficulty: 4
    actor: "the Safari Zone Warden"
    stakes: "She must pick the cheaper of a deductible plan and a low-cap plan for the same loss."
    consequence: "Choosing the costlier plan over-charges the reserve for the same coverage promise."
    quest_step: 15
    tia_section: "A.6.1-A.6.2"
    narrative_hook: "Comparing a deductible plan against a low-cap plan for insurer cost."
    statement: |
      The Warden must choose one plan for the loss X (survival S = 0.70,0.45,0.25,
      0.12,0.04,0). Plan A: deductible d=2, no limit, alpha=1. Plan B: no
      deductible, maximum covered loss u=2, alpha=1. Compute the expected payment
      per loss for each and recommend the cheaper plan.
    solution: |
      Plan A: E[(X-2)+] = S(2)+S(3)+S(4) = 0.25+0.12+0.04 = 0.41.
      Plan B: E[X^2] = S(0)+S(1) = 0.70+0.45 = 1.15.
      Plan A costs 0.41 per flee, Plan B costs 1.15. Recommend Plan A: the
      deductible (trainer absorbs the bottom) is far cheaper than a low cap (still
      pays on every flee).
    answer: "A 0.41, B 1.15; choose A"
    shortcut_used: ["E[(X-d)+] = sum_{k>=d} S(k)", "E[X^u] = sum_{k=0}^{u-1} S(k)"]
    verify: "(lambda S:abs((S[2]+S[3]+S[4]) - 0.41) < 1e-9 and abs((S[0]+S[1]) - 1.15) < 1e-9 and (S[2]+S[3]+S[4]) < (S[0]+S[1]))([0.70,0.45,0.25,0.12,0.04,0.0])"

  - id: C6.16
    chapter: 6
    tier: gym_battle
    archetype: audit
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "ordinary_deductible"]
    provenance: original
    difficulty: 2
    actor: "a Safari apprentice"
    stakes: "The apprentice records the per-loss payment as E[X]-d, a negative number."
    consequence: "Subtracting the deductible from the mean yields a nonsensical negative payout."
    quest_step: 16
    tia_section: "A.6.1"
    narrative_hook: "Catching the mean-minus-deductible error that produces a negative payment."
    statement: |
      An apprentice records "deductible d=2, so expected per-loss payment
      = E[X]-d = 1.56-2 = -0.44." For the Safari loss with survival S = 0.70,0.45,
      0.25,0.12,0.04,0, find the true per-loss payment and name the error.
    solution: |
      True payment: E[(X-2)+] = S(2)+S(3)+S(4) = 0.25+0.12+0.04 = 0.41. The error:
      E[X]-d = -0.44 assumes every loss clears the deductible, giving an impossible
      negative payment. Losses of 0,1,2 pay 0, not a negative amount; you must floor
      at zero before averaging. True payment 0.41.
    answer: "0.41 (not -0.44)"
    shortcut_used: ["E[(X-d)+] = sum_{k>=d} S(k), NOT E[X]-d"]
    verify: "(lambda S:abs((S[2]+S[3]+S[4]) - 0.41) < 1e-9 and abs((1.56-2) - (-0.44)) < 1e-9)([0.70,0.45,0.25,0.12,0.04,0.0])"

