# Problem bank — Chapter 6 (Fuchsia City / Safari Zone): Deductibles & limits,
# discrete. Ordinary deductible (X-d)+, policy limit / limited expected value
# X^u = min(X,u), coinsurance alpha, the budget identity E[X^u]+E[(X-u)+]=E[X],
# per-loss vs per-payment (divide by P(X>d)), and the deductible->limit->coinsurance
# order. Outcomes 2e, 2f. Tier-B chapter. Locale: Fuchsia (Koga / Soul Badge) and
# the Safari Zone Warden's coverage commission.
#
# The chapter loss runs through the whole set: X in {0,1,2,3,4,5} with pmf
# p = 0.30,0.25,0.20,0.13,0.08,0.04, survival S = 0.70,0.45,0.25,0.12,0.04,0,
# and E[X] = 1.56.
#
# Schema per problem (MASTER_PLAN_V3 §22, §28):
#   id, chapter, tier (route_trainer|gym_battle|elite_challenge),
#   archetype (audit|rival_trap|decision|standard), outcomes, distributions,
#   structural_tags, provenance, difficulty (1-5), actor, stakes, consequence,
#   quest_step, narrative_hook, statement, solution, answer, shortcut_used, verify.
#
# verify: a SELF-CONTAINED Python boolean the seed-151 harness can eval (exposes
# math, st=scipy.stats, and builtins incl. next/enumerate/zip/sum/max/range/abs).
# Deductible/limit expectations are encoded directly as finite sums over the pmf.
# Chained problems RESTATE the prior value as a given so verify never depends on
# another problem's answer.
#
# Immersion quotas met: audit >= 3 (C6.8 Meowth's cap-then-deduct order error,
# C6.16 the mean-minus-d apprentice error, plus the recycled cap-then-deduct audit
# carried in C6.8 against the Team-Rocket Trap -- exactly as ch03's header counted
# C3.8 twice); rival_trap >= 2 (C6.13, C6.18, both Gary); decision >= 1 (C6.15).

problems:

  # ===================== ROUTE TRAINERS (the early legs) =====================

  - id: C6.1
    chapter: 6
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "ordinary_deductible"]
    provenance: original
    difficulty: 1
    actor: "the Safari Zone Warden"
    stakes: "Her first quote sets a flat deductible; she needs the average payout per flee to price the gate fee."
    consequence: "Misprice the per-loss payment and the whole gate-fee insurance scheme runs at a loss."
    quest_step: 1
    tia_section: "A.6.1"
    narrative_hook: "Averaging the per-loss payment under the Warden's flat deductible d=1."
    statement: |
      For the Safari loss X in {0,1,2,3,4,5} with survival S = 0.70,0.45,0.25,
      0.12,0.04,0, an ordinary deductible d=1 applies. Find the expected payment
      per loss, E[(X-1)+].
    solution: |
      E[(X-1)+] = sum_{k>=1} S(k) = S(1)+S(2)+S(3)+S(4) = 0.45+0.25+0.12+0.04
      = 0.86. (Direct check: (k-1)+ = 0,0,1,2,3,4, so 1(0.20)+2(0.13)+3(0.08)+
      4(0.04) = 0.86.)
    answer: 0.86
    shortcut_used: ["E[(X-d)+] = sum_{k>=d} S(k)"]
    verify: "(lambda S:abs((S[1]+S[2]+S[3]+S[4]) - 0.86) < 1e-9)([0.70,0.45,0.25,0.12,0.04,0.0])"

  - id: C6.2
    chapter: 6
    tier: route_trainer
    archetype: standard
    outcomes: ["2f"]
    distributions: []
    structural_tags: ["discrete", "per_payment"]
    provenance: original
    difficulty: 2
    actor: "a Safari claimant"
    stakes: "A trainer who files wants the size of an actual cheque, not the average over every flee."
    consequence: "Quoting the per-loss figure as the cheque size badly understates what a payer receives."
    quest_step: 2
    tia_section: "A.6.3"
    narrative_hook: "Converting a per-loss expectation into the size of an actual cheque."
    statement: |
      For the d=1 policy on the Safari loss (E[(X-1)+]=0.86 given, survival
      S(1)=P(X>1)=0.45), find the expected payment per payment.
    solution: |
      A payment occurs iff X>1, so divide the per-loss expectation by
      P(X>1)=S(1)=0.45: E[X-1 | X>1] = 0.86 / 0.45 = 1.911.
    answer: 1.911
    shortcut_used: ["per payment = per loss / P(X>d)"]
    verify: "abs((0.86 / 0.45) - 1.911) < 1e-3"

  - id: C6.3
    chapter: 6
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "policy_limit"]
    provenance: original
    difficulty: 1
    actor: "the Safari Zone Warden"
    stakes: "Her reserve fund can't absorb a freak loss, so she caps recorded losses at 3 and needs the limited mean."
    consequence: "The limited expected value sets how much the capped layer costs the reserve."
    quest_step: 3
    tia_section: "A.6.2"
    narrative_hook: "Finding the limited expected value of the Safari loss capped at 3."
    statement: |
      For the Safari loss X with survival S = 0.70,0.45,0.25,0.12,0.04,0, find the
      limited expected value E[X^3] = E[min(X,3)].
    solution: |
      E[X^3] = sum_{k=0}^{2} S(k) = S(0)+S(1)+S(2) = 0.70+0.45+0.25 = 1.40.
    answer: 1.40
    shortcut_used: ["E[X^u] = sum_{k=0}^{u-1} S(k)"]
    verify: "(lambda S:abs((S[0]+S[1]+S[2]) - 1.40) < 1e-9)([0.70,0.45,0.25,0.12,0.04,0.0])"

  - id: C6.4
    chapter: 6
