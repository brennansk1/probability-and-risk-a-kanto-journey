  - id: C6.5
    chapter: 6
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "ordinary_deductible", "policy_limit", "coinsurance"]
    provenance: original
    difficulty: 2
    actor: "the Safari Zone Warden"
    stakes: "Her trial policy stacks a deductible, a cap, and coinsurance; she needs the full per-loss payment."
    consequence: "The scaled covered-layer figure is the number the gate fee is built on."
    quest_step: 5
    tia_section: "A.6.2"
    narrative_hook: "Assembling a full policy: deductible, limit, and coinsurance in order."
    statement: |
      A policy has deductible d=1, maximum covered loss u=3, coinsurance
      alpha=0.9. Given E[X^3]=1.40 and E[X^1]=0.70, find the expected payment
      per loss.
    solution: |
      Full policy: E[Y_L] = alpha (E[X^u] - E[X^d]) = 0.9(1.40 - 0.70)
      = 0.9(0.70) = 0.63.
    answer: 0.63
    shortcut_used: ["E[Y_L] = alpha (E[X^u] - E[X^d])"]
    verify: "abs(0.9*(1.40 - 0.70) - 0.63) < 1e-9"

  - id: C6.6
    chapter: 6
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: ["discrete_uniform"]
    structural_tags: ["discrete", "ordinary_deductible"]
    provenance: original
    difficulty: 2
    actor: "the Safari Zone Warden"
    stakes: "A different critter's gear-loss is uniform; she needs the deductible payout on it too."
    consequence: "A uniform loss must run through the same floor-at-zero machinery as the main loss."
    quest_step: 6
    tia_section: "A.6.1"
    narrative_hook: "Applying an ordinary deductible to a discrete-uniform loss."
    statement: |
      A loss Y is discrete uniform on {0,1,2,3,4} (each w.p. 0.2). With deductible
      d=2, find the expected payment per loss, E[(Y-2)+].
    solution: |
      (Y-2)+ = 0,0,0,1,2 across the five values, so E[(Y-2)+] = 1(0.2)+2(0.2)
      = 0.2+0.4 = 0.60.
    answer: 0.60
    shortcut_used: ["E[(Y-d)+] = sum (k-d)+ p(k)"]
    verify: "(lambda k:abs(sum(max(x-2,0)*0.2 for x in k) - 0.60) < 1e-9)([0,1,2,3,4])"

  - id: C6.7
    chapter: 6
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "budget_identity"]
    provenance: original
    difficulty: 2
    actor: "the Safari Zone Warden"
    stakes: "She already has E[X] and a limited value and wants the excess without grinding a new sum."
    consequence: "The budget identity hands over the third value for free -- a one-line short-circuit."
    quest_step: 7
    tia_section: "A.6.2"
    narrative_hook: "Getting the expected excess for free via the budget identity."
    statement: |
      Given E[X]=1.56 and E[X^4]=1.52 for the Safari loss, find the expected
      excess E[(X-4)+] using the budget identity.
    solution: |
      Budget identity: E[X^u] + E[(X-u)+] = E[X], so E[(X-4)+] = E[X] - E[X^4]
      = 1.56 - 1.52 = 0.04. No new sum needed.
    answer: 0.04
    shortcut_used: ["E[(X-u)+] = E[X] - E[X^u]"]
    verify: "abs((1.56 - 1.52) - 0.04) < 1e-9"

  # ===================== GYM BATTLES (the boss fight) =====================

  - id: C6.8
    chapter: 6
    tier: gym_battle
    archetype: audit
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "ordinary_deductible", "payment_limit", "order_of_operations"]
    provenance: original
    difficulty: 3
    actor: "Team Rocket (Meowth)"
    stakes: "Meowth's knock-off policy claims it pays 0 per flee, so the team collects gate fees free."
    consequence: "Capping the loss before the deductible wrongly zeros the payout and misprices the scam cover."
    quest_step: 8
    tia_section: "A.6.1-A.6.2"
    narrative_hook: "Catching Meowth apply the deductible after a payment cap instead of before."
    statement: |
      Team Rocket's policy has deductible d=2 and a maximum PAYMENT of u=2. Meowth
      caps the loss at 2 first, then subtracts the deductible, and declares "the
      policy pays 0 per flee." With the Safari pmf p = 0.30,0.25,0.20,0.13,0.08,
      0.04, find the CORRECT expected payment per loss (deductible first, then cap
      the payment) and name Meowth's error.
    solution: |
      Correct order is deductible first, then cap the PAYMENT at u=2:
      payment = min((X-2)+, 2). The values (X-2)+ = 0,0,0,1,2,3 capped at 2 give
      0,0,0,1,2,2, so E[Y_L] = 1(0.13)+2(0.08)+2(0.04) = 0.13+0.16+0.08 = 0.37.
      Meowth's error: he capped the LOSS at 2 first (min(X,2)=0,1,2,2,2,2), then
      subtracted the deductible and floored, getting 0 for every loss. Deductible
      must come BEFORE the payment cap; the true per-loss payment is 0.37, not 0.
    answer: "0.37 (not 0)"
    shortcut_used: ["payment = min((X-d)+, u): deductible BEFORE the payment cap"]
    verify: "(lambda p:abs(sum(min(max(k-2,0),2)*p[k] for k in range(6)) - 0.37) < 1e-9)([0.30,0.25,0.20,0.13,0.08,0.04])"

