    quest_step: 10
    tia_section: "A.6.3"
    narrative_hook: "Per-payment under a full policy -- dividing by P(X>d), not P(X>u)."
    statement: |
      For the policy in C6.9 (d=2, E[Y_L]=0.296 given), find the expected payment
      per payment. Use the deductible's probability P(X>2)=S(2)=0.25.
    solution: |
      A cheque is written iff X>d=2, so divide by P(X>2)=S(2)=0.25 (the deductible,
      NOT the limit): E[Y_P] = 0.296 / 0.25 = 1.184.
    answer: 1.184
    shortcut_used: ["per payment = E[Y_L] / P(X>d)"]
    verify: "abs((0.296 / 0.25) - 1.184) < 1e-9"

  - id: C6.11
    chapter: 6
    tier: gym_battle
    archetype: standard
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["discrete", "ordinary_deductible", "policy_limit"]
    provenance: original
    difficulty: 4
    actor: "the Pokedex Actuary Mode"
    stakes: "You must show the limited-value layer equals the direct LOTUS sum, both roads agreeing."
    consequence: "A mismatch between the two roads would flag a bookkeeping slip in the layer."
    quest_step: 11
    tia_section: "A.6.1-A.6.2"
    narrative_hook: "The covered layer between d and u, computed two equal ways."
    statement: |
      For the Safari loss with pmf p = 0.30,0.25,0.20,0.13,0.08,0.04, deductible
      d=2 and maximum covered loss u=4 (no coinsurance), find the per-loss payment
      E[X^4]-E[X^2], and verify it equals the direct sum
      sum_k (min(k,4)-min(k,2)) p(k).
    solution: |
      Via limited values: E[X^4]-E[X^2] = 1.52 - 1.15 = 0.37. Direct sum:
      min(k,4)-min(k,2) = 0,0,0,1,2,2, so 1(0.13)+2(0.08)+2(0.04)
      = 0.13+0.16+0.08 = 0.37. Both roads agree.
    answer: "0.37 (both roads)"
    shortcut_used: ["covered layer = E[X^u] - E[X^d] = sum (min(k,u)-min(k,d)) p(k)"]
    verify: "(lambda p:abs(sum((min(k,4)-min(k,2))*p[k] for k in range(6)) - 0.37) < 1e-9)([0.30,0.25,0.20,0.13,0.08,0.04])"

  - id: C6.12
    chapter: 6
