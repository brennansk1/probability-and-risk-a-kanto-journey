  - id: C10.19
    chapter: 10
    tier: elite_challenge
    archetype: standard
    outcomes: ["2c"]
    distributions: ["continuous", "exponential"]
    provenance: original
    difficulty: 4
    actor: "a Silph Co. senior actuary"
    stakes: "A survival-given severity is rescaled; she needs the full transformed moments."
    consequence: "A wrong transformed variance misprices the layered cover."
    quest_step: 20
    tia_section: "B.2.1-B.2.3"
    narrative_hook: "Survival mean, then a scale transform on mean and variance together."
    statement: |
      A non-negative loss has S(x) = e^{-x/4}, x >= 0. (a) Find E[X] by the survival
      method. (b) If Y = 3X, find E[Y]. (c) Given additionally E[X^2]=32, find Var(Y).
    solution: |
      (a) E[X] = int_0^inf e^{-x/4} dx = 4. (b) E[Y] = 3 E[X] = 12.
      (c) Var(X) = E[X^2] - (E[X])^2 = 32 - 16 = 16; Var(Y) = 3^2 Var(X) = 9(16) = 144.
    answer: "4; 12; 144"
    shortcut_used: ["E[X]=int S", "E[aX]=aE[X]", "Var(aX)=a^2 Var(X)"]
    verify: "abs(__import__('scipy.integrate', fromlist=['quad']).quad(lambda x: __import__('math').exp(-x/4), 0, 1e4)[0] - 4) < 1e-3 and abs((3*4) - 12) < 1e-9 and abs((9*(32-16)) - 144) < 1e-9"

  - id: C10.20
    chapter: 10
    tier: elite_challenge
    archetype: standard
    outcomes: ["2c"]
    distributions: ["continuous"]
    provenance: original
    difficulty: 4
    actor: "a Silph Co. senior actuary"
    stakes: "She demands the same mean computed two independent ways as a consistency check."
    consequence: "If the two roads disagree, a moment was mis-integrated."
    quest_step: 21
    tia_section: "B.2.1-B.2.3"
    narrative_hook: "Two roads to one mean: density integral vs survival integral, must agree."
    statement: |
      For f(x) = (3/8) x^2 on [0,2], its survival is S(x) = 1 - x^3/8 on [0,2]. Find
      E[X] both by int_0^2 x f(x) dx and by int_0^2 S(x) dx, and confirm they agree.
    solution: |
      Density road: int_0^2 x (3/8) x^2 dx = (3/8)(16/4) = 1.5.
      Survival road: int_0^2 (1 - x^3/8) dx = 2 - (1/8)(16/4) = 2 - 0.5 = 1.5. Agree.
    answer: "1.5 both ways"
    shortcut_used: ["E[X]=int x f", "E[X]=int_0^b S dx"]
    verify: "abs(((3/8)*(16/4)) - 1.5) < 1e-9 and abs((2 - (1/8)*(16/4)) - 1.5) < 1e-9"

  - id: C10.21
    chapter: 10
    tier: elite_challenge
    archetype: decision
    outcomes: ["2c", "2d"]
    distributions: ["mixture", "exponential"]
    provenance: original
    difficulty: 5
    actor: "a Silph Co. pricing committee"
    stakes: "A deductible creates an atom of zero-payouts; pricing off the full mean is wrong."
    consequence: "Pricing the deductible policy at the full $8k mean overcharges by ~$5k per policy."
    quest_step: 22
    tia_section: "B.2.2-B.2.3"
    narrative_hook: "Decision: a deductible's atom drags the expected payment far below the full mean."
    statement: |
      A loss is exponential with mean 8. A policy pays the loss minus an $8k deductible,
      0 if the loss is smaller. Given E[(X-8)_+] = int_8^inf e^{-x/8} dx, find the
      expected payment, and decide: is pricing off the full mean ($8k) too high or too
      low, and by how much?
    solution: |
      E[(X-8)_+] = int_8^inf e^{-x/8} dx = [-8 e^{-x/8}]_8^inf = 8 e^{-1} ~ 2.943.
      Decision: pricing off the full mean $8k is far too HIGH -- the deductible creates
      an atom of zero-payouts (about 63% of losses pay nothing), so the expected
      payment is only ~$2.94k. Pricing at $8k overstates it by about $5.06k per policy.
    answer: "~2.94; full mean too high by ~5.06"
    shortcut_used: ["E[(X-d)_+]=int_d^inf S dx", "deductible atom drags payment down"]
    verify: "abs(__import__('scipy.integrate', fromlist=['quad']).quad(lambda x: __import__('math').exp(-x/8), 8, 1e4)[0] - 8*__import__('math').exp(-1)) < 1e-3 and (8*__import__('math').exp(-1) < 8)"

  - id: C10.23
    chapter: 10
    tier: elite_challenge
    archetype: rival_trap
    outcomes: ["2c"]
    distributions: ["continuous"]
    provenance: original
    difficulty: 3
    actor: "Gary (rival)"
    stakes: "Gary doubles every payout and forgets to square the scale in the variance."
    consequence: "Reporting Var=18 instead of 36 halves the apparent risk."
    quest_step: 23
    tia_section: "B.2.1"
    narrative_hook: "Rival trap: a scale multiplies the variance by a^2, not a (continuous)."
    statement: |
      A continuous severity has Var(X)=9. Gary doubles every payout, Y=2X, and says
      "the variance just doubles too, so Var(Y)=18." Find the true Var(Y) and name
      Gary's error.
    solution: |
      Var(2X) = 2^2 Var(X) = 4(9) = 36, not 18. Gary's error: a scale factor a
      multiplies the variance by a^2, not by a -- he doubled when he should have
      multiplied by four.
    answer: "Var(Y)=36 (Gary forgot the square)"
    shortcut_used: ["Var(aX)=a^2 Var(X)"]
    verify: "abs((4*9) - 36) < 1e-9 and (36 != 18)"
