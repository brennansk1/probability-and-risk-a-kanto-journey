    quest_step: 7
    tia_section: "B.5.1"
    narrative_hook: "Getting the expected excess for free via the master identity."
    statement: |
      Given E[X]=10 and E[X^8]=10(1-e^{-0.8})~=5.507 for X ~ Exp(10), find the
      expected excess E[(X-8)+] using the master identity.
    solution: |
      Master identity: E[X^u] + E[(X-u)+] = E[X], so E[(X-8)+] = E[X] - E[X^8]
      = 10 - 5.507 = 4.493. (Direct check: 10 e^{-0.8} ~= 4.493.)
    answer: 4.493
    shortcut_used: ["E[(X-u)+] = E[X] - E[X^u]"]
    verify: "abs((10 - 10*(1-math.exp(-0.8))) - 10*math.exp(-0.8)) < 1e-9"

  # ===================== GYM BATTLES (the boss fight) =====================

  - id: C13.8
    chapter: 13
    tier: gym_battle
    archetype: audit
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "ordinary_deductible", "payment_limit", "order_of_operations"]
    provenance: original
    difficulty: 4
    actor: "Team Rocket (Meowth)"
    stakes: "Meowth's knock-off policy claims it pays 0 per event, so the team collects fees free."
    consequence: "Capping the loss before the deductible wrongly zeros the payout and misprices the scam cover."
    quest_step: 8
    tia_section: "B.5.1-B.5.2"
    narrative_hook: "Catching Meowth apply the deductible after a payment cap instead of before."
    statement: |
      Team Rocket's policy on X ~ Exp(theta=10) has deductible d=4 and a maximum
      PAYMENT of u=4. Meowth caps the loss at 4 first, then subtracts the deductible,
      and declares "the policy pays 0." Find the CORRECT expected payment per loss,
      E[min((X-4)+, 4)] (deductible first, then cap the payment), and name the error.
    solution: |
      Correct order is deductible first, then cap the PAYMENT at 4:
      E[min((X-4)+, 4)] = int_4^8 (x-4)(1/10)e^{-x/10} dx + 4 int_8^inf (1/10)e^{-x/10} dx
      = theta(e^{-d/theta} - e^{-(d+c)/theta}) with d=4, c=4
      = 10(e^{-0.4} - e^{-0.8}) ~= 2.210. Meowth's error: he capped the LOSS at 4
      first (min(X,4)), then subtracted the deductible and floored, getting 0 for
      every loss. Deductible must come BEFORE the payment cap; the true per-loss
      payment is ~2.21, not 0.
    answer: "2.21 (not 0)"
    shortcut_used: ["E[min((X-d)+, c)] = theta(e^{-d/theta} - e^{-(d+c)/theta}) for Exp", "deductible BEFORE the payment cap"]
    verify: "abs(10*(math.exp(-0.4) - math.exp(-0.8)) - 2.210) < 1e-3"

  - id: C13.9
    chapter: 13
    tier: gym_battle
    archetype: standard
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "ordinary_deductible", "policy_limit", "coinsurance"]
    provenance: original
    difficulty: 3
    actor: "Professor Oak"
    stakes: "The sign-off policy stacks all three modifications; Oak wants the per-loss payment in one pass."
    consequence: "Falter on the deductible->limit->coinsurance order and the Lab stays uninsured."
    quest_step: 9
    tia_section: "B.5.1"
    narrative_hook: "The full Cinnabar policy: per-loss payment from two limited values (calculus road)."
    statement: |
      The sign-off policy on X ~ Exp(theta=10) has d=4, maximum covered loss u=12,
      coinsurance alpha=0.8. Given E[X^12]=6.988 and E[X^4]=3.297, find the expected
      payment per loss.
    solution: |
      E[Y_L] = alpha (E[X^12] - E[X^4]) = 0.8(6.988 - 3.297) = 0.8(3.691) = 2.953.
    answer: 2.953
    shortcut_used: ["E[Y_L] = alpha (E[X^u] - E[X^d])"]
    verify: "abs(0.8*(6.988 - 3.297) - 2.953) < 1e-3"

  - id: C13.10
    chapter: 13
