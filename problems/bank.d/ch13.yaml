# Problem bank — Chapter 13 (Cinnabar Lab): Continuous deductibles & review.
# Ordinary deductible (X-d)+, policy limit / limited expected value X^u = min(X,u),
# coinsurance alpha, inflation (1+r), the master identity E[X^u]+E[(X-u)+]=E[X],
# per-loss vs per-payment (divide by S(d)=P(X>d)), the exponential memoryless
# shortcut, and the TWO roads (calculus survival-integral vs cases density-split).
# Outcomes 2e, 2f. Tier-B chapter. Locale: Cinnabar Lab (Oak's coverage commission;
# Blaine's Volcano Badge waits for ch14). This is the CONTINUOUS twin of ch06.
#
# The headline loss runs through the set: X ~ Exp(theta=10), S(x)=e^{-x/10},
# E[X]=10. A second loss W has density f(w)=w/50 on [0,10], S(w)=1-w^2/100,
# E[W]=20/3, to exercise the cases approach on a non-exponential density. A third,
# V ~ Unif(0,20), exercises the calculus road on a clean non-exponential survival.
#
# Schema per problem (MASTER_PLAN_V3 §22, §28):
#   id, chapter, tier (route_trainer|gym_battle|elite_challenge),
#   archetype (audit|rival_trap|decision|standard), outcomes, distributions,
#   structural_tags, provenance, difficulty (1-5), actor, stakes, consequence,
#   quest_step, tia_section, narrative_hook, statement, solution, answer,
#   shortcut_used, verify.
#
# verify: a SELF-CONTAINED Python boolean the seed-151 harness can eval (exposes
# math, st=scipy.stats, and builtins incl. next/enumerate/zip/sum/max/range/abs).
# Continuous expectations are encoded as closed-form survival integrals (e.g.
# theta*e^{-d/theta}, theta*(1-e^{-u/theta})) or exact polynomial antiderivatives.
# Chained problems RESTATE the prior value as a given so verify never depends on
# another problem's answer.
#
# Immersion quotas met: audit >= 3 (C13.8 Meowth's cap-then-deduct order error,
# C13.16 the mean-minus-d apprentice error, C13.19 the wrong-divisor per-payment
# error); rival_trap >= 2 (C13.13, C13.18, both Gary); decision >= 1 (C13.15).
# Tags used: exponential, uniform, continuous.

problems:

  # ===================== ROUTE TRAINERS (the early legs) =====================

  - id: C13.1
    chapter: 13
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "ordinary_deductible", "calculus_approach"]
    provenance: original
    difficulty: 2
    actor: "Professor Oak"
    stakes: "The Lab's first quote sets a flat deductible on the volcano loss; Oak needs the average payout per event."
    consequence: "Misprice the per-loss payment and the whole Cinnabar coverage scheme runs at a loss."
    quest_step: 1
    tia_section: "B.5.1"
    narrative_hook: "Averaging the per-loss payment via the survival integral under a flat deductible d=3."
    statement: |
      The Cinnabar volcano loss is X ~ Exp(theta=10), so S(x)=e^{-x/10}. An ordinary
      deductible d=3 applies (no limit, no coinsurance). Find the expected payment
      per loss, E[(X-3)+] = integral_3^inf S(x) dx.
    solution: |
      Calculus road: E[(X-3)+] = int_3^inf e^{-x/10} dx = [-10 e^{-x/10}]_3^inf
      = 10 e^{-0.3} ~= 7.408. (Memoryless check: theta e^{-d/theta} = 10 e^{-0.3}.)
    answer: 7.408
    shortcut_used: ["E[(X-d)+] = int_d^inf S(x) dx", "exponential: theta e^{-d/theta}"]
    verify: "abs(10*math.exp(-0.3) - 7.408) < 1e-3"

  - id: C13.2
    chapter: 13
    tier: route_trainer
    archetype: standard
    outcomes: ["2f"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "per_payment", "memoryless"]
    provenance: original
    difficulty: 2
    actor: "a Lab claimant"
    stakes: "A researcher who files wants the size of an actual cheque, not the average over every event."
    consequence: "Quoting the per-loss figure as the cheque size badly understates what a payer receives."
    quest_step: 2
    tia_section: "B.5.2"
    narrative_hook: "Converting a per-loss expectation into the size of an actual cheque via memorylessness."
    statement: |
      For the d=3 policy on X ~ Exp(theta=10), find the expected payment per
      payment. (The conditional excess (X-3 | X>3) is a fresh Exp(10).)
    solution: |
      By memorylessness, (X-3 | X>3) ~ Exp(10), so E[X-3 | X>3] = theta = 10.
      Equivalently E[(X-3)+]/S(3) = (10 e^{-0.3})/e^{-0.3} = 10.
    answer: 10.0
    shortcut_used: ["memoryless exponential per payment = theta", "per payment = per loss / S(d)"]
    verify: "abs((10*math.exp(-0.3))/math.exp(-0.3) - 10.0) < 1e-9"

  - id: C13.3
    chapter: 13
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "policy_limit", "calculus_approach"]
    provenance: original
    difficulty: 2
    actor: "Professor Oak"
    stakes: "The Lab's reserve can't absorb a freak eruption, so it caps recorded losses at 8 and needs the limited mean."
    consequence: "The limited expected value sets how much the capped layer costs the reserve."
    quest_step: 3
    tia_section: "B.5.1"
    narrative_hook: "Limited expected value of the exponential loss capped at 8, via the survival integral."
    statement: |
      For X ~ Exp(theta=10), find the limited expected value
      E[X ^ 8] = E[min(X,8)] = integral_0^8 S(x) dx with S(x)=e^{-x/10}.
    solution: |
      E[X^8] = int_0^8 e^{-x/10} dx = [-10 e^{-x/10}]_0^8 = 10(1 - e^{-0.8})
      ~= 5.507.
    answer: 5.507
    shortcut_used: ["E[X^u] = int_0^u S(x) dx", "exponential: theta(1-e^{-u/theta})"]
    verify: "abs(10*(1-math.exp(-0.8)) - 5.507) < 1e-3"

  - id: C13.4
    chapter: 13
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: ["uniform"]
    structural_tags: ["continuous", "uniform", "ordinary_deductible", "calculus_approach"]
    provenance: original
    difficulty: 2
    actor: "Professor Oak"
    stakes: "A different instrument's damage is uniform; Oak needs the deductible payout on it too."
    consequence: "A uniform loss must run through the same survival-area machinery as the exponential loss."
    quest_step: 4
    tia_section: "B.5.1"
    narrative_hook: "Applying an ordinary deductible to a continuous-uniform loss via the survival integral."
    statement: |
      A loss V ~ Uniform(0,20), so S(v) = 1 - v/20 on [0,20]. With deductible d=4,
      find the expected payment per loss E[(V-4)+] = integral_4^20 S(v) dv.
    solution: |
      E[(V-4)+] = int_4^20 (1 - v/20) dv = [v - v^2/40]_4^20
      = (20 - 10) - (4 - 0.4) = 10 - 3.6 = 6.4. (Density check:
      int_4^20 (v-4)/20 dv = 16^2/(2*20) = 6.4.)
    answer: 6.4
    shortcut_used: ["E[(V-d)+] = int_d^b S(v) dv"]
    verify: "abs(((20 - 20**2/40) - (4 - 4**2/40)) - 6.4) < 1e-9"

  - id: C13.5
    chapter: 13
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["continuous", "ordinary_deductible", "cases_approach"]
    provenance: original
    difficulty: 3
    actor: "Professor Oak"
    stakes: "The fragile core-sample drill follows an odd density with no shortcut; Oak needs its deductible payout."
    consequence: "A non-exponential density must be handled by splitting into cases and integrating directly."
    quest_step: 5
    tia_section: "B.5.2"
    narrative_hook: "Cases approach on a rising density: integrate (w-d) f(w) over the paying region."
    statement: |
      The core-sample loss W has density f(w) = w/50 on [0,10] (0 elsewhere). With
      deductible d=2, find E[(W-2)+] by splitting into cases and integrating the
      density: only w>2 pays, so E[(W-2)+] = integral_2^10 (w-2)(w/50) dw.
    solution: |
      E[(W-2)+] = (1/50) int_2^10 (w^2 - 2w) dw = (1/50)[w^3/3 - w^2]_2^10
      = (1/50)(233.333... - (-1.333...)) = 234.666.../50 = 4.693.
    answer: 4.693
    shortcut_used: ["cases: E[(W-d)+] = int_d^b (w-d) f(w) dw"]
    verify: "(lambda a,b:abs((1/50)*((b**3/3 - b**2) - (a**3/3 - a**2)) - 4.693) < 1e-3)(2.0,10.0)"

  - id: C13.6
    chapter: 13
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "coinsurance"]
