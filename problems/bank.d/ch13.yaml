    verify: "abs(0.7*10 - 7.0) < 1e-9"

  - id: C13.7
    chapter: 13
    tier: route_trainer
    archetype: standard
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "master_identity"]
