  - id: C13.13
    chapter: 13
    tier: gym_battle
    archetype: rival_trap
    outcomes: ["2f"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "per_payment", "memoryless"]
    provenance: original
    difficulty: 3
    actor: "Gary Oak"
    stakes: "Gary reads his per-loss figure as the size of an actual cheque and calls the policy barely worth it."
    consequence: "Confusing per-loss with per-payment understates the typical cheque."
    quest_step: 13
    tia_section: "B.5.2"
    narrative_hook: "Catching Gary quote the per-loss average as the size of an actual cheque."
    statement: |
      Gary buys the d=4 deductible policy on X ~ Exp(theta=10) and crows: "My
      expected payment per loss is 6.703, so when I file a claim I'll average a
      6.703-thousand cheque." Find the true expected payment per payment and explain
      Gary's error. (Memoryless: per payment = theta; or 6.703/S(4), S(4)=e^{-0.4}.)
    solution: |
      The 6.703 is the PER-LOSS average -- it already includes the events that pay 0.
      The actual cheque is the PER-PAYMENT average: by memorylessness
      E[X-4 | X>4] = theta = 10 (equivalently 6.703/e^{-0.4} = 10). Gary's error: he
      read the per-loss figure (which averages over the zeros) as the typical cheque.
      The typical cheque is 10 thousand.
    answer: "10 (per payment); Gary confused per-loss with per-payment"
    shortcut_used: ["Exp per payment = theta", "per payment = per loss / S(d)"]
    verify: "abs(6.703/math.exp(-0.4) - 10.0) < 1e-2"

  - id: C13.14
    chapter: 13
    tier: gym_battle
    archetype: standard
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "ordinary_deductible", "policy_limit", "calculus_approach"]
    provenance: original
    difficulty: 3
    actor: "Professor Oak"
    stakes: "Oak wants the cost of insuring only the layer between a deductible of 4 and a cap of 12."
    consequence: "The layer cost is the difference of two limited expected values."
    quest_step: 14
    tia_section: "B.5.1"
    narrative_hook: "The full covered layer between d=4 and u=12 at full coinsurance, calculus road."
    statement: |
      For X ~ Exp(theta=10), a policy pays the layer between d=4 and u=12 at full
      coinsurance (alpha=1). Given E[X^12]=6.988 and E[X^4]=3.297, find the expected
      payment per loss, E[X^12]-E[X^4].
    solution: |
      E[X^12]-E[X^4] = 6.988 - 3.297 = 3.691. (Closed form:
      10(1-e^{-1.2}) - 10(1-e^{-0.4}) = 10(e^{-0.4} - e^{-1.2}) ~= 3.691.)
    answer: 3.691
    shortcut_used: ["layer = E[X^u] - E[X^d]"]
    verify: "abs(10*(math.exp(-0.4) - math.exp(-1.2)) - 3.691) < 1e-3"

  - id: C13.15
    chapter: 13
    tier: gym_battle
    archetype: decision
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "ordinary_deductible", "policy_limit", "master_identity"]
    provenance: original
    difficulty: 4
    actor: "Professor Oak"
    stakes: "The Lab must pick the cheaper of a deductible plan and a low-cap plan for the same exponential loss."
    consequence: "Choosing the costlier plan over-charges the reserve for the same coverage promise."
    quest_step: 15
    tia_section: "B.5.1"
    narrative_hook: "Comparing a deductible plan against a low-cap plan for insurer cost on an exponential loss."
    statement: |
      For X ~ Exp(theta=10) the Lab picks one plan. Plan A: deductible d=4, no limit,
      alpha=1. Plan B: no deductible, maximum covered loss u=4, alpha=1. Using
      S(4)=e^{-0.4}=0.6703, compute the expected payment per loss for each and
      recommend the cheaper plan.
    solution: |
      Plan A: E[(X-4)+] = 10 e^{-0.4} = 6.703.
      Plan B: E[X^4] = 10(1 - e^{-0.4}) = 3.297.
      Plan A costs 6.703 per event, Plan B costs 3.297. Recommend Plan B: the heavy
      exponential tail makes the uncapped excess above the deductible expensive, while
      capping at 4 throws away that whole tail. (A and B are the two halves of the
      master identity: 6.703 + 3.297 = 10 = E[X].)
    answer: "A 6.703, B 3.297; choose B"
    shortcut_used: ["E[(X-d)+]=theta e^{-d/theta}", "E[X^u]=theta(1-e^{-u/theta})", "master identity"]
    verify: "(lambda a,b:abs(a - 6.703) < 1e-2 and abs(b - 3.297) < 1e-2 and b < a and abs(a + b - 10) < 1e-2)(10*math.exp(-0.4), 10*(1-math.exp(-0.4)))"

  - id: C13.16
    chapter: 13
    tier: gym_battle
    archetype: audit
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "ordinary_deductible", "calculus_approach"]
    provenance: original
    difficulty: 2
    actor: "a Lab apprentice"
    stakes: "The apprentice records the per-loss payment as E[X]-d on the exponential loss."
    consequence: "Subtracting the deductible from the mean over-counts it and underprices the cover."
    quest_step: 16
    tia_section: "B.5.1"
    narrative_hook: "Catching the mean-minus-deductible error on a continuous loss."
    statement: |
      An apprentice records "deductible d=4 on X ~ Exp(theta=10), so expected
      per-loss payment = E[X] - d = 10 - 4 = 6." Find the true per-loss payment,
      int_4^inf e^{-x/10} dx, and name the error.
    solution: |
      True payment: E[(X-4)+] = int_4^inf e^{-x/10} dx = 10 e^{-0.4} ~= 6.703. The
      error: E[X]-d = 6 assumes every loss clears the deductible; losses below 4 pay
      0, not a negative amount, so the floor at zero pushes the true payment ABOVE 6.
      True payment 6.703.
    answer: "6.703 (not 6)"
    shortcut_used: ["E[(X-d)+] = int_d^inf S dx, NOT E[X]-d"]
    verify: "abs(10*math.exp(-0.4) - 6.703) < 1e-3 and 10*math.exp(-0.4) > 6"

  # ===================== ELITE CHALLENGE (post-game) =====================

  - id: C13.17
    chapter: 13
    tier: elite_challenge
    archetype: standard
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "ordinary_deductible", "inflation"]
    provenance: original
    difficulty: 5
    actor: "Professor Oak"
    stakes: "Next year's losses inflate but the deductible stays fixed; Oak needs the new per-loss payment."
    consequence: "A fixed deductible erodes, so payments rise faster than losses -- the rate must outpace loss trend."
    quest_step: 17
    tia_section: "B.5.2"
    narrative_hook: "Deductible erosion: a fixed deductible makes the payment inflate faster than the loss."
    statement: |
      This year X ~ Exp(theta=10) with a fixed deductible d=4, so per-loss payment
      = 10 e^{-0.4} ~= 6.703. Next year losses inflate 25% (so (1+r)X ~ Exp(12.5))
      but the deductible stays 4. Find next year's per-loss payment and the percentage
      rise, and explain why it exceeds 25%.
    solution: |
      Next year (1+r)X ~ Exp(12.5), fixed d=4: per loss = 12.5 e^{-4/12.5}
      = 12.5 e^{-0.32} ~= 9.077. Rise = 9.077/6.703 - 1 ~= 0.354, a +35.4% jump. It
      exceeds the 25% loss inflation because the deductible does NOT inflate: a fixed
      4 is a smaller fraction of the (larger) losses, so it removes proportionally
      less and the payment grows faster than the loss (deductible erosion).
    answer: "9.077; +35.4%"
    shortcut_used: ["inflate the loss not the deductible: (1+r)X ~ Exp((1+r)theta)", "Exp per loss = theta e^{-d/theta}"]
    verify: "abs(12.5*math.exp(-0.32) - 9.077) < 1e-3 and abs((12.5*math.exp(-0.32))/(10*math.exp(-0.4)) - 1 - 0.354) < 1e-2"

  - id: C13.18
    chapter: 13
    tier: elite_challenge
    archetype: rival_trap
    outcomes: ["2e"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "ordinary_deductible", "policy_limit"]
    provenance: original
    difficulty: 5
    actor: "Gary Oak"
    stakes: "Gary 'removes' a deductible from a capped loss with a bogus d*S(d) shortcut."
    consequence: "Subtracting d*S(d) instead of the limited value E[X^d] mis-states the covered layer."
    quest_step: 18
    tia_section: "B.5.1"
    narrative_hook: "Catching Gary remove a deductible with d*S(d) instead of the limited value."
    statement: |
      Gary prices an Exp(10) policy with deductible d=4 and maximum covered loss u=12
      by capping the loss at 12, then subtracting "d*S(d)" to remove the deductible:
      E[X^12] - 4*S(4). Given E[X^12]=6.988, E[X^4]=3.297, and S(4)=e^{-0.4}=0.6703,
      find the CORRECT per-loss layer E[X^12]-E[X^4] and explain why Gary is wrong.
    solution: |
      Correct layer between d=4 and u=12: E[X^12]-E[X^4] = 6.988-3.297 = 3.691.
      Gary's shortcut E[X^12] - d*S(d) = 6.988 - 4(0.6703) = 6.988 - 2.681 = 4.307 is
      wrong: subtracting d*S(d) is not how a deductible removes the bottom of a capped
      loss. The deductible removes the limited value E[X^d]=E[X^4]=3.297, not
      d*S(d)=2.681. The correct covered layer is the difference of two limited
      expected values, 3.691.
    answer: "3.691; Gary's d*S(d) shortcut wrong"
    shortcut_used: ["layer = E[X^u] - E[X^d], NOT E[X^u] - d*S(d)"]
    verify: "abs((6.988 - 3.297) - 3.691) < 1e-3 and abs((6.988 - 4*math.exp(-0.4)) - 4.307) < 1e-2"

  - id: C13.19
    chapter: 13
    tier: elite_challenge
    archetype: audit
    outcomes: ["2f"]
    distributions: ["exponential"]
    structural_tags: ["continuous", "exponential", "per_payment"]
    provenance: original
    difficulty: 3
    actor: "a Team Rocket apprentice (a predecessor on the scam desk)"
    stakes: "The apprentice quotes a per-payment cheque size and 'declares it safe' for the knock-off brochure."
    consequence: "Dividing the per-loss expectation by the wrong probability misstates the typical cheque."
    quest_step: 19
    tia_section: "B.5.2"
    narrative_hook: "Catching the apprentice divide the per-payment by F(4) instead of S(4)."
    statement: |
      A Team Rocket apprentice prices the d=4 policy's per-payment cheque on
      X ~ Exp(theta=10). He has the per-loss figure E[(X-4)+]=6.703 and, to get the
      per-payment average, divides by F(4)=P(X<=4)=1-e^{-0.4}=0.3297, writing
      6.703/0.3297 = 20.33, and "declares it safe." Find the TRUE expected payment
      per payment and name the apprentice's error.
    solution: |
      A payment occurs iff the loss STRICTLY exceeds the deductible, X>4, so the
      divisor is S(4)=e^{-0.4}=0.6703, NOT F(4)=0.3297. The true per-payment cheque is
      E[X-4 | X>4] = E[(X-4)+]/S(4) = 6.703/0.6703 = 10 (the memoryless mean theta).
      The apprentice's error: he divided by F(4) (the chance a loss does NOT clear the
      deductible) instead of S(4) (the chance it does). His 20.33 is absurd; the true
      cheque is 10.
    answer: "10 (not 20.33); divided by F(4) instead of S(4)"
    shortcut_used: ["per payment = per loss / S(d), divisor is S(d), NOT F(d)"]
    verify: "abs(6.703/math.exp(-0.4) - 10.0) < 1e-2"
