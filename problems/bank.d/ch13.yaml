      A cheque is written iff X>d=4, so divide by S(4)=e^{-0.4}=0.6703 (the
      deductible, NOT the limit): E[Y_P] = 2.953 / 0.6703 = 4.405.
    answer: 4.405
    shortcut_used: ["per payment = E[Y_L] / S(d)"]
    verify: "abs(2.953 / math.exp(-0.4) - 4.405) < 1e-2"

  - id: C13.11
    chapter: 13
    tier: gym_battle
    archetype: standard
    outcomes: ["2e"]
    distributions: []
    structural_tags: ["continuous", "ordinary_deductible", "cases_approach", "calculus_approach"]
    provenance: original
    difficulty: 4
    actor: "the Pokedex Actuary Mode"
    stakes: "You must show the cases road equals the calculus road on a non-exponential density, both agreeing."
    consequence: "A mismatch between the two roads would flag a bookkeeping slip in the integral."
    quest_step: 11
    tia_section: "B.5.1-B.5.2"
    narrative_hook: "One payment, two roads: density integral vs survival integral, made to agree."
    statement: |
      For W with density f(w)=w/50 on [0,10] (deductible d=2), compute E[(W-2)+] by
      the CASES road, int_2^10 (w-2)(w/50) dw, AND verify it equals the CALCULUS
      road, int_2^10 S(w) dw with S(w)=1-w^2/100.
    solution: |
      Cases: (1/50)[w^3/3 - w^2]_2^10 = 234.666.../50 = 4.693.
      Calculus: int_2^10 (1 - w^2/100) dw = [w - w^3/300]_2^10
      = (10 - 1000/300) - (2 - 8/300) = 6.667 - 1.973 = 4.693. Both roads agree.
    answer: "4.693 (both roads)"
    shortcut_used: ["cases int (w-d)f(w) dw = calculus int_d^b S(w) dw"]
    verify: "abs(((1/50)*((10**3/3 - 10**2) - (2**3/3 - 2**2))) - ((10 - 10**3/300) - (2 - 2**3/300))) < 1e-6"

  - id: C13.12
