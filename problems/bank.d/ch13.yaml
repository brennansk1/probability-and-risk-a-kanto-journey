# Problem bank — Chapter 13 (Victory Road): Covariance, correlation, variance of
# sums / linear combinations, and sums of independent in-family distributions.
# Outcomes 3e, 3g, 3h. Schema per problems/bank.yaml header.
# This file is owned by Chapter 13 only. Verify expressions use the names exposed
# by sims/verify_examples.py (math, st); no __import__.

problems:

  # ===================== ROUTE TRAINERS (mechanics) =====================

  - id: C13.1
    chapter: 13
    tier: route_trainer
    archetype: "variance of an independent sum"
    outcomes: ["3g"]
    distributions: []
    provenance: original
    difficulty: 1
    narrative_hook: "Logging Pikachu + Charizard combined push on the entrance ledge."
    statement: |
      On the entrance ledge, Pikachu's strength output X has Var(X)=4 and
      Charizard's Y has Var(Y)=9. They are independent. Find Var(X+Y).
    solution: |
      Independent => Cov(X,Y)=0, so Var(X+Y)=Var(X)+Var(Y)=4+9=13.
    answer: "13"
    shortcut_used: ["independence kills the covariance term"]
    verify: "abs((4 + 9) - 13) < 1e-9"

  - id: C13.2
    chapter: 13
    tier: route_trainer
    archetype: "variance of a sum and difference with covariance"
    outcomes: ["3g"]
    distributions: []
    provenance: original
    difficulty: 1
    narrative_hook: "Pikachu and Charizard now feed off each other; the tag-out swing."
    statement: |
      Same two climbers as C13.1 (Var(X)=4, Var(Y)=9) but now Cov(X,Y)=2.
      Find Var(X+Y) and Var(X-Y).
    solution: |
      Var(X+Y)=Var(X)+Var(Y)+2Cov=4+9+2(2)=17.
      Var(X-Y)=Var(X)+Var(Y)-2Cov=4+9-2(2)=9.
      The variances always ADD; only the cross-term changes sign.
    answer: "Var(X+Y)=17, Var(X-Y)=9"
    shortcut_used: ["only the cross-term flips sign"]
    verify: "abs((4+9+2*2) - 17) < 1e-9 and abs((4+9-2*2) - 9) < 1e-9"

  - id: C13.3
    chapter: 13
    tier: route_trainer
    archetype: "recover covariance from a given correlation"
    outcomes: ["3e"]
    distributions: []
    provenance: original
    difficulty: 1
    narrative_hook: "Brock converts a Geodude/Onix correlation into a covariance."
    statement: |
      Brock measures Geodude's output U (SD=5) and Onix's output V (SD=12) with
      correlation rho=0.4. Find Cov(U,V).
    solution: |
      Cov(U,V)=rho*SD(U)*SD(V)=0.4*5*12=24.
    answer: "24"
    shortcut_used: ["Cov = rho * SD * SD"]
    verify: "abs(0.4*5*12 - 24) < 1e-9"

  - id: C13.4
    chapter: 13
    tier: route_trainer
    archetype: "covariance from E[XY]"
    outcomes: ["3e"]
    distributions: []
    provenance: original
    difficulty: 1
    narrative_hook: "Misty's Staryu and Starmie spin-counts."
    statement: |
      Misty reports E[X]=3, E[Y]=5, E[XY]=16 for her two Pokemon's spin-counts.
      Find Cov(X,Y) and say whether they move together or apart.
    solution: |
      Cov(X,Y)=E[XY]-E[X]E[Y]=16-(3)(5)=16-15=1 > 0, so they move together.
    answer: "Cov=1 (move together)"
    shortcut_used: ["Cov = E[XY] - E[X]E[Y]"]
    verify: "abs((16 - 3*5) - 1) < 1e-9"

  - id: C13.5
    chapter: 13
    tier: route_trainer
    archetype: "variance of a weighted independent combination"
    outcomes: ["3g", "3h"]
    distributions: []
    provenance: original
    difficulty: 2
    narrative_hook: "A relay with effort weights 3 and -2 on two independent outputs."
    statement: |
      A relay uses weights a=3 on output X and b=-2 on output Y, where Var(X)=2,
      Var(Y)=5, and X,Y independent. Find Var(3X-2Y).
    solution: |
      Independent => no cross-term. Weights enter squared, so the sign vanishes:
      Var(3X-2Y)=3^2*Var(X)+(-2)^2*Var(Y)=9*2+4*5=18+20=38.
    answer: "38"
    shortcut_used: ["squared weights; sign of a weight vanishes"]
    verify: "abs((9*2 + 4*5) - 38) < 1e-9"

  - id: C13.6
    chapter: 13
    tier: route_trainer
    archetype: "difference of independent normals stays normal"
    outcomes: ["3h"]
    distributions: [normal]
    provenance: original
    difficulty: 2
    narrative_hook: "Two independent normal climbers; the distribution of their gap."
    statement: |
      X ~ Normal(10, 4) and Y ~ Normal(6, 9) (variances given) are independent.
      Identify the exact distribution of X - Y, with its mean and variance.
    solution: |
      Normals are closed under linear combinations.
      Mean: 10-6=4. Variance: 4+9=13 (variances ADD even for a difference).
      X - Y ~ Normal(4, 13).
    answer: "Normal(4, 13)"
    shortcut_used: ["normal sum/diff in-family; variances add"]
    verify: "abs((10-6) - 4) < 1e-9 and abs((4+9) - 13) < 1e-9"

  - id: C13.7
    chapter: 13
    tier: route_trainer
    archetype: "sum of independent Poissons pools the rate"
    outcomes: ["3h"]
    distributions: [poisson]
    provenance: original
    difficulty: 1
    narrative_hook: "Wild Rattata in two independent corridors."
    statement: |
      Wild Rattata appear independently in two corridors as Poisson(1.5) and
      Poisson(2.5). Identify the distribution of the total count and its
      mean and variance.
    solution: |
      Independent Poissons add: total ~ Poisson(1.5+2.5)=Poisson(4).
      For a Poisson, mean = variance = 4.
    answer: "Poisson(4); E=Var=4"
    shortcut_used: ["pool the Poisson rates"]
    verify: "abs((1.5+2.5) - 4) < 1e-9"

  # ===================== GYM BATTLES (true SOA difficulty) =====================

  - id: C13.8
    chapter: 13
    tier: gym_battle
    archetype: "covariance and correlation from a joint pmf"
    outcomes: ["3e"]
    distributions: []
    provenance: original
    difficulty: 3
    narrative_hook: "Cave RNG joint pmf of boulders cleared and Onix met."
    statement: |
      Joint pmf of (X,Y): p(0,0)=0.2, p(1,0)=0.2, p(0,1)=0.1, p(1,1)=0.3,
      p(2,1)=0.2. Compute Cov(X,Y) and the correlation rho.
    solution: |
      X marginal: P(0)=0.3, P(1)=0.5, P(2)=0.2 => E[X]=0.9,
        E[X^2]=0+0.5+4*0.2=1.3, Var(X)=1.3-0.81=0.49.
      Y marginal (indicator): P(1)=0.6 => E[Y]=0.6, Var(Y)=0.6-0.36=0.24.
      E[XY] (nonzero only when both>=1): (1,1):0.3, (2,1):2*0.2=0.4 => E[XY]=0.7.
      Cov=0.7-0.9*0.6=0.7-0.54=0.16.
      rho=0.16/(sqrt(0.49)*sqrt(0.24))=0.16/(0.7*0.489898)=0.16/0.342929=0.4666.
    answer: "Cov=0.16, rho~0.467"
    shortcut_used: ["Cov = E[XY] - E[X]E[Y]", "indicator: E[Y^2]=E[Y]"]
    verify: "abs((0.7 - 0.9*0.6) - 0.16) < 1e-9 and abs(0.16/((0.49**0.5)*(0.24**0.5)) - 0.4666) < 1e-3"

  - id: C13.9
    chapter: 13
    tier: gym_battle
    archetype: "variance of a sum of three with mixed-sign cross-terms"
    outcomes: ["3g"]
    distributions: []
    provenance: original
    difficulty: 3
    narrative_hook: "Three-Pokemon vanguard with mixed-sign covariances."
    statement: |
      Var(X1)=2, Var(X2)=3, Var(X3)=4; Cov(X1,X2)=1, Cov(X1,X3)=-1, X2 and X3
      uncorrelated. Find Var(X1+X2+X3).
    solution: |
      Var = (2+3+4) + 2(Cov12 + Cov13 + Cov23) = 9 + 2(1 - 1 + 0) = 9 + 0 = 9.
    answer: "9"
    shortcut_used: ["sum the variances plus twice each pairwise covariance"]
    verify: "abs((2+3+4 + 2*(1 + (-1) + 0)) - 9) < 1e-9"

  - id: C13.10
    chapter: 13
    tier: gym_battle
    archetype: "variance of a weighted three-variable combination"
    outcomes: ["3g", "3h"]
    distributions: []
    provenance: original
    difficulty: 3
    narrative_hook: "Load-weighted team total W = X1 + 2X2 + 3X3."
    statement: |
      With the variances and covariances of C13.9, the load-weighted total is
      W = X1 + 2X2 + 3X3. Find Var(W).
    solution: |
      Weights a1=1, a2=2, a3=3.
      Diagonal: 1*2 + 4*3 + 9*4 = 2+12+36 = 50.
      Cross: 2[a1a2*Cov12 + a1a3*Cov13 + a2a3*Cov23]
           = 2[(1*2*1)+(1*3*-1)+(2*3*0)] = 2[2-3+0] = -2.
      Var(W) = 50 - 2 = 48.
    answer: "48"
    shortcut_used: ["a_i^2 diagonal + 2 a_i a_j cross"]
    verify: "abs((1*2 + 4*3 + 9*4) + 2*((1*2*1)+(1*3*-1)+(2*3*0)) - 48) < 1e-9"

  - id: C13.11
    chapter: 13
    tier: gym_battle
    archetype: "covariance from a continuous joint density"
    outcomes: ["3e"]
    distributions: []
    provenance: inspired-by
    difficulty: 4
    narrative_hook: "Two linked cave attributes with density f=x+y on the unit square."
    statement: |
      A pair has joint density f(x,y)=x+y on 0<=x<=1, 0<=y<=1. Find Cov(X,Y).
      (You may use E[X]=E[Y]=7/12.)
    solution: |
      E[XY] = int_0^1 int_0^1 xy(x+y) dx dy
            = int_0^1 int_0^1 (x^2 y + x y^2) dx dy.
      Inner over x: y/3 + y^2/2. Outer over y: (1/3)(1/2)+(1/2)(1/3)=1/6+1/6=1/3.
      Cov = 1/3 - (7/12)^2 = 1/3 - 49/144 = 48/144 - 49/144 = -1/144 ~ -0.006944.
    answer: "-1/144 ~ -0.00694"
    shortcut_used: ["double integral for E[XY]"]
    verify: "abs((1/3 - (7/12)**2) - (-1/144)) < 1e-9"

  - id: C13.12
    chapter: 13
    tier: gym_battle
    archetype: "uncorrelated but dependent (rho=0 does not imply independence)"
    outcomes: ["3e"]
    distributions: [discrete_uniform]
    provenance: inspired-by
    difficulty: 3
    narrative_hook: "The Y = X^2 counterexample on the symmetric ledge."
    statement: |
      X is uniform on {-1,0,1} (each prob 1/3) and Y = X^2. Show Cov(X,Y)=0 yet
      X and Y are not independent.
    solution: |
      E[X]=0 by symmetry. E[XY]=E[X*X^2]=E[X^3]=(1/3)((-1)+0+1)=0.
      Cov=E[XY]-E[X]E[Y]=0-0=0, so rho=0.
      Not independent: P(X=0,Y=1)=0 but P(X=0)P(Y=1)=(1/3)(2/3)=2/9 != 0.
      (Knowing X=0 forces Y=0.) So rho=0 does NOT imply independence.
    answer: "Cov=0 but dependent"
    shortcut_used: ["correlation sees only linear association"]
    verify: "abs(((1/3)*((-1)**3 + 0 + 1**3)) - 0) < 1e-9 and abs(0 - (1/3)*(2/3)) > 1e-9"

  - id: C13.13
    chapter: 13
    tier: gym_battle
    archetype: "sum of independent normals + tail probability"
    outcomes: ["3h"]
    distributions: [normal]
    provenance: adapted-from-SOA
    difficulty: 3
    narrative_hook: "Shaft clears only if combined output exceeds 25."
    statement: |
      X ~ Normal(14, 9) and Y ~ Normal(8, 5) independent. Find P(X+Y > 25).
    solution: |
      X+Y ~ Normal(22, 14), SD=sqrt(14)=3.7417.
      z=(25-22)/3.7417=0.8018. P(X+Y>25)=P(Z>0.80)=1-0.7881=0.2119.
    answer: "~0.212"
    shortcut_used: ["pool normal params, then standardize"]
    verify: "abs((1 - st.norm.cdf((25-22)/math.sqrt(14))) - 0.2119) < 1e-2"

  - id: C13.14
    chapter: 13
    tier: gym_battle
    archetype: "sum of independent same-scale Gammas"
    outcomes: ["3h"]
    distributions: [gamma]
    provenance: original
    difficulty: 2
    narrative_hook: "Two independent gamma climb-times sharing a scale."
    statement: |
      Independent times Gamma(2, theta) and Gamma(3, theta) with theta=4.
      Identify the distribution of the total time and give its mean and variance.
    solution: |
      Same scale => shapes add: total ~ Gamma(5, 4).
      Mean = alpha*theta = 5*4 = 20. Variance = alpha*theta^2 = 5*16 = 80.
    answer: "Gamma(5,4); E=20, Var=80"
    shortcut_used: ["same-scale Gammas add shapes"]
    verify: "abs(5*4 - 20) < 1e-9 and abs(5*4**2 - 80) < 1e-9"

  - id: C13.15
    chapter: 13
    tier: gym_battle
    archetype: "diversification: variance of a sum with negative correlation"
    outcomes: ["3e", "3g"]
    distributions: []
    provenance: original
    difficulty: 3
    narrative_hook: "A two-route loss portfolio with negative correlation."
    statement: |
      Losses L1, L2 with Var(L1)=100, Var(L2)=225, correlation rho=-0.3.
      Compare Var(L1+L2) to the naive independent value, and state the
      diversification benefit (variance reduction).
    solution: |
      Cov = rho*10*15 = -0.3*150 = -45.
      Var(L1+L2) = 100+225+2(-45) = 325-90 = 235.
      Naive (independent) value = 325. Benefit = 325-235 = 90 reduction.
    answer: "Var=235; benefit=90"
    shortcut_used: ["Cov = rho*SD*SD; negative cov reduces total variance"]
    verify: "abs((100+225+2*(-0.3*10*15)) - 235) < 1e-9 and abs((325 - 235) - 90) < 1e-9"

  # ===================== ELITE CHALLENGE (integrative / stretch) =====================

  - id: C13.16
    chapter: 13
    tier: elite_challenge
    archetype: "equicorrelated sum; variance and corr of a part with the whole"
    outcomes: ["3e", "3g"]
    distributions: []
    provenance: original
    difficulty: 4
    narrative_hook: "Six teammates with a common pairwise covariance climb together."
    statement: |
      Six teammates each have output variance sigma^2=4, and every distinct pair
      has covariance c=1. T = sum of all six. Derive Var(T) in terms of sigma^2
      and c via the count of pairs and evaluate it; also find Corr(X_i, T).
    solution: |
      Var(T) = n*sigma^2 + 2*C(n,2)*c = n*sigma^2 + n(n-1)*c.
      n=6: Var(T) = 6*4 + 6*5*1 = 24+30 = 54.
      Cov(X_i,T) = Var(X_i) + sum_{j!=i} Cov(X_i,X_j) = 4 + 5*1 = 9.
      Corr(X_i,T) = 9/(sqrt(4)*sqrt(54)) = 9/(2*7.34847) = 9/14.6969 = 0.6124.
    answer: "Var(T)=54; Corr(X_i,T)~0.612"
    shortcut_used: ["count of pairs C(n,2)", "Cov(X_i,T) via bilinearity"]
    verify: "abs((6*4 + 6*5*1) - 54) < 1e-9 and abs(9/((4**0.5)*(54**0.5)) - 0.6124) < 1e-3"

  - id: C13.17
    chapter: 13
    tier: elite_challenge
    archetype: "compound distribution moments (Poisson number of pushes)"
    outcomes: ["3g", "3h"]
    distributions: [poisson]
    provenance: adapted-from-SOA
    difficulty: 4
    narrative_hook: "A random number of pushes, each expending random strength."
    statement: |
      N ~ Poisson(3) pushes, each push expends independent S_i with E[S]=2,
      Var(S)=1, independent of N. T = sum_{i=1}^N S_i. Find E[T] and Var(T) using
      E[T]=E[N]E[S], Var(T)=E[N]Var(S)+Var(N)E[S]^2.
    solution: |
      E[T] = E[N]E[S] = 3*2 = 6.
      N Poisson => E[N]=Var(N)=3.
      Var(T) = E[N]Var(S) + Var(N)E[S]^2 = 3*1 + 3*4 = 3+12 = 15.
      (Poisson check: Var(T)=lambda*E[S^2]=3*(1+4)=15.)
    answer: "E[T]=6, Var(T)=15"
    shortcut_used: ["compound moment formulas; Poisson E=Var"]
    verify: "abs(3*2 - 6) < 1e-9 and abs((3*1 + 3*2**2) - 15) < 1e-9"

  - id: C13.18
    chapter: 13
    tier: elite_challenge
    archetype: "covariance of two overlapping sums via bilinearity"
    outcomes: ["3e", "3g"]
    distributions: []
    provenance: original
    difficulty: 4
    narrative_hook: "Front-pair total and rear-pair total share X2."
    statement: |
      X1,X2,X3 have SD 2, 3, sqrt(5); rho12=0.5, rho13=-0.2, rho23=0.
      A = X1+X2, B = X2+X3. Find Cov(A,B).
    solution: |
      Cov12=0.5*2*3=3; Cov13=-0.2*2*sqrt(5)=-0.89443; Cov23=0; Var(X2)=9.
      By bilinearity, Cov(A,B)=Cov(X1,X2)+Cov(X1,X3)+Cov(X2,X2)+Cov(X2,X3)
             = 3 + (-0.89443) + 9 + 0 = 11.10557.
      The shared X2 contributes its full variance 9.
    answer: "~11.106"
    shortcut_used: ["bilinearity; shared variable contributes its variance"]
    verify: "abs((0.5*2*3 + (-0.2*2*math.sqrt(5)) + 9 + 0) - 11.10557) < 1e-3"
