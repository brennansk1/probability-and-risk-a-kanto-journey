  - id: C1.21
    chapter: 1
    tier: route_trainer
    archetype: audit
    outcomes: ["1a"]
    distributions: []
    provenance: original
    difficulty: 2
    actor: "Meowth (a swiped survey sheet)"
    stakes: "Meowth's sheet lists encounter masses that don't add to 1."
    consequence: "A sample space whose masses miss 1 makes every later probability wrong."
    quest_step: 8
    narrative_hook: "AUDIT: Meowth's swiped survey sheet drops the 'nothing' outcome."
    statement: |
      Meowth's swiped survey sheet records the wild slot as Pidgey 0.45,
      Rattata 0.30, Spearow 0.15 -- and declares 'the space is complete, masses
      sum to 1.' Find the true mass of the missing 'nothing' outcome and name
      Meowth's error.
    solution: |
      Listed masses sum to 0.45 + 0.30 + 0.15 = 0.90, not 1. By A2 the whole
      space must total 1, so the missing 'nothing' outcome carries
      1 - 0.90 = 0.10. Meowth's error: he dropped the boring 'nothing' outcome,
      leaving a non-exhaustive space whose masses fall short of 1.
    answer: "P(nothing) = 0.10; Meowth dropped the 'nothing' outcome (masses summed to 0.90)"
    shortcut_used: ["axiom A2: outcome masses of an exhaustive space sum to 1"]
    verify: "(abs((0.45 + 0.30 + 0.15) - 0.90) < 1e-9) and (abs((1 - 0.90) - 0.10) < 1e-9)"

  - id: C1.22
    chapter: 1
    tier: gym_battle
    archetype: rival_trap
    outcomes: ["1e"]
    distributions: []
    provenance: original
    difficulty: 3
    actor: "Gary Oak"
    stakes: "Gary brags he can add two threat probabilities to get the union."
    consequence: "Adding overlapping events double-counts and can exceed 1 -- a tell it's wrong."
    quest_step: 16
    narrative_hook: "RIVAL TRAP: Gary adds overlapping threats and gets a probability above 1."
    statement: |
      Gary brags: 'A Spearow targets Pikachu with probability 0.40 and dives low
      with probability 0.35 -- so dangerous (targets OR low) is just 0.40 + 0.35
      = 0.75, easy.' The overlap is P(target and low) = 0.18. Find the true
      P(target or low) and name Gary's error.
    solution: |
      Addition rule: P(target or low) = 0.40 + 0.35 - 0.18 = 0.57.
      Gary's error: he added overlapping events without subtracting the overlap
      (double-counting the 0.18 that are both). His 0.75 over-counts by exactly
      0.18; the correct union is 0.57.
    answer: "0.57; Gary double-counted the 0.18 overlap"
    shortcut_used: ["addition rule subtracts the overlap; bare sum double-counts"]
    verify: "(abs((0.40 + 0.35 - 0.18) - 0.57) < 1e-9) and (abs((0.40 + 0.35) - 0.75) < 1e-9)"
