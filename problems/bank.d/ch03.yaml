    statement: |
      A non-negative integer RV X has survival S(0)=0.7, S(1)=0.4, S(2)=0.2,
      S(3)=0.05, S(4)=0. (a) Find E[X]. (b) If Y=10X, find E[Y]. (c) Given also
      E[X^2]=3.05, find Var(Y).
    solution: |
      (a) E[X] = 0.7+0.4+0.2+0.05 = 1.35.
      (b) E[Y] = 10 E[X] = 13.5.
      (c) Var(X) = E[X^2] - (E[X])^2 = 3.05 - 1.35^2 = 3.05 - 1.8225 = 1.2275;
          Var(Y) = 10^2 Var(X) = 100(1.2275) = 122.75.
    answer: "E[X]=1.35, E[Y]=13.5, Var(Y)=122.75"
