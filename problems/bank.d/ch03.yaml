    statement: |
      An RV has M_X(t) = e^{2(e^t - 1)} (a Poisson, previewed). You are told
      M_X'(0) = 2. State E[X] and confirm M_X(0) = 1.
    solution: |
      E[X] = M_X'(0) = 2. Every MGF has M_X(0) = E[e^0] = 1; here
      M_X(0) = e^{2(e^0 - 1)} = e^{2(1-1)} = e^0 = 1.
    answer: "E[X] = 2, M_X(0) = 1"
    shortcut_used: ["E[X] = M'(0)", "M(0) = 1 always"]
    verify: "abs(__import__('math').exp(2*(__import__('math').exp(0) - 1)) - 1) < 1e-12"

