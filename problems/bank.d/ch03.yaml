      (both given). Total energy is Y = 2N + 5. Find E[Y] and Var(Y).
    solution: |
      E[Y] = 2 E[N] + 5 = 2(1.7) + 5 = 8.4.
      Var(Y) = 2^2 Var(N) = 4(0.61) = 2.44 (the +5 adds no variance).
    answer: "E[Y] = 8.4, Var(Y) = 2.44"
    shortcut_used: ["E[aX+b]=aE[X]+b", "Var(aX+b)=a^2 Var(X)"]
