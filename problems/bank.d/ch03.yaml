    difficulty: 4
    actor: "Ash (you)"
    stakes: "The battle format decides whether raw magnitude (mean) or reliability (low variance) should win your pick."
    consequence: "Choosing the wrong summary for the format loses the match."
    quest_step: 22
    tia_section: "A.3.3, A.3.6-A.3.7"
    narrative_hook: "Picking Raichu vs Pikachu by the summary the battle format rewards."
    statement: |
      Raichu R in {0,2,4,6} (p=0.10,0.20,0.30,0.40) and Pikachu P in {2,3,4,5}
      (p=0.20,0.30,0.30,0.20). Given E[R]=4.0, Var(R)=4.0 and E[P]=3.5, Var(P)=1.05,
      decide: (a) in a must-not-whiff battle (a single 0 loses), which do you send?
      (b) in a 'highest single hit wins' format, which gives the better shot at a 6?
    solution: |
      (a) Send Pikachu: Raichu deals 0 with prob 0.10 (instant loss) and has 4x the
          variance; Pikachu never drops below 2. Low variance / high floor wins.
      (b) Send Raichu: only Raichu can reach 6 (prob 0.40); Pikachu caps at 5. The
          heavy upper tail that hurts reliability helps a max-hit format.
    answer: "(a) Pikachu; (b) Raichu"
    shortcut_used: ["variance/floor vs upper tail -- format decides"]
    verify: "(lambda kr,pr,kp,pp:(abs(sum(a*b for a,b in zip(kr,pr))-4.0)<1e-9) and (abs(sum(a*a*b for a,b in zip(kr,pr))-sum(a*b for a,b in zip(kr,pr))**2-4.0)<1e-9) and (abs(sum(a*a*b for a,b in zip(kp,pp))-sum(a*b for a,b in zip(kp,pp))**2-1.05)<1e-9) and (max(kp)<6))([0,2,4,6],[0.10,0.20,0.30,0.40],[2,3,4,5],[0.20,0.30,0.30,0.20])"

