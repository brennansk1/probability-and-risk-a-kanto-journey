  - id: C3.20
    chapter: 3
    tier: elite_challenge
    archetype: standard
    outcomes: ["2c", "2d"]
    distributions: ["discrete_uniform"]
    provenance: original
    difficulty: 4
    actor: "Professor Oak"
    stakes: "Oak asks you to derive the discrete-uniform formulas from scratch, not just quote them."
    consequence: "A from-scratch derivation proves you own the formulas under exam pressure."
    quest_step: 21
    tia_section: "A.3.8"
    narrative_hook: "Deriving the discrete-uniform mean and variance from the power sums."
    statement: |
      For X discrete uniform on {1,...,n}, derive E[X]=(n+1)/2 and Var(X)=(n^2-1)/12
      using sum k = n(n+1)/2 and sum k^2 = n(n+1)(2n+1)/6. Evaluate at n=6.
    solution: |
      E[X] = (1/n) * n(n+1)/2 = (n+1)/2.
      E[X^2] = (1/n) * n(n+1)(2n+1)/6 = (n+1)(2n+1)/6.
      Var = (n+1)(2n+1)/6 - (n+1)^2/4 = (n+1)(n-1)/12 = (n^2-1)/12.
      At n=6: E[X] = 7/2 = 3.5, Var = 35/12 ~ 2.917.
    answer: "(n+1)/2 and (n^2-1)/12; at n=6: 3.5 and 35/12"
    shortcut_used: ["power sums", "Var = E[X^2] - (E[X])^2"]
    verify: "(lambda n,k:(abs(sum(k)/n - (n+1)/2)<1e-9) and (abs(sum(x*x for x in k)/n - sum(k)/n*sum(k)/n - (n*n-1)/12)<1e-9))(6,list(range(1,7)))"

  - id: C3.21
    chapter: 3
