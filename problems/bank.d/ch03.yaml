  - id: C3.24
    chapter: 3
    tier: gym_battle
    archetype: audit
    outcomes: ["2a", "2b", "2c"]
    distributions: []
    provenance: original
    difficulty: 3
    actor: "Team Rocket (Jessie)"
    stakes: "Jessie computes an expected escape time from a survival report but skips the first survival term."
    consequence: "Dropping S(0) understates the expected time and bungles the getaway plan."
    quest_step: 24
    tia_section: "A.3.5"
    narrative_hook: "Catching an off-by-one in a survival-method expectation (S(0) dropped)."
    statement: |
      An escape time X in {0,1,2,3} has survival S(0)=0.8, S(1)=0.5, S(2)=0.2,
      S(3)=0. Jessie sums "S(1)+S(2)+S(3) = 0.7" and calls that the expected time.
      Find the true E[X] and name Jessie's error.
    solution: |
      The survival method sums from k=0: E[X] = S(0)+S(1)+S(2)+S(3)
      = 0.8+0.5+0.2+0 = 1.5. Jessie DROPPED the S(0) term (an off-by-one), starting
      at k=1 and getting 0.7. The sum must start at k=0.
    answer: "E[X] = 1.5 (Jessie dropped the S(0) term)"
    shortcut_used: ["E[X] = sum S(k) starting at k=0"]
    verify: "abs((0.8+0.5+0.2+0.0) - 1.5) < 1e-9 and abs((0.5+0.2+0.0) - 0.7) < 1e-9"
