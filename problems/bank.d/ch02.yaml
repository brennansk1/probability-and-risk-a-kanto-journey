    statement: |
      Joy quarantines only if the posterior of disease exceeds 0.5. Prevalence
      4%, sensitivity 0.9, false-positive rate 0.05. (a) After one positive scan,
      does she quarantine? (b) After two independent positive scans? Show the
      posterior in each case.
    solution: |
      (a) Joints: sick 0.04*0.9 = 0.036; healthy 0.96*0.05 = 0.048; total 0.084.
          P(sick|+) = 0.036/0.084 = 0.4286 < 0.5 -> NO quarantine.
      (b) Square the likelihoods: sick 0.04*0.81 = 0.0324; healthy 0.96*0.0025
          = 0.0024; total 0.0348. P(sick|+,+) = 0.0324/0.0348 = 0.9310 > 0.5
          -> QUARANTINE. The second independent positive flips the decision.
    answer: "(a) 0.4286 -> no; (b) 0.9310 -> yes"
