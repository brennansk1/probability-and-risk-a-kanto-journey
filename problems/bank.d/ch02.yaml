    actor: "The phantom thief"
    stakes: "The thief strikes a SECOND night; consistent evidence should sharpen the verdict."
    consequence: "A second clue-theft drives the Rocket posterior from a coin-flip to near certainty."
    quest_step: 21
    narrative_hook: "Sequential updating: the thief strikes a second night, same clue."
    statement: |
      The phantom thief strikes two nights running, each leaving wet footprints,
      by the same unknown group. Using the Gym Battle figures (Traveler share
      0.60, steal 0.05, clue 0.40; Local 0.35, 0.01, 0.20; Rocket 0.05, 0.30,
      0.90), and treating the two nights as conditionally independent given the
      group, find P(Rocket | two clue thefts).
      (Restated given: the one-night posteriors were Traveler 0.458, Local 0.027,
      Rocket 0.515.)
    solution: |
      Per-night likelihood = steal*clue: Traveler 0.02, Local 0.002, Rocket 0.27.
      Two conditionally independent nights -> square each, weight by share:
      Traveler 0.60*0.02^2 = 0.000240
      Local    0.35*0.002^2 = 0.00000140
      Rocket   0.05*0.27^2 = 0.0036450
      Total = 0.00388640.
      P(Rocket | two clue thefts) = 0.0036450/0.00388640 = 0.938.
    answer: 0.938
    shortcut_used: ["conditionally-independent evidence: square the per-night likelihoods"]
    verify: "abs((0.05*0.27**2)/(0.60*0.02**2 + 0.35*0.002**2 + 0.05*0.27**2) - 0.938) < 1e-3"

