  - id: C2.23
    chapter: 2
    tier: route_trainer
    archetype: audit
    outcomes: ["1c"]
    distributions: []
    provenance: original
    difficulty: 2
    actor: "Team Rocket (a swiped tally sheet)"
    stakes: "Jessie scribbled a conditional probability on the tally and called the case 'solved.'"
    consequence: "If Jessie divided by the wrong denominator, her accusation is baseless."
    quest_step: 8
    narrative_hook: "AUDIT: Jessie's tally claims P(local | Water-type) = 0.15."
    statement: |
      Near the Center, 60 trainers; 24 carry a Water-type; of those, 9 are
      locals. Jessie's swiped tally records 'P(local | Water-type) = 0.15 -- so
      locals are basically cleared.' Find the true P(local | Water-type) and name
      Jessie's error.
    solution: |
      Conditioning shrinks the world to the 24 Water-type owners:
      P(local | Water) = 9/24 = 0.375.
      Jessie's error: she divided by 60 (the whole town), getting 9/60 = 0.15.
      That is the JOINT share P(local and Water), not the conditional -- she forgot
      to shrink the denominator to B.
    answer: 0.375
    shortcut_used: ["conditional divides by P(B)=24, not by |S|=60"]
    verify: "(abs(9/24 - 0.375) < 1e-9) and (abs(9/60 - 0.15) < 1e-9)"

  - id: C2.24
    chapter: 2
    tier: gym_battle
    archetype: rival_trap
    outcomes: ["1e"]
    distributions: []
    provenance: original
    difficulty: 3
    actor: "Gary Oak"
    stakes: "Gary claims two of his catches were 'mutually exclusive, so independent.'"
    consequence: "Conflating disjoint with independent is exactly backwards and voids his claim."
    quest_step: 14
    narrative_hook: "RIVAL TRAP: Gary says two mutually exclusive catches are 'therefore independent.'"
    statement: |
      Gary insists: 'My Pokemon caught either a Goldeen or a Seaking on one throw
      -- those outcomes are mutually exclusive, so they must be independent too,
      right?' Each has probability 0.3 on the throw and they cannot both occur.
      Decide whether mutually exclusive (positive-probability) events can be
      independent, with the algebra.
    solution: |
      Mutually exclusive means P(Goldeen and Seaking) = 0.
      Independence would require P(Goldeen and Seaking) = P(Goldeen)P(Seaking)
      = 0.3*0.3 = 0.09.
      Since 0 != 0.09, they are NOT independent -- in fact they are maximally
      DEPENDENT (one occurring makes the other impossible). Gary has it exactly
      backwards.
    answer: "NOT independent (0 != 0.09); disjoint is the opposite of independent"
    shortcut_used: ["disjoint positive-probability events are maximally dependent"]
    verify: "(abs(0.3*0.3 - 0.09) < 1e-9) and (0.0 != 0.09)"

  - id: C2.25
    chapter: 2
    tier: gym_battle
    archetype: audit
    outcomes: ["1f"]
    distributions: []
    provenance: original
    difficulty: 3
    actor: "Meowth (a back-of-envelope estimate)"
    stakes: "Meowth averaged three conditional rates to 'estimate' an overall flee rate."
    consequence: "Ignoring the case weights gives an answer outside the valid range -- a tell it's wrong."
    quest_step: 11
    narrative_hook: "AUDIT: Meowth reports the overall flee rate as the plain average 0.50."
    statement: |
      A wild Pokemon is Goldeen (50%), Seaking (30%), or Horsea (20%), fleeing
      with rates 0.2, 0.5, 0.8. Meowth reports the overall flee rate as the plain
      average (0.2+0.5+0.8)/3 = 0.50. Find the true overall P(flee) and name his
      error.
    solution: |
      Law of total probability (weight by the species shares):
      P(flee) = 0.50*0.2 + 0.30*0.5 + 0.20*0.8 = 0.10 + 0.15 + 0.16 = 0.41.
      Meowth's error: he took the unweighted average (0.50), valid only if the
      three species were equally likely. The correct weighted average is 0.41.
    answer: 0.41
    shortcut_used: ["total probability weights conditional rates by case probabilities"]
    verify: "(abs((0.50*0.2 + 0.30*0.5 + 0.20*0.8) - 0.41) < 1e-9) and (abs((0.2+0.5+0.8)/3 - 0.50) < 1e-9)"

  - id: C2.26
    chapter: 2
    tier: elite_challenge
    archetype: decision
    outcomes: ["1c", "1e"]
    distributions: []
    provenance: original
    difficulty: 4
    actor: "Ash"
    stakes: "One catch needed: draw two balls from a mixed bag, or buy a single guaranteed Poke Ball?"
    consequence: "The two options are the same probability object -- with vs. without the safe pick."
    quest_step: 23
    narrative_hook: "DECISION: chance both draws are Poke Balls vs. a guaranteed single."
    statement: |
      A bag has 7 Poke Balls and 3 Great Balls. Option A: draw two without
      replacement and you 'win' only if BOTH are Poke Balls. Option B: a vendor
      sells one guaranteed Poke Ball. Compute P(win) for Option A, and state
      which option more reliably yields a Poke Ball in hand.
    solution: |
      Option A: P(both Poke) = (7/10)(6/9) = 42/90 = 7/15 = 0.4667.
      Option B: a guaranteed Poke Ball is P = 1.
      Since 0.4667 < 1, Option B (the guaranteed single) more reliably yields a
      Poke Ball. The 'two draws' framing tempts you to over-value a 70% first
      draw, but the without-replacement second factor (6/9) drags it below half.
    answer: "A: 7/15 = 0.4667; B is more reliable (1 > 0.4667)"
    shortcut_used: ["multiplication rule without replacement; compare to the certain option"]
    verify: "(abs((7/10)*(6/9) - 7/15) < 1e-9) and ((7/10)*(6/9) < 1.0)"
