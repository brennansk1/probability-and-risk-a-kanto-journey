    provenance: original
    difficulty: 4
    actor: "Officer Jenny"
    stakes: "A recovered pair of Poke Balls -- which of two suspect bags did it come from?"
    consequence: "The without-replacement likelihood per bag drives the source posterior."
    quest_step: 20
    narrative_hook: "Counting + Bayes: which bag did the recovered pair come from?"
    statement: |
      Bag 1 has 6 Poke Balls and 4 Great Balls; Bag 2 has 3 Poke Balls and
      7 Great Balls. Pick a bag at random, draw two without replacement; both are
      Poke Balls. Find P(Bag 1 | two Poke).
    solution: |
      Likelihoods: P(2 Poke|Bag1) = (6/10)(5/9) = 1/3;
      P(2 Poke|Bag2) = (3/10)(2/9) = 1/15.
      Priors 1/2 each. Joints: Bag1 = 1/6; Bag2 = 1/30; total = 1/5.
      P(Bag1 | 2 Poke) = (1/6)/(1/5) = 5/6 = 0.833.
    answer: 0.833
    shortcut_used: ["Bayes with a without-replacement likelihood per source"]
    verify: "abs(((1/2)*(6/10)*(5/9))/((1/2)*(6/10)*(5/9) + (1/2)*(3/10)*(2/9)) - 5/6) < 1e-9"

  - id: C2.20
    chapter: 2
    tier: elite_challenge
    archetype: standard
    outcomes: ["1g"]
    distributions: []
    provenance: original
