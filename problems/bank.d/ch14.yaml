    quest_step: 19
    narrative_hook: "Computing the cross-moment E[XY] on the Mewtwo triangle as a covariance preview."
    statement: |
      For the Mewtwo triangle f(x,y) = 8xy on 0<x<y<1, find the cross-moment
      E[XY] = double integral of x*y*f over the support.
    solution: |
      E[XY] = int_0^1 int_x^1 x*y*8xy dy dx = int_0^1 8x^2 [y^3/3]_x^1 dx
      = int_0^1 (8/3)x^2 (1 - x^3) dx = (8/3)(1/3 - 1/6) = (8/3)(1/6) = 4/9 ≈ 0.4444.
    answer: "E[XY] = 4/9 ≈ 0.4444"
    shortcut_used: ["E[XY] = double integral of xy*f over the triangular support"]
    verify: "abs(__import__('scipy.integrate').integrate.dblquad(lambda y,x: x*y*8*x*y, 0,1, lambda x: x, 1)[0] - 4/9) < 1e-9"

  - id: C14.18
    chapter: 14
    tier: elite_challenge
    archetype: standard
    outcomes: ["3a"]
    distributions: ["joint_continuous"]
    structural_tags: ["uniform_square", "region_probability", "geometry"]
    provenance: original
    difficulty: 4
    actor: "Ash"
    stakes: "A geometric probability over the lab grid checks the blast-spread model."
    consequence: "The area answer calibrates how far apart the two markers usually land."
    quest_step: 20
    narrative_hook: "Computing a geometric probability that the two lab-floor markers land close together."
    statement: |
      Two markers are dropped independently and uniformly on the unit square,
      f(x,y) = 1 on [0,1]^2. Find P(|X - Y| < 1/2).
    solution: |
      P(|X-Y|<1/2) = 1 - P(|X-Y|>=1/2). The two corner triangles where |X-Y|>=1/2
      each have legs 1/2, so each area = (1/2)(1/2)(1/2) = 1/8; together 1/4. Thus
      P(|X-Y|<1/2) = 1 - 1/4 = 3/4 = 0.75.
    answer: "P(|X - Y| < 1/2) = 3/4 = 0.75"
    shortcut_used: ["uniform square: probability = area; complement the two corner triangles"]
    verify: "abs((1 - 2*0.5*0.5*0.5) - 0.75) < 1e-12"

  - id: C14.19
    chapter: 14
    tier: elite_challenge
    archetype: standard
    outcomes: ["3b"]
    distributions: ["joint_continuous"]
    structural_tags: ["independent_exponentials", "race_probability"]
    provenance: original
    difficulty: 4
    actor: "Brock"
    stakes: "Two fainted Pokemon are reviving; which recovers first sets the battle order."
    consequence: "The race probability decides who Brock sends out first after the Mansion skirmish."
    quest_step: 21
    narrative_hook: "Finding which of two independent exponential recovery timers finishes first."
    statement: |
      Two Pokemon's recovery times are independent exponentials, X with mean 2
      minutes and Y with mean 3 minutes. Find P(X < Y), the chance the first
      recovers before the second.
    solution: |
      For independent exponentials with rates lam_X = 1/2 (mean 2) and lam_Y = 1/3
      (mean 3), P(X<Y) = lam_X/(lam_X+lam_Y) = (1/2)/(1/2+1/3) = (1/2)/(5/6)
      = 3/5 = 0.60.
    answer: "P(X < Y) = 3/5 = 0.60"
    shortcut_used: ["race of independent exponentials: P(X<Y) = rate_X/(rate_X+rate_Y)"]
    verify: "abs(((1/2)/((1/2)+(1/3))) - 0.6) < 1e-9"

