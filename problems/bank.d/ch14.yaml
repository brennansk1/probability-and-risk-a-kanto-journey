    stakes: "An asymmetric ledger hides a clean uniform conditional worth exploiting."
    consequence: "Spotting the uniform conditional gives E[Y] almost for free via double expectation preview."
    quest_step: 17
    narrative_hook: "Mining an asymmetric ledger whose conditional turns out uniform."
    statement: |
      A log uses density f(x,y) = (3/8)x on the triangle 0<y<x<2. (a) Find the
      marginal f_X(x). (b) Show the conditional of Y given X=x is uniform on (0,x),
      and use it to find E[Y] via E[Y] = E[X/2].
    solution: |
      (a) For fixed x, y runs 0->x: f_X(x) = int_0^x (3/8)x dy = (3/8)x*x = (3/8)x^2
      on 0<x<2. Check: int_0^2 (3/8)x^2 dx = (3/8)(8/3) = 1.
      (b) f_{Y|X}(y|x) = (3/8)x / ((3/8)x^2) = 1/x for 0<y<x — Uniform(0,x), so
      E[Y|X=x] = x/2. Then E[Y] = E[X/2] = (1/2)E[X]
      = (1/2)int_0^2 x*(3/8)x^2 dx = (1/2)(3/8)(16/4) = (1/2)(3/2) = 3/4 = 0.75.
    answer: "f_X(x) = (3/8)x^2; E[Y] = 0.75"
    shortcut_used: ["uniform conditional => E[Y|X]=X/2; tower property gives E[Y]"]
    verify: "abs(0.5*__import__('scipy.integrate').integrate.quad(lambda x: x*(3/8)*x*x,0,2)[0] - 0.75) < 1e-9"

  - id: C14.14
    chapter: 14
    tier: elite_challenge
    archetype: standard
    outcomes: ["3a", "3b"]
    distributions: ["joint_continuous"]
    structural_tags: ["independent_exponentials", "region_probability", "capped_support"]
    provenance: original
    difficulty: 5
    actor: "The Warden (commissioner)"
    stakes: "The reinsurer needs the chance total fire+smoke damage stays under 2."
    consequence: "The region integral is the reinsurer's expected-payout footprint for the treaty."
    quest_step: 18
    narrative_hook: "Pricing a low-loss day as a region integral over independent exponentials."
    statement: |
      Fire damage X and smoke damage Y (in thousands) are independent exponentials
      each with mean 1. Find P(X+Y < 2), the chance total damage stays under 2.
    solution: |
      f(x,y) = e^-x e^-y. P(X+Y<2) = int_0^2 int_0^{2-x} e^-x e^-y dy dx
      = int_0^2 e^-x (1 - e^-(2-x)) dx = int_0^2 (e^-x - e^-2) dx
      = (1 - e^-2) - 2e^-2 = 1 - 3e^-2 ≈ 0.5940. (Equivalently X+Y ~ Gamma(2,1),
      cdf 1 - e^-2(1+2).)
    answer: "P(X+Y < 2) = 1 - 3*e^(-2) ≈ 0.5940"
    shortcut_used: ["sum of independent exponentials = Gamma; or integrate over x+y<2"]
    verify: "abs((1 - 3*__import__('math').exp(-2)) - __import__('scipy.integrate').integrate.dblquad(lambda y,x: __import__('math').exp(-x-y), 0,2, 0, lambda x: 2-x)[0]) < 1e-9"

