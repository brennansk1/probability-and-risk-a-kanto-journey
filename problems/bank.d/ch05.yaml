problems:

  # ===================== ROUTE TRAINERS (mechanics) =====================

  - id: C5.1
    chapter: 5
    tier: route_trainer
    archetype: "direct conditional probability from a contingency tally"
    outcomes: ["1c"]
    distributions: []
    provenance: original
    difficulty: 1
    narrative_hook: "Cataloguing Route 24 Pokemon by type and habitat."
    statement: |
      Of 100 Pokemon logged on Route 24: 40 are Water-type, 30 live in tall
      grass, and 12 are both Water-type and live in tall grass. Given that one
      lives in tall grass, find the probability it is Water-type.
    solution: |
      P(Water | grass) = P(Water and grass)/P(grass) = (12/100)/(30/100)
      = 12/30 = 0.40.
    answer: 0.40
    shortcut_used: ["conditioning shrinks the world to B"]
    verify: "abs((12/30) - 0.40) < 1e-9"

  - id: C5.2
    chapter: 5
    tier: route_trainer
    archetype: "conditional probability, draw without replacement"
    outcomes: ["1c", "1e"]
    distributions: []
    provenance: original
    difficulty: 1
    narrative_hook: "Drawing balls from Brock's bag for the road."
    statement: |
      A bag has 5 Poke Balls and 4 Great Balls. Two are drawn without
      replacement. Given the first drawn is a Poke Ball, find the probability
      the second is a Great Ball.
    solution: |
      After removing one Poke Ball, 8 balls remain, 4 of them Great:
      P(2nd Great | 1st Poke) = 4/8 = 0.5.
    answer: 0.5
    shortcut_used: ["multiplication rule conditional"]
    verify: "abs((4/8) - 0.5) < 1e-9"

  - id: C5.3
    chapter: 5
    tier: route_trainer
    archetype: "at-least-one via complement, independent events"
    outcomes: ["1d", "1e"]
    distributions: []
    provenance: original
    difficulty: 2
    narrative_hook: "Will Bill's lighthouse beacon shine tonight?"
    statement: |
      Two independent circuits power the beacon: circuit 1 works w.p. 0.9,
      circuit 2 w.p. 0.8. The beacon shines if at least one works. Find the
      probability it shines.
    solution: |
      P(shines) = 1 - P(both fail) = 1 - (0.1)(0.2) = 1 - 0.02 = 0.98.
    answer: 0.98
    shortcut_used: ["1 - P(none)", "independence product"]
    verify: "abs((1 - 0.1*0.2) - 0.98) < 1e-9"

  - id: C5.4
    chapter: 5
    tier: route_trainer
    archetype: "exactly one of two independent events"
    outcomes: ["1d", "1e"]
    distributions: []
    provenance: original
    difficulty: 2
    narrative_hook: "Ash and Misty independently try to catch a Tentacool."
    statement: |
      Ash catches a Tentacool w.p. 0.6, Misty w.p. 0.7, independently. Find the
      probability that exactly one of them catches it.
    solution: |
      P(exactly one) = 0.6*(1-0.7) + (1-0.6)*0.7 = 0.18 + 0.28 = 0.46.
    answer: 0.46
    shortcut_used: ["independence"]
    verify: "abs((0.6*0.3 + 0.4*0.7) - 0.46) < 1e-9"

  - id: C5.5
    chapter: 5
    tier: route_trainer
    archetype: "law of total probability, forward"
    outcomes: ["1f"]
    distributions: []
    provenance: original
    difficulty: 2
    narrative_hook: "Will Misty's gym flood today?"
    statement: |
      30% of days are rainy. The gym floods w.p. 0.5 on rainy days and 0.05 on
      dry days. Find the probability the gym floods on a random day.
    solution: |
      P(flood) = (0.3)(0.5) + (0.7)(0.05) = 0.15 + 0.035 = 0.185.
    answer: 0.185
    shortcut_used: ["partition by weather, weighted average"]
    verify: "abs((0.3*0.5 + 0.7*0.05) - 0.185) < 1e-9"

  - id: C5.6
    chapter: 5
    tier: route_trainer
    archetype: "two-way Bayes on a negative result"
    outcomes: ["1c", "1g"]
    distributions: []
    provenance: original
    difficulty: 2
    narrative_hook: "Reading a negative quick-scan at the Pokemon Center."
    statement: |
      Joy's scan flags 90% of sick Pokemon and 20% of healthy ones; 10% are
      sick. A Pokemon scans negative. Find P(sick | negative).
    solution: |
      P(neg|sick)=0.10, P(neg|healthy)=0.80.
      joint sick = 0.10*0.10 = 0.010; joint healthy = 0.90*0.80 = 0.720;
      total = 0.730. P(sick|neg) = 0.010/0.730 ~= 0.0137.
    answer: 0.0137
    shortcut_used: ["Bayes grid"]
    verify: "abs((0.10*0.10)/(0.10*0.10 + 0.90*0.80) - 0.0137) < 1e-3"

  - id: C5.7
    chapter: 5
    tier: route_trainer
    archetype: "chained multiplication rule, without replacement"
    outcomes: ["1c", "1e"]
    distributions: []
    provenance: original
    difficulty: 1
    narrative_hook: "Drawing TM discs blind from a shuffled stack."
    statement: |
      A stack has 3 Fire TMs and 2 Water TMs. Draw two in order without
      replacement. Find the probability both are Fire TMs.
    solution: |
      P(both Fire) = (3/5)*(2/4) = 6/20 = 0.30.
    answer: 0.30
    shortcut_used: ["multiplication rule"]
    verify: "abs((3/5)*(2/4) - 0.30) < 1e-9"

  - id: C5.8
    chapter: 5
    tier: route_trainer
    archetype: "independence test via the addition rule"
    outcomes: ["1d", "1e"]
    distributions: []
    provenance: original
    difficulty: 2
    narrative_hook: "Checking whether two logged Route-24 traits move together."
    statement: |
      For logged Route-24 Pokemon, A = Water-type, B = found near the river, with
      P(A)=0.4, P(B)=0.5, P(A union B)=0.65. Are A and B independent? Justify.
    solution: |
      P(A and B) = P(A)+P(B)-P(A union B) = 0.4+0.5-0.65 = 0.25.
      P(A)P(B) = 0.4*0.5 = 0.20. Since 0.25 != 0.20, A and B are NOT independent
      (positively associated).
    answer: "not independent (0.25 vs 0.20)"
    shortcut_used: ["inclusion-exclusion for the intersection"]
    verify: "abs((0.4+0.5-0.65) - 0.25) < 1e-9 and (0.25 != 0.4*0.5)"

  # ===================== GYM BATTLES (SOA difficulty) =====================

  - id: C5.9
    chapter: 5
    tier: gym_battle
    archetype: "n-way Bayes from a 3-way partition"
    outcomes: ["1c", "1f", "1g"]
    distributions: []
    provenance: original
