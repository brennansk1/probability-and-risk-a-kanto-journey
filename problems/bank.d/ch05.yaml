    narrative_hook: "Identifying the species of a Pokemon that just fled."
    statement: |
      A wild Pokemon is Goldeen (0.50), Seaking (0.30), or Horsea (0.20). It
      flees w.p. 0.2, 0.5, 0.8 respectively. It fled. Find P(Horsea | fled).
    solution: |
      joints: Goldeen 0.50*0.2=0.10; Seaking 0.30*0.5=0.15; Horsea 0.20*0.8=0.16.
