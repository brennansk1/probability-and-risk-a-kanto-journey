  - id: C5.23
    chapter: 5
    tier: elite_challenge
    archetype: rival_trap
    outcomes: ["2d"]
    distributions: ["poisson"]
    provenance: original
    difficulty: 4
    actor: "Gary Oak"
    stakes: "Gary adds two Poisson probabilities to get the total-count pmf."
    consequence: "Adding masses isn't even a valid pmf; you add parameters, not probabilities."
    quest_step: 23
    tia_section: "A.5.5"
    narrative_hook: "Catching Gary add Poisson probabilities instead of superposing rates."
    statement: |
      Gary has Gastly ~ Poisson(3) and Haunter ~ Poisson(1) independent, and computes
      P(total = 2) = P(G = 2) + P(H = 2). Explain why this is wrong, and give the
      correct distribution of the total and P(total = 2).
    solution: |
      Independent Poissons add their RATES: total ~ Poisson(3+1) = Poisson(4), so
      P(total = 2) = e^{-4} 4^2 / 2! = 8 e^{-4} = 8(0.018316) = 0.1465. Gary's error:
      P(G=2) + P(H=2) adds probabilities, which is meaningless (not even a valid pmf)
      -- you add the parameters, not the masses.
    answer: "Poisson(4), P(2) = 0.1465"
    shortcut_used: ["superposition: add rates then Poisson pmf"]
    verify: "abs((__import__('math').exp(-4)*4**2/2) - 0.1465) < 1e-4"
