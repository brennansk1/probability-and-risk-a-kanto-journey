    quest_step: 15
    tia_section: "A.5.5"
    narrative_hook: "Thinning a Poisson pollen swarm to its perfume-grade spores."
    statement: |
      Pollen drifts at lambda = 10/min (Poisson); each spore is perfume-grade w.p.
      0.2 independently. Find the distribution and mean of perfume-grade spores per
      minute.
    solution: |
      Thinning: keeping each spore w.p. 0.2 gives perfume-grade ~ Poisson(10 x 0.2)
      = Poisson(2), mean 2. Thinning preserves the Poisson family.
    answer: "Poisson(2), mean 2"
    shortcut_used: ["thinning: kept count ~ Poisson(lambda p)"]
    verify: "abs((10*0.2) - 2) < 1e-9"

  - id: C5.15
    chapter: 5
    tier: gym_battle
    archetype: standard
    outcomes: ["2d"]
    distributions: ["negative_binomial"]
    provenance: original
    difficulty: 3
    actor: "the Game Corner token counter"
    stakes: "You wait for the 4th win and need both the mean loss count and a single pmf value."
    consequence: "Mean rq/p and one pmf term together summarize the waiting game."
    quest_step: 16
    tia_section: "A.5.3"
    narrative_hook: "Negative binomial mean plus a single pmf value, waiting for the 4th win."
    statement: |
      You wait for the 4th win; each round wins w.p. 0.3. Find E[losses before the
      4th win] and P(exactly 1 loss before the 4th win).
    solution: |
      With r = 4, p = 0.3, q = 0.7: E[losses] = rq/p = 4(0.7)/0.3 = 9.333.
      P(X = 1) = C(1+4-1, 1) p^4 q^1 = C(4,1)(0.3)^4(0.7) = 4(0.0081)(0.7) = 0.02268
      (rounded 0.0227).
    answer: "E = 9.33; P(X=1) = 0.0227"
    shortcut_used: ["negbin mean rq/p", "negbin pmf C(k+r-1,k) p^r q^k"]
    verify: "abs((4*0.7/0.3) - 9.3333333333) < 1e-4 and abs((math.comb(4,1)*0.3**4*0.7) - 0.02268) < 1e-4"

  - id: C5.16
    chapter: 5
    tier: gym_battle
    archetype: audit
    outcomes: ["2d"]
    distributions: ["geometric"]
    provenance: original
    difficulty: 2
    actor: "Team Rocket (Jessie)"
    stakes: "Jessie argues 20 failures make success within five more trials near-certain."
    consequence: "The 20 failures change nothing; the fresh-start answer is far below certainty."
    quest_step: 17
    tia_section: "A.5.2"
    narrative_hook: "Catching Jessie's gambler's fallacy on a low-p geometric wait."
    statement: |
      A geometric wait has p = 0.1. Jessie argues "after 20 failures the chance of
      success within the next 5 trials must be near certain." Find the true
      P(success within the next 5 | 20 failures) and name the error.
    solution: |
      Memorylessness: P(success within next 5 | 20 failures) =
      P(X <= 5 from a fresh start) = 1 - q^5 = 1 - 0.9^5 = 1 - 0.59049 = 0.4095.
      Jessie's error: the 20 failures do not raise the future chance -- the answer is
      the same 0.4095 as from a cold start, nowhere near certain.
    answer: "1 - 0.9^5 = 0.4095 (not ~1)"
    shortcut_used: ["memorylessness discards the past; 1 - q^n"]
    verify: "abs((1 - 0.9**5) - 0.4095) < 1e-4"

  - id: C5.18
    chapter: 5
    tier: gym_battle
    archetype: standard
    outcomes: ["2d"]
    distributions: ["poisson"]
    provenance: original
    difficulty: 3
    actor: "the Pokedex Actuary Mode"
    stakes: "A 50-pull slot at small p is a textbook many-rare-trials Poisson approximation."
    consequence: "The binomial-to-Poisson limit replaces a heavy binomial with lambda = np."
    quest_step: 18
    tia_section: "A.5.4"
    narrative_hook: "Binomial-to-Poisson limit: approximating exactly two wins in 50 pulls."
    statement: |
      A slot pulled n = 50 times wins each pull w.p. p = 0.04. Approximate
      P(exactly 2 wins) with a Poisson, and state the lambda.
    solution: |
      lambda = np = 50(0.04) = 2. P(exactly 2) ~ e^{-2} 2^2 / 2! = 2 e^{-2}
      = 2(0.135335) = 0.2707.
    answer: "Poisson(2), P(2) = 0.2707"
    shortcut_used: ["Binom(n,p) ~ Poisson(np) for large n, small p"]
    verify: "abs((__import__('math').exp(-2)*2**2/2) - 0.2707) < 1e-4"

  - id: C5.24
    chapter: 5
    tier: gym_battle
    archetype: audit
    outcomes: ["2d"]
    distributions: ["poisson"]
    provenance: original
    difficulty: 3
    actor: "Team Rocket (Jessie)"
    stakes: "Jessie computes a five-minute lull with the per-minute lambda and gets near 1."
    consequence: "Skipping the rescale mislabels a below-average lull as near-certain."
    quest_step: 19
    tia_section: "A.5.4"
    narrative_hook: "Catching Jessie skip the Poisson window rescaling."
    statement: |
      Gastly at 3/min. Jessie computes P(fewer than 10 over five minutes) using
      lambda = 3 and gets ~1. Find the correct probability and name the error.
    solution: |
      Correct lambda = 3 x 5 = 15, giving P(Y < 10) = sum_{k=0}^{9} e^{-15} 15^k/k!
      = 0.0699. Jessie's error: she used the per-minute lambda = 3 for a five-minute
      window; that sum_{k=0}^{9} e^{-3} 3^k/k! ~ 0.9989 ~ 1 wrongly calls a
      below-average lull near-certain. Always rescale lambda = rate x window.
    answer: "0.0699 (not ~1; rescale to lambda = 15)"
    shortcut_used: ["rescale lambda = rate x window before the pmf"]
    verify: "abs(sum(__import__('math').exp(-15)*15**k/math.factorial(k) for k in range(10)) - 0.0699) < 1e-4 and sum(__import__('math').exp(-3)*3**k/math.factorial(k) for k in range(10)) > 0.99"

  # ===================== ELITE CHALLENGE (post-game) =====================

  - id: C5.19
    chapter: 5
    tier: elite_challenge
    archetype: standard
    outcomes: ["2d"]
    distributions: ["poisson"]
    provenance: original
    difficulty: 4
    actor: "Erika"
    stakes: "Thin the swarm, rescale to three minutes, then complement for at-least-one."
    consequence: "Chaining thinning, rescaling, and complement gives the bloom probability."
    quest_step: 20
    tia_section: "A.5.4, A.5.5"
    narrative_hook: "Thinning plus window plus complement, chained for the three-minute bloom."
    statement: |
      Pollen at lambda = 10/min; perfume-grade w.p. 0.2. (a) Distribution of
      perfume-grade per minute. (b) Over three minutes, P(>= 1 perfume-grade).
    solution: |
      (a) Thinning: perfume-grade per minute ~ Poisson(10 x 0.2) = Poisson(2).
      (b) Over 3 min, lambda = 2 x 3 = 6; P(>= 1) = 1 - e^{-6} = 1 - 0.002479
      = 0.9975.
    answer: "Poisson(2); 1 - e^{-6} = 0.9975"
    shortcut_used: ["thinning lambda p", "rescale to window", "P(>=1) = 1 - e^{-lambda}"]
    verify: "abs((10*0.2) - 2) < 1e-9 and abs((1 - __import__('math').exp(-6)) - 0.9975) < 1e-4"

  - id: C5.20
    chapter: 5
    tier: elite_challenge
    archetype: standard
    outcomes: ["2d"]
    distributions: ["geometric"]
    provenance: original
    difficulty: 4
    actor: "Professor Oak"
    stakes: "Oak asks you to derive the geometric mean from the survival sum, not quote it."
    consequence: "A from-scratch derivation proves you own q/p under exam pressure."
    quest_step: 21
    tia_section: "A.5.0a, A.5.1"
    narrative_hook: "Deriving the geometric (failures) mean from the survival-sum and the series."
    statement: |
      For X ~ Geom(p) (failures version), derive E[X] = q/p using
      E[X] = sum_{k>=0} P(X > k) and the geometric series. Evaluate at p = 0.2.
    solution: |
      Failures version: P(X > k) = q^{k+1} (more than k failures means >= k+1).
      E[X] = sum_{k>=0} q^{k+1} = q sum_{k>=0} q^k = q/(1-q) = q/p.
      At p = 0.2: E[X] = 0.8/0.2 = 4.0.
    answer: "q/p; 4.0"
    shortcut_used: ["E[X] = sum P(X>k)", "geometric series sum"]
    verify: "abs((0.8/0.2) - 4.0) < 1e-9 and abs(sum(0.8**(k+1) for k in range(100000)) - 4.0) < 1e-3"

