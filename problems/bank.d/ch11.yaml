    statement: |
      ENRICHMENT (not Exam P). A loss has Pareto survival S(x) = (1/x)^{2.5} for
      x >= 1 (x_m = 1, alpha = 2.5). Find P(X > 4) and E[X].
    solution: |
      P(X>4) = (1/4)^{2.5} = 4^{-2.5} = 0.03125.
      Since alpha = 2.5 > 1, the mean exists: E[X] = alpha*x_m/(alpha-1)
      = 2.5*1/1.5 = 5/3 = 1.6667.
    answer: "P(X>4)=0.03125; E[X]=5/3=1.6667"
    shortcut_used: ["Pareto survival (x_m/x)^alpha", "Pareto mean alpha*x_m/(alpha-1) for alpha>1"]
