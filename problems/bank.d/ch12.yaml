# Problem bank — Chapter 12 (Viridian Gym): Conditional & Double Expectation,
# Conditional & Total Variance, Compound random variables. Outcomes 3c-3d.
# Schema per problems/bank.yaml header. This file is owned by Chapter 12 only.
# Verify expressions use ONLY the names exposed by sims/verify_examples.py
# (math, st, abs, round, sum); no __import__.

problems:

  # ===================== ROUTE TRAINERS (mechanics) =====================

  - id: C12.1
    chapter: 12
    tier: route_trainer
    archetype: "law of total expectation, two-group discrete"
    outcomes: ["3c"]
    distributions: [discrete]
    provenance: original
    difficulty: 1
    narrative_hook: "Predict the grunt count before a Rocket scout reports its camp."
    statement: |
      A Rocket scout reports from one of two camps: forest (P=0.6) or cave
      (P=0.4). The grunt count X has E[X|forest]=4 and E[X|cave]=9. Find E[X].
    solution: |
      Law of total expectation: E[X] = sum_y E[X|Y=y] P(Y=y)
      = 4(0.6) + 9(0.4) = 2.4 + 3.6 = 6.
    answer: 6
    shortcut_used: ["weighted average of conditional means"]
    verify: "abs((4*0.6 + 9*0.4) - 6) < 1e-9"

  - id: C12.2
    chapter: 12
    tier: route_trainer
    archetype: "law of total expectation, two-group discrete"
    outcomes: ["3c"]
    distributions: [discrete]
    provenance: original
    difficulty: 1
    narrative_hook: "Log a wild Diglett's expected burrow depth across soil types."
    statement: |
      A Diglett's burrow depth X given soil type Y: soft (P=0.7) with
      E[X|soft]=30 cm, rocky (P=0.3) with E[X|rocky]=12 cm. Find E[X].
    solution: |
      E[X] = 30(0.7) + 12(0.3) = 21 + 3.6 = 24.6 cm.
    answer: 24.6
    shortcut_used: ["weighted average of conditional means"]
    verify: "abs((30*0.7 + 12*0.3) - 24.6) < 1e-9"

  - id: C12.3
    chapter: 12
    tier: route_trainer
    archetype: "law of total expectation, three-group discrete"
    outcomes: ["3c"]
    distributions: [discrete]
    provenance: original
    difficulty: 1
    narrative_hook: "Tally hourly Marowak sightings across tower floors."
    statement: |
      Hourly Marowak count X given floor Y has conditional means 20, 35, 50 on
      floors with probabilities 0.5, 0.3, 0.2. Find E[X].
    solution: |
      E[X] = 20(0.5) + 35(0.3) + 50(0.2) = 10 + 10.5 + 10 = 30.5.
    answer: 30.5
    shortcut_used: ["weighted average of conditional means"]
    verify: "abs((20*0.5 + 35*0.3 + 50*0.2) - 30.5) < 1e-9"

  - id: C12.4
    chapter: 12
    tier: route_trainer
    archetype: "expected conditional variance (Term 1 of total variance)"
    outcomes: ["3d"]
    distributions: [discrete]
    provenance: original
    difficulty: 2
    narrative_hook: "Average a Rhyhorn's within-anger-level charge variance."
    statement: |
      Rhyhorn charge distance X given anger Y in {1,2,3}, each P=1/3. The
      conditional variances are 4, 9, 16. Find E[Var(X|Y)] (Term 1 only).
    solution: |
      E[Var(X|Y)] = (1/3)(4 + 9 + 16) = 29/3 = 9.667.
    answer: 9.667
    shortcut_used: ["weighted average of conditional variances"]
    verify: "abs((4+9+16)/3 - 9.6667) < 1e-3"

  - id: C12.5
    chapter: 12
    tier: route_trainer
    archetype: "variance of conditional mean (Term 2) then total variance"
    outcomes: ["3d"]
    distributions: [discrete]
    provenance: original
    difficulty: 2
    narrative_hook: "Finish the Rhyhorn total-variance decomposition."
    statement: |
      For the Rhyhorn of C12.4, the conditional means are 5, 11, 20 (each
      P=1/3) and conditional variances 4, 9, 16. Find Var(E[X|Y]) (Term 2) and
      then Var(X).
    solution: |
      E[g] = (5+11+20)/3 = 12. E[g^2] = (25+121+400)/3 = 546/3 = 182.
      Var(g) = 182 - 144 = 38 (Term 2).
      Var(X) = Term1 + Term2 = 29/3 + 38 = 9.667 + 38 = 47.667.
    answer: "Var(g)=38; Var(X)=47.667"
    shortcut_used: ["law of total variance, both terms"]
    verify: "abs(((25+121+400)/3 - ((5+11+20)/3)**2) - 38) < 1e-6 and abs(((4+9+16)/3 + 38) - 47.6667) < 1e-3"

  - id: C12.6
    chapter: 12
    tier: route_trainer
    archetype: "total expectation, exponential with random mean"
    outcomes: ["3c"]
    distributions: [exponential, discrete]
    provenance: original
    difficulty: 2
    narrative_hook: "Expected Nidoran recovery time with a randomly chosen rate."
    statement: |
      A Nidoran's recovery time is X | Lambda ~ Exponential(mean = Lambda),
      where Lambda is 4 or 8 each with probability 1/2. Find E[X].
    solution: |
      E[X|Lambda] = Lambda (exponential mean), so
      E[X] = E[Lambda] = (1/2)(4) + (1/2)(8) = 6.
    answer: 6
    shortcut_used: ["E[X]=E[E[X|Y]]", "exponential mean = its scale"]
    verify: "abs((0.5*4 + 0.5*8) - 6) < 1e-9"

  - id: C12.7
    chapter: 12
    tier: route_trainer
    archetype: "compound mean E[S]=E[N]mu"
    outcomes: ["3c"]
    distributions: [compound]
    provenance: original
    difficulty: 1
    narrative_hook: "Expected total damage from a random number of attacks."
    statement: |
      A team lands N attacks with E[N]=5; each attack does damage with mean
      mu=8, independent of N. Find E[S], the expected total damage.
    solution: |
      Compound mean: E[S] = E[N] * mu = 5 * 8 = 40.
    answer: 40
    shortcut_used: ["E[S]=E[N]mu"]
    verify: "abs((5*8) - 40) < 1e-9"

  # ===================== GYM BATTLES (SOA difficulty) =====================

  - id: C12.8
    chapter: 12
    tier: gym_battle
    archetype: "total variance, two-group decomposition + interpretation"
    outcomes: ["3c", "3d"]
    distributions: [discrete]
    provenance: original
    difficulty: 3
    narrative_hook: "Decompose the variance of a rigged Game Corner wheel payout."
    statement: |
      Payout X given wheel setting Y: setting A (P=0.5) with E[X|A]=2,
      Var(X|A)=1; setting B (P=0.5) with E[X|B]=10, Var(X|B)=4. Find E[X],
      Var(X), and state whether within-setting noise or setting choice dominates.
    solution: |
      E[X] = 2(0.5) + 10(0.5) = 6.
      Term1 E[Var(X|Y)] = 1(0.5) + 4(0.5) = 2.5.
      Term2: means 2,10 -> E[g^2] = 4(0.5)+100(0.5)=52; Var(g)=52-36=16.
      Var(X) = 2.5 + 16 = 18.5. Setting choice (16) dominates noise (2.5).
    answer: "E[X]=6; Var(X)=18.5 (setting choice dominates)"
    shortcut_used: ["law of total variance, both terms"]
    verify: "abs((2*0.5+10*0.5) - 6) < 1e-9 and abs(((1*0.5+4*0.5) + ((4*0.5+100*0.5) - 6**2)) - 18.5) < 1e-9"

  - id: C12.9
    chapter: 12
    tier: gym_battle
    archetype: "exponential with random scale, total variance (continuous mixture)"
    outcomes: ["3c", "3d"]
    distributions: [exponential, uniform]
    provenance: original
    difficulty: 3
    narrative_hook: "Sandslash daily foraging mass with a uniform random scale."
    statement: |
      Sandslash foraging mass X | Theta ~ Exponential(mean = Theta), with
      Theta ~ Uniform(2,6). Find E[X] and Var(X).
    solution: |
      E[X|Theta]=Theta, Var(X|Theta)=Theta^2 (exponential facts).
      Theta~Unif(2,6): E[Theta]=4, Var(Theta)=(6-2)^2/12=16/12=1.333,
      E[Theta^2]=1.333+16=17.333.
      E[X]=E[Theta]=4.
      Var(X)=E[Var(X|Theta)]+Var(E[X|Theta])=E[Theta^2]+Var(Theta)
            =17.333+1.333=18.667.
    answer: "E[X]=4; Var(X)=18.667"
    shortcut_used: ["total variance with exponential inner", "uniform moments"]
    verify: "abs(4 - (2+6)/2) < 1e-9 and abs((( (6-2)**2/12 + 4**2 ) + (6-2)**2/12) - 18.6667) < 1e-3"

  - id: C12.10
    chapter: 12
    tier: gym_battle
    archetype: "compound Poisson mean and variance"
    outcomes: ["3c", "3d"]
    distributions: [poisson, compound]
    provenance: original
    difficulty: 3
    narrative_hook: "Total smoke-bomb obscuration from a Poisson number of bombs."
    statement: |
      A grunt fires N ~ Poisson(lambda=4) smoke bombs; each obscures by an iid
      amount with mean mu=3, variance sigma^2=5. Let S be total obscuration.
      Find E[S] and Var(S).
    solution: |
      E[S] = lambda*mu = 4*3 = 12.
      Compound Poisson: Var(S) = lambda*(sigma^2 + mu^2) = 4*(5+9) = 4*14 = 56.
    answer: "E[S]=12; Var(S)=56"
    shortcut_used: ["compound Poisson Var=lambda*E[X^2]"]
    verify: "abs((4*3) - 12) < 1e-9 and abs((4*(5+9)) - 56) < 1e-9"

  - id: C12.11
    chapter: 12
    tier: gym_battle
    archetype: "Poisson-Gamma mixture (negative binomial), total exp + var"
    outcomes: ["3c", "3d"]
    distributions: [poisson, gamma]
    provenance: original
    difficulty: 4
    narrative_hook: "Encounter counts with a Gamma-distributed local density."
    statement: |
      Encounters per hour N | Lambda ~ Poisson(Lambda), where the density
      Lambda ~ Gamma(alpha=3, theta=2) so E[Lambda]=6, Var(Lambda)=12. Find
      E[N] and Var(N).
    solution: |
      Poisson inner: E[N|Lambda]=Var(N|Lambda)=Lambda.
      E[N] = E[E[N|Lambda]] = E[Lambda] = 6.
      Var(N) = E[Var(N|Lambda)] + Var(E[N|Lambda]) = E[Lambda] + Var(Lambda)
             = 6 + 12 = 18. (Overdispersed: negative-binomial mixture.)
    answer: "E[N]=6; Var(N)=18"
    shortcut_used: ["Poisson inner: mean=variance=Lambda", "total variance"]
    verify: "abs((3*2) - 6) < 1e-9 and abs(((3*2) + (3*2**2)) - 18) < 1e-9"

  - id: C12.12
    chapter: 12
    tier: gym_battle
    archetype: "total variance with Poisson outer layer and linear conditional"
    outcomes: ["3c", "3d"]
    distributions: [poisson]
    provenance: original
    difficulty: 3
    narrative_hook: "Prize money that scales with the round a trainer reaches."
    statement: |
      Prize X given round Y: E[X|Y]=100Y, Var(X|Y)=400Y, with Y ~ Poisson(2).
      Find E[X] and Var(X).
    solution: |
      E[X] = E[100Y] = 100 E[Y] = 100(2) = 200.
      Term1 = E[Var(X|Y)] = E[400Y] = 400(2) = 800.
      Term2 = Var(E[X|Y]) = Var(100Y) = 100^2 Var(Y) = 10000(2) = 20000.
      Var(X) = 800 + 20000 = 20800.
    answer: "E[X]=200; Var(X)=20800"
    shortcut_used: ["law of total variance", "Var(aY)=a^2 Var(Y)", "Poisson mean=var"]
    verify: "abs((100*2) - 200) < 1e-9 and abs((400*2 + 100**2*2) - 20800) < 1e-9"

  - id: C12.13
    chapter: 12
    tier: gym_battle
    archetype: "uniform-given-discrete mixture, total expectation + variance"
    outcomes: ["3c", "3d"]
    distributions: [uniform, discrete]
    provenance: original
    difficulty: 4
    narrative_hook: "Roll a die, then draw a card worth Uniform(0,Y)."
    statement: |
      Roll a fair die Y in {1..6}, then X ~ Uniform(0,Y). With E[X|Y]=Y/2 and
      Var(X|Y)=Y^2/12, find E[X] and Var(X).
    solution: |
      Die: E[Y]=3.5, E[Y^2]=91/6=15.1667, Var(Y)=15.1667-12.25=2.9167.
      E[X]=E[Y/2]=1.75.
      Term1 = E[Y^2/12] = 15.1667/12 = 1.2639.
      Term2 = Var(Y/2) = (1/4)Var(Y) = (1/4)(2.9167) = 0.7292.
      Var(X) = 1.2639 + 0.7292 = 1.9931.
    answer: "E[X]=1.75; Var(X)=1.993"
    shortcut_used: ["total variance with uniform inner", "die moments"]
    verify: "abs(((91/6)/12 + 0.25*((91/6) - 3.5**2)) - 1.9931) < 1e-3 and abs((3.5/2) - 1.75) < 1e-9"

  - id: C12.14
    chapter: 12
    tier: gym_battle
    archetype: "compound with geometric count"
    outcomes: ["3c", "3d"]
    distributions: [geometric, compound]
    provenance: original
    difficulty: 4
    narrative_hook: "Total squad strength when squad size is geometric."
    statement: |
      Each grunt commands N Pokemon, N geometric on {1,2,3,...} with
      P(N=n)=(0.4)(0.6)^(n-1), so E[N]=2.5, Var(N)=3.75. Each Pokemon's
      strength is iid with mu=60, sigma^2=100. Find E[S] and Var(S).
    solution: |
      E[S] = E[N]mu = 2.5*60 = 150.
      Var(S) = E[N]sigma^2 + Var(N)mu^2 = 2.5(100) + 3.75(3600)
             = 250 + 13500 = 13750.
    answer: "E[S]=150; Var(S)=13750"
    shortcut_used: ["compound mean/variance formulas (general N)"]
    verify: "abs((2.5*60) - 150) < 1e-9 and abs((2.5*100 + 3.75*60**2) - 13750) < 1e-9"

  # ===================== ELITE CHALLENGE (integrative) =====================

  - id: C12.15
    chapter: 12
    tier: elite_challenge
    archetype: "two-layer: compound Poisson nested in a tier mixture"
    outcomes: ["3c", "3d"]
    distributions: [poisson, compound, discrete]
    provenance: original
    difficulty: 5
    narrative_hook: "Giovanni's hidden-squad threat with compound damage per tier."
    statement: |
      Tier Y: P(Y=1)=0.5, P(Y=2)=0.3, P(Y=3)=0.2. Given tier y, damage X is
      compound-Poisson with attack count mean lambda_y and per-attack severity
      mean mu_y, variance sigma_y^2:
        y=1: lambda=2, mu=12, sigma^2=36
        y=2: lambda=4, mu=18, sigma^2=81
        y=3: lambda=5, mu=25, sigma^2=144
      Find E[X], Var(X), and the fraction of Var(X) from which tier fights.
    solution: |
      Conditional means lambda_y*mu_y: 24, 72, 125.
      E[X] = 24(0.5)+72(0.3)+125(0.2) = 12+21.6+25 = 58.6.
      Conditional variances lambda_y(sigma_y^2+mu_y^2):
        2(36+144)=360; 4(81+324)=1620; 5(144+625)=3845.
      Term1 = 360(0.5)+1620(0.3)+3845(0.2)=180+486+769=1435.
      Term2: E[g^2]=24^2(0.5)+72^2(0.3)+125^2(0.2)=288+1555.2+3125=4968.2;
             Var(g)=4968.2-58.6^2=4968.2-3433.96=1534.24.
      Var(X) = 1435 + 1534.24 = 2969.24.
      Fraction from tier choice = 1534.24/2969.24 = 0.517 (~52%).
    answer: "E[X]=58.6; Var(X)=2969.24 (~52% from tier choice)"
    shortcut_used: ["compound Poisson Var=lambda(sigma^2+mu^2)", "law of total variance"]
    verify: "abs(((2*12)*0.5+(4*18)*0.3+(5*25)*0.2) - 58.6) < 1e-6 and abs(((2*(36+12**2)*0.5+4*(81+18**2)*0.3+5*(144+25**2)*0.2) + (((2*12)**2*0.5+(4*18)**2*0.3+(5*25)**2*0.2) - 58.6**2)) - 2969.24) < 1e-2"

  - id: C12.16
    chapter: 12
    tier: elite_challenge
    archetype: "normal-normal mixture, recognize convolution, tail probability"
    outcomes: ["3c", "3d"]
    distributions: [normal]
    provenance: original
    difficulty: 4
    narrative_hook: "A Rocket experiment whose normal output has a random center."
    statement: |
      X | Y ~ Normal(mu=Y, sigma^2=4) with Y ~ Normal(50, 9). Find E[X], Var(X),
      identify the distribution of X, and find P(X > 56).
    solution: |
      E[X] = E[Y] = 50.
      Var(X) = E[Var(X|Y)] + Var(E[X|Y]) = 4 + 9 = 13.
      Normal mean + normal center -> X ~ Normal(50, 13), sigma=sqrt(13)=3.606.
      P(X>56) = 1 - Phi((56-50)/3.606) = 1 - Phi(1.664) = 1 - 0.9519 = 0.0481.
    answer: "X~Normal(50,13); P(X>56)=0.048"
    shortcut_used: ["total variance", "normal mixture stays normal", "Phi tail"]
    verify: "abs((4+9) - 13) < 1e-9 and abs((1 - st.norm.cdf((56-50)/math.sqrt(13))) - 0.0481) < 1e-3"

  - id: C12.17
    chapter: 12
    tier: elite_challenge
    archetype: "compound Poisson, exponential severity, CLT tail"
    outcomes: ["3c", "3d"]
    distributions: [poisson, exponential, compound, normal]
    provenance: original
    difficulty: 5
    narrative_hook: "Price aggregate annual claims on a Rocket insurance scam."
    statement: |
      Aggregate claims S: N ~ Poisson(lambda=10) claims, each severity
      X_i ~ Exponential(mean=200), independent. Find E[S], Var(S), the
      coefficient of variation SD(S)/E[S], and (treating S as approximately
      normal) P(S > 2600).
    solution: |
      Exponential mean 200: mu=200, sigma^2=40000, E[X^2]=sigma^2+mu^2=80000
      (= 2 theta^2).
      E[S] = lambda*mu = 10*200 = 2000.
      Var(S) = lambda*E[X^2] = 10*80000 = 800000; SD(S)=sqrt(800000)=894.43.
      CV = 894.43/2000 = 0.447.
      CLT: P(S>2600) = 1 - Phi((2600-2000)/894.43) = 1 - Phi(0.671)
                     = 1 - 0.7488 = 0.2512.
    answer: "E[S]=2000; Var(S)=800000; CV=0.447; P(S>2600)=0.251"
    shortcut_used: ["compound Poisson Var=lambda*E[X^2]", "CLT normal approx"]
    verify: "abs((10*200) - 2000) < 1e-9 and abs((10*(40000+200**2)) - 800000) < 1e-9 and abs((1 - st.norm.cdf((2600-2000)/math.sqrt(800000))) - 0.2512) < 1e-3"
