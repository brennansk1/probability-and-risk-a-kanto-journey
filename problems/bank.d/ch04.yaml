    consequence: "Knowing the team count tells him how many distinct line-ups he could legally register."
    quest_step: 3
    narrative_hook: "Picking a 3-Pokemon team where the sheet order is irrelevant."
    statement: |
      From the same 7 caught Pokemon you select a 3-Pokemon team for a battle
      (order on the team sheet is irrelevant). How many distinct teams?
    solution: |
      Unordered, no reuse: C(7,3) = 7*6*5 / 3! = 210/6 = 35 teams.
      (= P(7,3)/3! — the same scene as C4.2 with order discarded.)
    answer: 35
    shortcut_used: ["divide the permutation count by k!"]
