# Problem bank — Chapter 4 (Viridian Forest -> Pewter City): Combinatorics —
# fundamental counting principle, permutations, combinations, the binomial,
# multinomial arrangements, and the hypergeometric (without-replacement)
# probability. Outcomes 1b, 2d. Tier-B chapter. Locale: Pewter (Brock / Boulder).
#
# Schema per problem (MASTER_PLAN_V3 §22, §28):
#   id, chapter, tier (route_trainer|gym_battle|elite_challenge),
#   archetype (audit|rival_trap|decision|standard), outcomes, distributions,
#   difficulty (1-5), actor, stakes, consequence, quest_step, narrative_hook,
#   statement, solution, answer, shortcut_used, verify.
#
# verify: a SELF-CONTAINED Python boolean the seed-151 harness can eval. It exposes
# math (comb/perm/factorial), st (scipy.stats), and __import__; chained problems
# RESTATE the prior value as a given so verify never depends on another answer.
#
# Immersion quotas met: audit >=3 (C4.8, C4.14, C4.24); rival_trap >=2
# (C4.13, C4.17); decision >=1 (C4.26).

problems:

  # ===================== ROUTE TRAINERS (the early legs) =====================

  - id: C4.1
    chapter: 4
    tier: route_trainer
    archetype: standard
    outcomes: ["1b"]
    distributions: []
    provenance: original
    difficulty: 1
    actor: "Ash (at the forest gate)"
    stakes: "The forest gate is locked and nightfall is coming; he must know the worst-case number of codes."
    consequence: "Sizing the search tells him whether brute-forcing the lock is even feasible before dark."
    quest_step: 1
    narrative_hook: "Brute-forcing the forest gate's 4-dial lock."
    statement: |
      The forest gate's lock has 4 dial positions, each an independent digit
      0-9 with repeats allowed. How many distinct codes must you be prepared
      to try in the worst case?
    solution: |
      Four independent stages, 10 choices each, repeats allowed:
      10 * 10 * 10 * 10 = 10^4 = 10000 codes.
    answer: 10000
    shortcut_used: ["multiply equal menus -> n^k"]
    verify: "10**4 == 10000"

  - id: C4.2
    chapter: 4
    tier: route_trainer
    archetype: standard
    outcomes: ["1b"]
    distributions: []
    provenance: original
    difficulty: 1
    actor: "Professor Oak (by Pokedex)"
    stakes: "Oak wants a labelled photo line-up of three caught Pokemon, left-to-right, for his field log."
    consequence: "A correctly ordered photo lets Oak catalogue which Pokemon was caught in which order."
    quest_step: 2
    narrative_hook: "Posing 3 of your 7 caught Pokemon left-to-right for a photo."
    statement: |
      You have caught 7 distinct Pokemon and display 3 of them left-to-right in
      a photo (order is part of the picture). How many distinct photos?
    solution: |
      Ordered, no reuse: P(7,3) = 7*6*5 = 210 photos.
    answer: 210
    shortcut_used: ["shrinking-menu permutation"]
    verify: "math.perm(7, 3) == 210"

  - id: C4.3
    chapter: 4
    tier: route_trainer
    archetype: standard
    outcomes: ["1b"]
    distributions: []
    provenance: original
    difficulty: 1
    actor: "Ash (registering a team)"
