  - id: C16.4
    chapter: 16
    tier: route_trainer
    archetype: standard
    outcomes: ["3d"]
    distributions: [discrete]
    structural_tags: ["total_variance", "expected_conditional_variance"]
    provenance: original
    difficulty: 2
    actor: "A wild Rhyhorn"
    stakes: "You need the within-anger spread of a Rhyhorn's charge to time a dodge."
    consequence: "Term 1 alone tells you the irreducible charge noise at fixed anger."
    quest_step: 4
    narrative_hook: "Gauge a Rhyhorn's charge spread within each anger level (Term 1 only)."
    statement: |
      A Rhyhorn's charge distance X given anger Y in {1,2,3} (each P=1/3) has
      conditional variances 4, 9, 16. Find E[Var(X|Y)] (Term 1 of total variance).
    solution: |
      Term 1 = E[Var(X|Y)] = (1/3)(4) + (1/3)(9) + (1/3)(16)
      = (4+9+16)/3 = 29/3 ≈ 9.667.
    answer: 9.667
    shortcut_used: ["expected conditional variance = weighted avg of within-group variances"]
    verify: "abs(((4+9+16)/3) - 29/3) < 1e-9 and abs(29/3 - 9.6667) < 1e-3"

  - id: C16.5
    chapter: 16
    tier: route_trainer
    archetype: standard
    outcomes: ["3d"]
    distributions: [discrete]
    structural_tags: ["total_variance", "variance_of_conditional_mean"]
    provenance: original
    difficulty: 2
    actor: "A wild Rhyhorn"
    stakes: "Now you need the full charge-distance variance, not just the within-anger piece."
    consequence: "Both terms together tell you the true unpredictability of the charge."
    quest_step: 5
    narrative_hook: "Add the between-anger term to finish the Rhyhorn charge variance."
    statement: |
      For the same Rhyhorn, the conditional means are 5, 11, 20 (each P=1/3) and
      conditional variances 4, 9, 16. Find Var(E[X|Y]) (Term 2), then state Var(X).
    solution: |
      Means 5, 11, 20 each weight 1/3: E[g] = (5+11+20)/3 = 12;
      E[g^2] = (25+121+400)/3 = 546/3 = 182; Var(g) = 182 - 12^2 = 38 (Term 2).
      Term 1 = (4+9+16)/3 = 29/3 ≈ 9.667.
      Var(X) = 9.667 + 38 = 47.667.
    answer: "Var(g)=38, Var(X)=47.667"
    shortcut_used: ["Term 2 = variance of the conditional means", "total variance = Term1 + Term2"]
    verify: "abs(((25+121+400)/3 - ((5+11+20)/3)**2) - 38) < 1e-9 and abs((29/3 + 38) - 47.6667) < 1e-3"

  - id: C16.6
    chapter: 16
