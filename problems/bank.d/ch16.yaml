# Problem bank — Chapter 16 (Viridian Gym, Giovanni unmasked): Conditional &
# Double Expectation, Conditional & Total Variance, Compound/mixture variables.
# Outcomes 3c, 3d.  Tier-A chapter.  Locale: Viridian Gym (Giovanni / Earth).
#
# Schema per problem (MASTER_PLAN_V3 §22, §28), mirroring problems/bank.d/ch02.yaml:
#   id, chapter, tier (route_trainer|gym_battle|elite_challenge),
#   archetype (audit|rival_trap|decision|standard), outcomes,
#   distributions, structural_tags, provenance, difficulty (1-5),
#   actor, stakes, consequence, quest_step, narrative_hook, statement, solution,
#   answer, shortcut_used, verify.
#
# verify: a SELF-CONTAINED Python boolean the seed-151 harness can eval. It exposes
# math, st (scipy.stats), and __import__; chained problems RESTATE the prior value as
# a given so verify never depends on another problem's answer.
#
# Immersion quotas met: audit >=3 (C16.7, C16.15, C16.17); rival_trap >=2
# (C16.13, C16.16); decision >=1 (C16.8, C16.18). The chapter's Team Rocket error
# (using E[X|Y] as a number via Jensen's trap) is recycled into the audit C16.7.

problems:

  # ===================== ROUTE TRAINERS (the early legs) =====================

  - id: C16.1
    chapter: 16
    tier: route_trainer
    archetype: standard
    outcomes: ["3c"]
    distributions: [discrete]
    structural_tags: ["total_expectation"]
    provenance: original
    difficulty: 1
    actor: "A Rocket scout"
    stakes: "Giovanni's first trial: predict the grunt count before the scout names its camp."
    consequence: "A correct forecast lets you brace for the right squad size."
    quest_step: 1
    narrative_hook: "Predict the grunt count before a Rocket scout reports its camp."
    statement: |
      A Rocket scout reports from one of two camps: forest (P=0.6) or cave
      (P=0.4). The grunt count X has E[X|forest]=4 and E[X|cave]=9. Find E[X].
    solution: |
      Law of total expectation: E[X] = sum_y E[X|Y=y] P(Y=y)
      = 4(0.6) + 9(0.4) = 2.4 + 3.6 = 6.
    answer: 6
    shortcut_used: ["weighted average of conditional means"]
    verify: "abs((4*0.6 + 9*0.4) - 6) < 1e-9"

