  - id: C15.23
    chapter: 15
    tier: gym_battle
    archetype: "gamma tail via the Poisson-sum identity"
    outcomes: ["2d3"]
    distributions: [gamma]
    provenance: original
    difficulty: 4
    narrative_hook: "Mock C: a gamma tail solved by the Poisson-sum identity."
    statement: |
      X ~ Gamma(alpha=2, theta=3). Find P(X > 6).
    solution: |
      For integer shape alpha, the gamma tail is a Poisson sum:
      P(X>x) = e^(-x/theta) * sum_{j=0}^{alpha-1} (x/theta)^j / j!.
      Here x/theta = 6/3 = 2 and alpha=2: P(X>6) = e^(-2)(1 + 2) = 3e^(-2)
      ~= 0.4060.
    answer: 0.4060
    shortcut_used: ["gamma tail = Poisson-sum identity"]
    verify: "abs(3*math.exp(-2) - 0.4060) < 1e-3"

  - id: C15.24
    chapter: 15
