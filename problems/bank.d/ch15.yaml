# Problem bank — Chapter 15 (Victory Road): Joint moments E[g(X,Y)], covariance,
# correlation, variance of sums / linear combinations, and sums of independent
# in-family distributions. Outcomes 3e, 3g, 3h. Tier-A chapter.
# Locale: Victory Road (the team as one combined total; the final climb before the League).
#
# Schema per problem (MASTER_PLAN_V3 §22, §28):
#   id, chapter, tier (route_trainer|gym_battle|elite_challenge),
#   archetype (audit|rival_trap|decision|standard), outcomes, difficulty (1-5),
#   actor, stakes, consequence, quest_step, narrative_hook, statement, solution,
#   answer, shortcut_used, verify.
#
# verify: a SELF-CONTAINED Python boolean the seed-151 harness can eval. It exposes
# math, st (scipy.stats), and __import__; chained problems RESTATE the prior value as
# a given so verify never depends on another problem's answer.
#
# Immersion quotas met: audit >=3 (C15.15, C15.21, C15.22); rival_trap >=2
# (C15.10, C15.12); decision >=1 (C15.20).
# Team Rocket's chapter error (adding standard deviations) is recycled into the
# audit drill C15.21.

problems:

  # ===================== ROUTE TRAINERS (the lower ledges) =====================

  - id: C15.1
    chapter: 15
    tier: route_trainer
    archetype: standard
    outcomes: ["3g"]
    distributions: []
    provenance: original
    difficulty: 1
    actor: "Ash (logging the team)"
    stakes: "Oak needs the combined push of the first two climbers off the entrance ledge."
    consequence: "A correct independent-sum variance anchors the whole team's risk profile."
    quest_step: 1
    narrative_hook: "Logging Pikachu + Charizard combined push on the entrance ledge."
    statement: |
      On the entrance ledge, Pikachu's strength output X has Var(X)=4 and
      Charizard's Y has Var(Y)=9. They are independent. Find Var(X+Y).
    solution: |
      Independent => Cov(X,Y)=0, so Var(X+Y)=Var(X)+Var(Y)=4+9=13.
    answer: "13"
    shortcut_used: ["independence kills the covariance term"]
    verify: "abs((4 + 9) - 13) < 1e-9"

  - id: C15.2
    chapter: 15
    tier: route_trainer
    archetype: standard
    outcomes: ["3g"]
    distributions: []
    provenance: original
    difficulty: 1
    actor: "Ash (logging the team)"
    stakes: "Now the two climbers feed off each other; Oak wants both the sum and the tag-out swing."
    consequence: "Getting the cross-term sign right is the load-bearing skill for the climb."
    quest_step: 2
    narrative_hook: "Pikachu and Charizard now feed off each other; the tag-out swing."
    statement: |
      Same two climbers as C15.1 (Var(X)=4, Var(Y)=9) but now Cov(X,Y)=2.
      Find Var(X+Y) and Var(X-Y).
    solution: |
      Var(X+Y)=Var(X)+Var(Y)+2Cov=4+9+2(2)=17.
      Var(X-Y)=Var(X)+Var(Y)-2Cov=4+9-2(2)=9.
      The variances always ADD; only the cross-term changes sign.
    answer: "Var(X+Y)=17, Var(X-Y)=9"
    shortcut_used: ["only the cross-term flips sign"]
    verify: "abs((4+9+2*2) - 17) < 1e-9 and abs((4+9-2*2) - 9) < 1e-9"

  - id: C15.3
    chapter: 15
    tier: route_trainer
    archetype: standard
    outcomes: ["3e"]
    distributions: []
    provenance: original
    difficulty: 1
    actor: "Brock"
    stakes: "Brock has a correlation but needs the covariance to feed the variance-of-a-sum machine."
    consequence: "Recovering Cov from rho and two SDs is the first move in most exam items here."
    quest_step: 3
    narrative_hook: "Brock converts a Geodude/Onix correlation into a covariance."
    statement: |
      Brock measures Geodude's output U (SD=5) and Onix's output V (SD=12) with
      correlation rho=0.4. Find Cov(U,V).
    solution: |
      Cov(U,V)=rho*SD(U)*SD(V)=0.4*5*12=24.
    answer: "24"
    shortcut_used: ["Cov = rho * SD * SD"]
    verify: "abs(0.4*5*12 - 24) < 1e-9"

  - id: C15.4
    chapter: 15
    tier: route_trainer
    archetype: standard
    outcomes: ["3e"]
    distributions: []
    provenance: original
    difficulty: 1
    actor: "Misty"
    stakes: "Misty reports a product moment; the team needs the sign of the link between her two Pokemon."
    consequence: "The sign of the covariance tells whether the pair moves together or against."
    quest_step: 4
    narrative_hook: "Misty's Staryu and Starmie spin-counts."
    statement: |
      Misty reports E[X]=3, E[Y]=5, E[XY]=16 for her two Pokemon's spin-counts.
      Find Cov(X,Y) and say whether they move together or apart.
    solution: |
      Cov(X,Y)=E[XY]-E[X]E[Y]=16-(3)(5)=16-15=1 > 0, so they move together.
    answer: "Cov=1 (move together)"
    shortcut_used: ["Cov = E[XY] - E[X]E[Y]"]
    verify: "abs((16 - 3*5) - 1) < 1e-9 and (16 - 3*5) > 0"

  - id: C15.5
    chapter: 15
    tier: route_trainer
    archetype: standard
    outcomes: ["3g", "3h"]
    distributions: []
    provenance: original
    difficulty: 2
    actor: "Ash (relay setup)"
    stakes: "A relay applies weights 3 and -2; Oak wants the spread of the weighted combination."
    consequence: "Confirms weights enter squared and a negative weight's sign vanishes in the variance."
    quest_step: 5
    narrative_hook: "A relay with effort weights 3 and -2 on two independent outputs."
    statement: |
      A relay uses weight a=3 on output X and b=-2 on output Y, where Var(X)=2,
      Var(Y)=5, and X,Y independent. Find Var(3X-2Y).
    solution: |
      Independent => no cross-term. Weights enter squared, so the sign vanishes:
      Var(3X-2Y)=3^2*Var(X)+(-2)^2*Var(Y)=9*2+4*5=18+20=38.
    answer: "38"
    shortcut_used: ["squared weights; sign of a weight vanishes"]
    verify: "abs((9*2 + 4*5) - 38) < 1e-9"

  - id: C15.6
    chapter: 15
    tier: route_trainer
    archetype: standard
    outcomes: ["3h"]
    distributions: [normal]
    provenance: original
    difficulty: 2
    actor: "Ash (scouting the gap)"
    stakes: "Two independent normal climbers; Oak needs the exact distribution of their gap."
    consequence: "A normal difference stays normal -- means subtract, variances ADD."
    quest_step: 6
    narrative_hook: "Two independent normal climbers; the distribution of their gap."
    statement: |
      X ~ Normal(10, 4) and Y ~ Normal(6, 9) (variances given) are independent.
      Identify the exact distribution of X - Y, with its mean and variance.
    solution: |
      Normals are closed under linear combinations.
      Mean: 10-6=4. Variance: 4+9=13 (variances ADD even for a difference).
      X - Y ~ Normal(4, 13).
    answer: "Normal(4, 13)"
    shortcut_used: ["normal sum/diff in-family; variances add"]
    verify: "abs((10-6) - 4) < 1e-9 and abs((4+9) - 13) < 1e-9"

  - id: C15.7
    chapter: 15
    tier: route_trainer
    archetype: standard
    outcomes: ["3h"]
    distributions: [poisson]
    provenance: original
    difficulty: 1
    actor: "Ash (corridor watch)"
    stakes: "Rattata stream in from two corridors; Oak wants the pooled count distribution."
    consequence: "Pooling independent Poisson rates collapses two streams into one."
    quest_step: 7
    narrative_hook: "Wild Rattata in two independent corridors."
    statement: |
      Wild Rattata appear independently in two corridors as Poisson(1.5) and
      Poisson(2.5). Identify the distribution of the total count and its
      mean and variance.
    solution: |
      Independent Poissons add: total ~ Poisson(1.5+2.5)=Poisson(4).
      For a Poisson, mean = variance = 4.
    answer: "Poisson(4); E=Var=4"
    shortcut_used: ["pool the Poisson rates"]
    verify: "abs((1.5+2.5) - 4) < 1e-9"

  - id: C15.20
    chapter: 15
    tier: route_trainer
    archetype: decision
    outcomes: ["3e", "3g"]
    distributions: []
    provenance: original
    difficulty: 2
    actor: "Ash (rope team choice)"
    stakes: "Two of your Pokemon must be roped together; the rope holds best when the combined output is steadiest."
    consequence: "Choosing the negatively-correlated pairing minimizes the total's variance -- diversification in action."
    quest_step: 8
    narrative_hook: "DECISION: pick the steadier pairing for the final rope team."
    statement: |
      You must rope two Pokemon together. Each candidate has SD 3 and SD 2
      (so Var 9 and Var 4). Pairing A: Charizard+Bulbasaur, rho=-0.5. Pairing B:
      Charizard+Geodude, rho=+0.5. The rope holds best when the COMBINED output
      X+Y is steadiest (smallest Var(X+Y)). Compute Var(X+Y) for each and decide.
    solution: |
      Cov = rho*SD_X*SD_Y with SD_X=3, SD_Y=2.
      Pairing A (rho=-0.5): Var(X+Y)=9+4+2(-0.5*3*2)=13-6=7.
      Pairing B (rho=+0.5): Var(X+Y)=9+4+2(+0.5*3*2)=13+6=19.
      Send Pairing A: the negative correlation makes the combined output far
      steadier (7 < 19). Negative covariance is the rope team's friend.
    answer: "A=7, B=19; send Pairing A"
    shortcut_used: ["Cov=rho*SD*SD; negative cov shrinks the sum's variance"]
    verify: "abs((9+4+2*(-0.5*3*2)) - 7) < 1e-9 and abs((9+4+2*(0.5*3*2)) - 19) < 1e-9 and (7 < 19)"

  # ===================== GYM BATTLES (the boss stretch) =====================

  - id: C15.8
    chapter: 15
    tier: gym_battle
    archetype: standard
    outcomes: ["3e"]
    distributions: []
    provenance: original
    difficulty: 3
    actor: "Ash (reading the cave RNG)"
    stakes: "The cave RNG gives a full joint pmf; Oak wants the covariance and correlation of boulders vs Onix."
    consequence: "A correct joint-moment sweep yields the sign and strength of the link."
    quest_step: 9
    narrative_hook: "Cave RNG joint pmf of boulders cleared and Onix met."
    statement: |
      Joint pmf of (X,Y): p(0,0)=0.2, p(1,0)=0.2, p(0,1)=0.1, p(1,1)=0.3,
      p(2,1)=0.2. Compute Cov(X,Y) and the correlation rho.
    solution: |
      X marginal: P(0)=0.3, P(1)=0.5, P(2)=0.2 => E[X]=0.9,
        E[X^2]=0+0.5+4*0.2=1.3, Var(X)=1.3-0.81=0.49.
      Y marginal (indicator): P(1)=0.6 => E[Y]=0.6, Var(Y)=0.6-0.36=0.24.
      E[XY] (nonzero only when both>=1): (1,1):0.3, (2,1):2*0.2=0.4 => E[XY]=0.7.
      Cov=0.7-0.9*0.6=0.7-0.54=0.16.
      rho=0.16/(sqrt(0.49)*sqrt(0.24))=0.16/(0.7*0.489898)=0.4666.
    answer: "Cov=0.16, rho~0.467"
    shortcut_used: ["Cov = E[XY] - E[X]E[Y]", "indicator: E[Y^2]=E[Y]"]
    verify: "abs((0.7 - 0.9*0.6) - 0.16) < 1e-9 and abs(0.16/((0.49**0.5)*(0.24**0.5)) - 0.4666) < 1e-3"

  - id: C15.9
    chapter: 15
    tier: gym_battle
    archetype: standard
    outcomes: ["3g"]
    distributions: []
    provenance: original
    difficulty: 3
    actor: "Ash (vanguard risk)"
    stakes: "A three-Pokemon vanguard has mixed-sign covariances; Oak needs the total's variance."
    consequence: "Mixed-sign cross-terms partly cancel -- getting each sign right is the whole point."
    quest_step: 10
    narrative_hook: "Three-Pokemon vanguard with mixed-sign covariances."
    statement: |
      Var(X1)=2, Var(X2)=3, Var(X3)=4; Cov(X1,X2)=1, Cov(X1,X3)=-1, X2 and X3
      uncorrelated. Find Var(X1+X2+X3).
    solution: |
      Var = (2+3+4) + 2(Cov12 + Cov13 + Cov23) = 9 + 2(1 - 1 + 0) = 9 + 0 = 9.
    answer: "9"
    shortcut_used: ["sum the variances plus twice each pairwise covariance"]
    verify: "abs((2+3+4 + 2*(1 + (-1) + 0)) - 9) < 1e-9"

  - id: C15.10
    chapter: 15
    tier: gym_battle
    archetype: rival_trap
    outcomes: ["3g", "3h"]
    distributions: []
    provenance: original
    difficulty: 3
    actor: "Gary (your rival)"
    stakes: "Gary brags he can scale a team total by just scaling the variances; the load-weighted total must be exact."
    consequence: "Weights enter SQUARED and the cross-term carries 2*a_i*a_j -- Gary's linear scaling is wrong."
    quest_step: 11
    narrative_hook: "RIVAL TRAP: Gary scales the team total but mishandles the weights."
    statement: |
      With the variances and covariances of C15.9 (Var(X1)=2, Var(X2)=3,
      Var(X3)=4; Cov12=1, Cov13=-1, Cov23=0), the load-weighted total is
      W = X1 + 2X2 + 3X3. Gary says "just scale each variance by its weight:
      2 + 2*3 + 3*4 = 20." Find the true Var(W) and name Gary's error.
    solution: |
      Weights a1=1, a2=2, a3=3 enter SQUARED on the variances.
      Diagonal: 1^2*2 + 2^2*3 + 3^2*4 = 2+12+36 = 50.
      Cross: 2[a1a2*Cov12 + a1a3*Cov13 + a2a3*Cov23]
           = 2[(1*2*1)+(1*3*-1)+(2*3*0)] = 2[2-3+0] = -2.
      Var(W) = 50 - 2 = 48.
      Gary's error: he scaled variances LINEARLY by the weights (a_i) and dropped
      the cross-terms. Weights enter squared (a_i^2), and each pair contributes
      2*a_i*a_j*Cov.
    answer: "48 (Gary's 20 is wrong)"
    shortcut_used: ["a_i^2 diagonal + 2 a_i a_j cross", "weights are squared, not linear"]
    verify: "abs((1*2 + 4*3 + 9*4) + 2*((1*2*1)+(1*3*-1)+(2*3*0)) - 48) < 1e-9 and (48 != 20)"

  - id: C15.11
    chapter: 15
    tier: gym_battle
    archetype: standard
    outcomes: ["3e"]
    distributions: []
    provenance: inspired-by
    difficulty: 4
    actor: "Ash (continuous cave attributes)"
    stakes: "Two linked cave attributes follow a continuous density; Oak needs their covariance."
    consequence: "A double-integral joint moment then a subtraction yields a (slightly negative) covariance."
    quest_step: 12
    narrative_hook: "Two linked cave attributes with density f=x+y on the unit square."
    statement: |
      A pair has joint density f(x,y)=x+y on 0<=x<=1, 0<=y<=1. Find Cov(X,Y).
      (You may use E[X]=E[Y]=7/12.)
    solution: |
      E[XY] = int_0^1 int_0^1 xy(x+y) dx dy
            = int_0^1 int_0^1 (x^2 y + x y^2) dx dy.
      Inner over x: y/3 + y^2/2. Outer over y: (1/3)(1/2)+(1/2)(1/3)=1/6+1/6=1/3.
      Cov = 1/3 - (7/12)^2 = 1/3 - 49/144 = 48/144 - 49/144 = -1/144 ~ -0.006944.
    answer: "-1/144 ~ -0.00694"
    shortcut_used: ["double integral for E[XY]"]
    verify: "abs((1/3 - (7/12)**2) - (-1/144)) < 1e-9"

  - id: C15.12
    chapter: 15
    tier: gym_battle
    archetype: rival_trap
    outcomes: ["3e"]
    distributions: [discrete_uniform]
    provenance: inspired-by
    difficulty: 3
    actor: "Gary (your rival)"
    stakes: "Gary sees rho=0 and declares the pair independent, planning to rope them separately."
    consequence: "rho=0 does NOT imply independence; Y=X^2 is the canonical curved counterexample."
    quest_step: 13
    narrative_hook: "RIVAL TRAP: Gary reads rho=0 as 'independent'."
    statement: |
      X is uniform on {-1,0,1} (each prob 1/3) and Y = X^2. Gary announces
      "rho=0, so X and Y are independent." Show Cov(X,Y)=0, show X and Y are NOT
      independent, and name Gary's error.
    solution: |
      E[X]=0 by symmetry. E[XY]=E[X*X^2]=E[X^3]=(1/3)((-1)+0+1)=0.
      Cov=E[XY]-E[X]E[Y]=0-0=0, so rho=0.
      Not independent: P(X=0,Y=1)=0 but P(X=0)P(Y=1)=(1/3)(2/3)=2/9 != 0.
      (Knowing X=0 forces Y=0.)
      Gary's error: he ran the one-way street backward. Independence => rho=0,
      but rho=0 does NOT imply independence -- correlation sees only LINEAR
      association, and Y=X^2 is purely curved.
    answer: "Cov=0 but dependent (Gary wrong)"
    shortcut_used: ["correlation sees only linear association"]
    verify: "abs(((1/3)*((-1)**3 + 0 + 1**3)) - 0) < 1e-9 and abs(0 - (1/3)*(2/3)) > 1e-9"

  - id: C15.13
    chapter: 15
    tier: gym_battle
    archetype: standard
    outcomes: ["3h"]
    distributions: [normal]
    provenance: adapted-from-SOA
    difficulty: 3
    actor: "Ash (the shaft check)"
    stakes: "The shaft clears only if combined output exceeds 25; Oak wants that probability."
    consequence: "Pool the independent normals, then standardize for the tail."
    quest_step: 14
    narrative_hook: "Shaft clears only if combined output exceeds 25."
    statement: |
      X ~ Normal(14, 9) and Y ~ Normal(8, 5) independent. Find P(X+Y > 25).
    solution: |
      X+Y ~ Normal(22, 14), SD=sqrt(14)=3.7417.
      z=(25-22)/3.7417=0.8018. P(X+Y>25)=P(Z>0.80)=1-0.7881=0.2119.
    answer: "~0.212"
    shortcut_used: ["pool normal params, then standardize"]
    verify: "abs((1 - st.norm.cdf((25-22)/math.sqrt(14))) - 0.2119) < 1e-2"

  - id: C15.14
    chapter: 15
    tier: gym_battle
    archetype: standard
    outcomes: ["3h"]
    distributions: [gamma]
    provenance: original
    difficulty: 2
    actor: "Ash (timing the climb)"
    stakes: "Two independent gamma climb-times share a scale; Oak wants the total-time distribution."
    consequence: "Same-scale gammas add shapes, giving a clean total-time gamma."
    quest_step: 15
    narrative_hook: "Two independent gamma climb-times sharing a scale."
    statement: |
      Independent times Gamma(2, theta) and Gamma(3, theta) with theta=4.
      Identify the distribution of the total time and give its mean and variance.
    solution: |
      Same scale => shapes add: total ~ Gamma(5, 4).
      Mean = alpha*theta = 5*4 = 20. Variance = alpha*theta^2 = 5*16 = 80.
    answer: "Gamma(5,4); E=20, Var=80"
    shortcut_used: ["same-scale Gammas add shapes"]
    verify: "abs(5*4 - 20) < 1e-9 and abs(5*4**2 - 80) < 1e-9"

  - id: C15.15
    chapter: 15
    tier: gym_battle
    archetype: audit
    outcomes: ["3e", "3g"]
    distributions: []
    provenance: original
    difficulty: 3
    actor: "A scout's recon note"
    stakes: "A scout's note claims the two-route portfolio variance 'just adds' to 325."
    consequence: "Dropping the negative cross-term overstates the variance and hides a real diversification benefit."
    quest_step: 16
    narrative_hook: "AUDIT: a recon note claims a diversification benefit; verify it."
    statement: |
      A two-route loss portfolio has Var(L1)=100, Var(L2)=225, correlation
      rho=-0.3. A scout's note claims "total variance is just 100+225=325."
      Compute the TRUE Var(L1+L2), state the diversification benefit over the
      note's value, and name the scout's error.
    solution: |
      Cov = rho*10*15 = -0.3*150 = -45.
      Var(L1+L2) = 100+225+2(-45) = 325-90 = 235.
      Note's value = 325. Benefit = 325-235 = 90 reduction (a 27.7% cut).
      Scout's error: dropping the 2*Cov cross-term -- variances do NOT just add
      unless Cov=0, and here the routes are negatively correlated.
    answer: "Var=235; benefit=90 (note's 325 wrong)"
    shortcut_used: ["Cov = rho*SD*SD; negative cov reduces total variance"]
    verify: "abs((100+225+2*(-0.3*10*15)) - 235) < 1e-9 and abs((325 - 235) - 90) < 1e-9"

  - id: C15.21
    chapter: 15
    tier: gym_battle
    archetype: audit
    outcomes: ["3g"]
    distributions: []
    provenance: original
    difficulty: 2
    actor: "Team Rocket (salvaged launcher log)"
    stakes: "Team Rocket's log added two net spreads as 6+8=14 and blew up the launcher."
    consequence: "Standard deviations never add; combining on the variance scale gives the true spread."
    quest_step: 17
    narrative_hook: "AUDIT: recycles Team Rocket's launcher blunder (adding SDs)."
    statement: |
      Team Rocket's salvaged log reads: "Net A spread SD=6, Net B spread SD=8,
      both fired together; combined spread = 6+8 = 14." Assuming the two nets are
      INDEPENDENT, compute the correct combined standard deviation and name the
      error.
    solution: |
      Combine on the VARIANCE scale: Var = 6^2 + 8^2 = 36+64 = 100.
      SD = sqrt(100) = 10.
      Error: the log added standard deviations (6+8=14). SDs never add; variances
      add (plus 2Cov if linked), and you take the square root only at the end.
      Even independent the true spread is 10, not 14.
    answer: "SD=10 (not 14)"
    shortcut_used: ["variances add, not SDs; sqrt only at the end"]
    verify: "abs(((6**2 + 8**2)**0.5) - 10) < 1e-9 and (10 != 14)"

  - id: C15.22
    chapter: 15
    tier: gym_battle
    archetype: audit
    outcomes: ["3h"]
    distributions: [binomial]
    provenance: original
    difficulty: 2
    actor: "A scouting-sweep note"
    stakes: "A note asserts two same-p binomial sweeps pool into Binom(10, 0.6)."
    consequence: "Same-p binomials add the n's, never the p's; the success probability is unchanged."
    quest_step: 18
    narrative_hook: "AUDIT: a binomial pooling claim to check."
    statement: |
      Two independent scouting sweeps record successful sightings as Binom(4, 0.3)
      and Binom(6, 0.3). A note asserts the combined count is Binom(10, 0.6).
      Identify the correct distribution of the total, give its mean and variance,
      and name the note's error.
    solution: |
      Same p=0.3 => add the n's: total ~ Binom(10, 0.3).
      Mean = n*p = 10*0.3 = 3. Variance = n*p*(1-p) = 10*0.3*0.7 = 2.1.
      Note's error: it added the p's (0.3+0.3=0.6). Same-p binomials add the n's,
      not the p's; the success probability is unchanged by pooling.
    answer: "Binom(10,0.3); E=3, Var=2.1 (note's p wrong)"
    shortcut_used: ["same-p Binomials add the n_i, not the p"]
    verify: "abs(10*0.3 - 3) < 1e-9 and abs(10*0.3*0.7 - 2.1) < 1e-9"

  # ===================== ELITE CHALLENGE (the summit push) =====================

  - id: C15.16
    chapter: 15
    tier: elite_challenge
    archetype: standard
    outcomes: ["3e", "3g"]
    distributions: []
    provenance: original
    difficulty: 4
    actor: "Ash (the whole team)"
    stakes: "Six teammates share a common pairwise covariance; Oak wants the total's variance and a part's link to the whole."
    consequence: "The pair-count derivation generalizes to any equicorrelated book -- the systematic-risk floor."
    quest_step: 19
    narrative_hook: "Six teammates with a common pairwise covariance climb together."
    statement: |
      Six teammates each have output variance sigma^2=4, and every distinct pair
      has covariance c=1. T = sum of all six. Derive Var(T) in terms of sigma^2
      and c via the count of pairs and evaluate it; also find Corr(X_i, T).
    solution: |
      Var(T) = n*sigma^2 + 2*C(n,2)*c = n*sigma^2 + n(n-1)*c.
      n=6: Var(T) = 6*4 + 6*5*1 = 24+30 = 54.
      Cov(X_i,T) = Var(X_i) + sum_{j!=i} Cov(X_i,X_j) = 4 + 5*1 = 9.
      Corr(X_i,T) = 9/(sqrt(4)*sqrt(54)) = 9/(2*7.34847) = 0.6124.
    answer: "Var(T)=54; Corr(X_i,T)~0.612"
    shortcut_used: ["count of pairs C(n,2)", "Cov(X_i,T) via bilinearity"]
    verify: "abs((6*4 + 6*5*1) - 54) < 1e-9 and abs(9/((4**0.5)*(54**0.5)) - 0.6124) < 1e-3"

