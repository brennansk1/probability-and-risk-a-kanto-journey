  # ===================== GYM BATTLES (true SOA difficulty) =====================

  - id: C15.13
    chapter: 15
    tier: gym_battle
    archetype: "CLT normal approximation to binomial, continuity correction"
    outcomes: ["3i"]
    distributions: [binomial, normal]
    provenance: original
    difficulty: 3
    narrative_hook: "Mock A: the upset count over 100 exhibition matches."
    statement: |
      The League runs 100 independent exhibition matches, each an upset with
      probability 0.3. Using the normal approximation with continuity
      correction, find P(at most 25 upsets).
    solution: |
      S ~ Binomial(100, 0.3): mu = np = 30, sigma^2 = np(1-p) = 21,
      sigma = sqrt(21) ~= 4.583. Discrete => continuity-correct at 25.5:
      P(S<=25) ~= Phi((25.5-30)/4.583) = Phi(-0.982) ~= 0.163.
    answer: 0.163
    shortcut_used: ["CLT", "continuity correction <=25 -> 25.5"]
    verify: "abs(st.norm.cdf((25.5-30)/math.sqrt(21)) - 0.163) < 2e-3"

  - id: C15.14
    chapter: 15
    tier: gym_battle
    archetype: "full loss policy: deductible, limit, coinsurance (exponential)"
    outcomes: ["2e", "2f"]
    distributions: [exponential]
    provenance: original
    difficulty: 3
    narrative_hook: "Mock A: a full Safari policy with all three features."
    statement: |
      Loss X ~ Exponential(theta=8) (thousands), ordinary deductible d=2,
      maximum covered loss u=10, coinsurance alpha=0.8. Find the expected
      payment per loss.
    solution: |
      Use E[Y_L] = alpha*(E[X ^ u] - E[X ^ d]). For an exponential,
      E[X ^ c] = theta(1 - e^(-c/theta)). E[X ^ 10] = 8(1 - e^(-1.25)) ~= 5.708;
      E[X ^ 2] = 8(1 - e^(-0.25)) ~= 1.770.
      E[Y_L] = 0.8(5.708 - 1.770) = 0.8(3.938) ~= 3.151 thousand.
    answer: 3.151
    shortcut_used: ["E[X^c]=theta(1-e^(-c/theta))", "alpha[(X^u)-(X^d)]"]
    verify: "abs(0.8*(8*(1-math.exp(-10/8)) - 8*(1-math.exp(-2/8))) - 3.151) < 2e-3"

  - id: C15.15
    chapter: 15
    tier: gym_battle
    archetype: "maximum order statistic, uniform"
    outcomes: ["3f"]
    distributions: [uniform]
    provenance: original
    difficulty: 3
    narrative_hook: "Mock A: the strongest of five challengers."
    statement: |
      Five independent challengers each have strength X_i ~ Uniform(0,1). Find
      the expected strength of the strongest.
    solution: |
      'Strongest of n' => maximum order statistic. For Uniform(0,1),
      E[max] = n/(n+1) = 5/6 ~= 0.8333. (Or F_max(x)=x^5, density 5x^4,
      E = integral_0^1 5x^5 dx = 5/6.)
    answer: 0.8333
    shortcut_used: ["E[max]=n/(n+1) for Unif(0,1)"]
    verify: "abs(5/6 - 0.8333) < 1e-3"

  - id: C15.16
    chapter: 15
    tier: gym_battle
    archetype: "double integral over a region"
    outcomes: ["3b"]
    distributions: [joint_continuous]
    provenance: original
    difficulty: 4
    narrative_hook: "Mock A: a joint density over a triangle."
    statement: |
      (X,Y) has joint density f(x,y) = 2 on {0 < x < y < 1}. Find P(Y < 2X).
    solution: |
      On the triangle 0<x<y<1 with f=2, the event Y<2X is the part with
      x < y < 2x, intersected with y<1. Split at x=1/2:
      integral_0^(1/2) integral_x^(2x) 2 dy dx + integral_(1/2)^1 integral_x^1 2 dy dx
      = integral_0^(1/2) 2x dx + integral_(1/2)^1 2(1-x) dx
      = 1/4 + 1/4 = 0.5.
    answer: 0.5
    shortcut_used: ["split the region at x=1/2; integrate constant density"]
    verify: "abs(0.5 - 0.5) < 1e-12"

  - id: C15.17
    chapter: 15
    tier: gym_battle
    archetype: "Bayesian posterior mean, beta update"
    outcomes: ["1g", "3c"]
    distributions: [beta, uniform]
    provenance: original
    difficulty: 4
    narrative_hook: "Mock B: Bayes with a continuous twist on a coin's bias."
    statement: |
      A coin's bias P is Uniform(0,1). Given P=p, a flip is heads with
      probability p. A single flip is heads. Find E[P | heads].
    solution: |
      Posterior is proportional to p * 1 on (0,1), i.e. Beta(2,1) with density
      2p. E[P | H] = integral_0^1 p * 2p dp = 2/3 ~= 0.6667. (Equivalently the
      Beta(2,1) mean alpha/(alpha+beta) = 2/3.)
    answer: 0.6667
    shortcut_used: ["posterior proportional to likelihood*prior", "Beta(2,1) mean"]
    verify: "abs(2/3 - 0.6667) < 1e-3"

  - id: C15.18
    chapter: 15
    tier: gym_battle
    archetype: "variance of a per-loss deductible payment, exponential"
    outcomes: ["2e", "2c"]
    distributions: [exponential]
    provenance: original
    difficulty: 4
    narrative_hook: "Mock B: variance of a deductible payment."
    statement: |
      Loss X ~ Exponential(theta=4), ordinary deductible d=2, no limit,
      alpha=1. For the per-loss payment Y = (X-2)_+, find Var(Y).
    solution: |
      Y = 0 with probability 1 - e^(-0.5); given Y>0, Y ~ Exponential(4) by
      memorylessness. E[Y] = 4 e^(-0.5) ~= 2.426;
      E[Y^2] = e^(-0.5) * 2 theta^2 = 32 e^(-0.5) ~= 19.41.
      Var(Y) = 19.41 - 2.426^2 ~= 19.41 - 5.89 = 13.52.
    answer: 13.52
    shortcut_used: ["memoryless exponential", "E[Y^2]=e^(-d/theta)*2theta^2", "Var=E[Y^2]-E[Y]^2"]
    verify: "abs((32*math.exp(-0.5) - (4*math.exp(-0.5))**2) - 13.52) < 0.05"

  - id: C15.19
    chapter: 15
    tier: gym_battle
    archetype: "sum of independent normals"
    outcomes: ["3h", "3g"]
    distributions: [normal]
    provenance: original
    difficulty: 3
    narrative_hook: "Mock B: two teammates' independent normal contributions."
    statement: |
      Two teammates' contributions are independent: A ~ Normal(20,16) and
      B ~ Normal(30,9). Find P(A+B > 60).
    solution: |
      Sums of independent normals stay normal: A+B ~ Normal(20+30, 16+9)
      = Normal(50, 25), sigma = 5. P(A+B>60) = 1 - Phi((60-50)/5)
      = 1 - Phi(2) = 1 - 0.9772 = 0.0228.
    answer: 0.0228
    shortcut_used: ["sum of independent normals: means add, variances add"]
    verify: "abs((1 - st.norm.cdf((60-50)/5)) - 0.0228) < 1e-3"

  - id: C15.20
    chapter: 15
    tier: gym_battle
    archetype: "conditional expectation from a density"
    outcomes: ["3c", "2b"]
    distributions: [continuous]
    provenance: original
    difficulty: 3
    narrative_hook: "Mock B: a conditional expectation from a triangular density."
    statement: |
      X has density f(x) = x/8 on 0 < x < 4. Find E[X | X > 2].
    solution: |
      P(X>2) = integral_2^4 x/8 dx = (1/16)(16-4) = 0.75.
      E[X; X>2] = integral_2^4 x * x/8 dx = (1/24)(64-8) = 56/24 ~= 2.333.
      E[X | X>2] = 2.333 / 0.75 ~= 3.111.
    answer: 3.111
    shortcut_used: ["E[X|A]=E[X;A]/P(A)"]
    verify: "abs((56/24)/0.75 - 3.111) < 1e-3"

  - id: C15.21
