    narrative_hook: "Mock B: three gadgets in series fail at the first failure."
    statement: |
      A trainer's three independent gadgets have lifetimes Exponential with
      means 4, 6, and 12 hours. The system fails when the first gadget fails
      (series). Find the expected time to first failure.
    solution: |
      The minimum of independent exponentials is exponential with the summed
      rate. Rates 1/4, 1/6, 1/12; total rate = 1/4 + 1/6 + 1/12
      = (3+2+1)/12 = 1/2. E[min] = 1/rate = 2 hours.
    answer: 2
    shortcut_used: ["min of exponentials: rates add", "E[min]=1/(sum of rates)"]
    verify: "abs(1/(1/4 + 1/6 + 1/12) - 2) < 1e-9"

  - id: C15.29
    chapter: 15
    tier: elite_challenge
    archetype: "double expectation + law of total variance (compound)"
    outcomes: ["3c", "3d"]
    distributions: [poisson, compound]
    provenance: original
    difficulty: 4
    narrative_hook: "Mock C: total grunt strength as a compound sum."
    statement: |
      The number of grunts N ~ Poisson(lambda=3). Given N=n, each grunt's
      strength is i.i.d. with mean 2 and variance 5; let S be the total
      strength. Find E[S] and Var(S).
    solution: |
      Compound sum. E[S] = E[N] E[str] = 3(2) = 6.
      By the law of total variance,
      Var(S) = E[N] Var(str) + Var(N) E[str]^2 = 3(5) + 3(2^2) = 15 + 12 = 27
      (Poisson N => E[N]=Var(N)=3; equals lambda E[str^2] = 3(5+4) = 27).
    answer: "E[S]=6, Var(S)=27"
    shortcut_used: ["compound mean E[N]E[X]", "law of total variance", "compound-Poisson Var=lambda E[X^2]"]
    verify: "abs(3*2 - 6) < 1e-9 and abs(3*5 + 3*2**2 - 27) < 1e-9"

  - id: C15.30
    chapter: 15
    tier: elite_challenge
    archetype: "i.i.d. Poisson sum + CLT with continuity correction"
    outcomes: ["2d2", "3i"]
    distributions: [poisson, normal]
    provenance: original
    difficulty: 4
    narrative_hook: "Mock C final turn: portfolio-total claim count."
    statement: |
      Claim counts per policy are Poisson(lambda=0.5). A portfolio holds 400
      independent policies; let M be the total number of claims.
      (a) Find E[M] and Var(M).
      (b) Using the normal approximation with continuity correction, find
      P(M >= 210).
    solution: |
      (a) A sum of independent Poissons is Poisson with summed rate:
      M ~ Poisson(400 * 0.5 = 200), so E[M] = 200, Var(M) = 200,
      sigma = sqrt(200) ~= 14.142.
      (b) M is discrete, so correct at 209.5:
      P(M>=210) ~= 1 - Phi((209.5-200)/14.142) = 1 - Phi(0.672)
      ~= 1 - 0.7492 = 0.2508.
    answer: "E[M]=200, Var(M)=200, P(M>=210)~=0.2508"
    shortcut_used: ["Poisson sum: rates add", "CLT", "continuity correction >=210 -> 209.5"]
    verify: "abs(400*0.5 - 200) < 1e-9 and abs((1 - st.norm.cdf((209.5-200)/math.sqrt(200))) - 0.2508) < 2e-3"
