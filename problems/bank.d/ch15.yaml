  - id: C15.26
    chapter: 15
    tier: gym_battle
    archetype: "beta moments"
    outcomes: ["2d3", "2b", "2c"]
    distributions: [beta]
    provenance: original
    difficulty: 2
    narrative_hook: "Mock C: a beta-distributed active-ingredient fraction."
    statement: |
      The fraction X of a potion that is active ingredient is Beta(alpha=2,
      beta=3). Find E[X] and Var(X).
    solution: |
      E[X] = alpha/(alpha+beta) = 2/5 = 0.4.
      Var(X) = alpha*beta / [(alpha+beta)^2 (alpha+beta+1)]
      = 6 / (25*6) = 1/25 = 0.04.
    answer: "E=0.4, Var=0.04"
    shortcut_used: ["beta mean alpha/(alpha+beta)", "beta variance"]
    verify: "abs(2/5 - 0.4) < 1e-9 and abs((2*3)/((2+3)**2*(2+3+1)) - 0.04) < 1e-9"

  # ===================== ELITE CHALLENGE (integrative / back-of-exam) =====================

  - id: C15.27
    chapter: 15
    tier: elite_challenge
    archetype: "compound Poisson aggregate + CLT"
    outcomes: ["3d", "3i"]
    distributions: [poisson, exponential, compound, normal]
    provenance: original
    difficulty: 5
    narrative_hook: "Mock A / Gym Battle capstone: the Champion's aggregate cost."
    statement: |
      Daily injuries N ~ Poisson(lambda=4); each recovery cost
      X_i ~ Exponential(theta=5) (thousands), independent. For aggregate
      T = sum_{i=1}^N X_i, find E[T], Var(T), and (normal approximation)
      P(T > 30).
    solution: |
      Compound Poisson. For Exponential(5): E[X]=5, E[X^2]=2 theta^2=50.
      E[T] = lambda E[X] = 4(5) = 20.
      Var(T) = lambda E[X^2] = 4(50) = 200, SD ~= 14.142.
      T is continuous, so NO continuity correction. Approximate T ~ Normal(20,200):
      P(T>30) ~= 1 - Phi((30-20)/14.142) = 1 - Phi(0.707) ~= 1 - 0.7602 = 0.240.
    answer: "E[T]=20, Var(T)=200, P(T>30)~=0.240"
    shortcut_used: ["compound-Poisson E[T]=lambda E[X], Var(T)=lambda E[X^2]", "E[X^2]=2theta^2 for exp", "CLT (continuous: no correction)"]
    verify: "abs(4*5 - 20) < 1e-9 and abs(4*50 - 200) < 1e-9 and abs((1 - st.norm.cdf((30-20)/math.sqrt(200))) - 0.240) < 2e-3"

  - id: C15.28
