  - id: C15.22
    chapter: 15
    tier: gym_battle
    archetype: "superposition of independent Poissons"
    outcomes: ["2d2"]
    distributions: [poisson]
    provenance: original
    difficulty: 3
    narrative_hook: "Mock C: Pidgey and Spearow as superposed Poisson processes."
    statement: |
      Pidgey arrive at rate 2/hr and Spearow at rate 3/hr, independent Poisson
