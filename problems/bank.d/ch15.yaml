# Problem bank — Chapter 15 (Champion's Challenge): Exam strategy & three mock
# exams. This chapter teaches no new mathematics; its problem set is a mixed,
# weight-matched gauntlet that integrates Topics 1-3 (General Probability,
# Univariate, Multivariate). Outcomes therefore span the whole syllabus.
# Schema per problems/bank.yaml header. This file is owned by Chapter 15 only.
# Verify expressions use the names exposed by sims/verify_examples.py
# (math, st=scipy.stats); never __import__. Statements/solutions/answers match
# exactly what ch15_champion.md prints (problem set C15.k + Answer Key).

problems:

  # ===================== ROUTE TRAINERS (recognition-speed mechanics) =====================

  - id: C15.1
    chapter: 15
    tier: route_trainer
    archetype: "Poisson count, 'at least' via complement"
    outcomes: ["2d2"]
    distributions: [poisson]
    provenance: original
    difficulty: 1
    narrative_hook: "Mock A opening flock: Spearow swoop in on Route 1."
    statement: |
      On Route 1, Spearow arrive at an average rate of lambda = 3 per minute
      (Poisson, independent). In one minute, find P(at least 2).
    solution: |
      'Average rate per interval' => Poisson(3); 'at least 2' => complement of
      the low values {0,1}. P(N>=2) = 1 - P(0) - P(1) = 1 - e^(-3) - 3e^(-3)
      = 1 - 4e^(-3) ~= 1 - 0.19915 = 0.8009.
    answer: 0.8009
    shortcut_used: ["Poisson pmf", "at-least via complement of {0,1}"]
    verify: "abs((1 - 4*math.exp(-3)) - 0.8009) < 1e-3"

  - id: C15.2
    chapter: 15
    tier: route_trainer
    archetype: "two-way Bayes / false-positive (low base rate)"
    outcomes: ["1g"]
    distributions: []
    provenance: original
    difficulty: 2
    narrative_hook: "Mock A: the Pokedex flags a Pokemon as a Ghost-type."
    statement: |
      A wild Pokemon is Ghost-type with prior 0.02; the Pokedex flags a true
      Ghost with probability 0.95 and false-flags a non-Ghost with probability
      0.10. It just flagged one. Find P(Ghost | flagged).
    solution: |
      The bar is flipped (want P(Ghost|flag) from P(flag|Ghost)), so this is
      Bayes. P(G|+) = 0.95(0.02) / [0.95(0.02) + 0.10(0.98)]
      = 0.0190 / 0.1170 ~= 0.1624. Despite a 95%-accurate detector the
      posterior is only ~16% — the base-rate effect.
    answer: 0.1624
    shortcut_used: ["Bayes grid"]
    verify: "abs((0.95*0.02)/(0.95*0.02 + 0.10*0.98) - 0.1624) < 1e-3"

  - id: C15.3
    chapter: 15
    tier: route_trainer
    archetype: "gamma-kernel expectation via kernel recognition"
    outcomes: ["2d3", "2b"]
    distributions: [gamma]
    provenance: original
    difficulty: 1
    narrative_hook: "Mock A: a Charizard's flame burns for X minutes."
    statement: |
      A Charizard's flame lasts X minutes with density f(x) = (1/16) x e^(-x/4),
      x > 0. Find E[X].
    solution: |
      The density is proportional to x^(2-1) e^(-x/4), the kernel of a
      Gamma(alpha=2, theta=4). A gamma's mean is alpha*theta, so
      E[X] = alpha*theta = 2*4 = 8 (no integration by parts).
    answer: 8
    shortcut_used: ["gamma kernel recognition", "E[X]=alpha*theta"]
    verify: "abs(2*4 - 8) < 1e-9"

  - id: C15.4
    chapter: 15
    tier: route_trainer
    archetype: "hypergeometric, draws without replacement"
    outcomes: ["2d2"]
    distributions: [hypergeometric]
    provenance: original
    difficulty: 2
    narrative_hook: "Mock B: Misty nets fish from a tank without replacement."
    statement: |
      Misty's tank holds 10 Magikarp and 5 Goldeen. She nets 4 fish at once
      (no replacement). Find P(exactly 2 Goldeen).
    solution: |
      'Without replacement from a finite pool' => hypergeometric.
      P = C(5,2)*C(10,2) / C(15,4) = (10*45)/1365 = 450/1365 ~= 0.3297.
    answer: 0.3297
    shortcut_used: ["hypergeometric pmf"]
    verify: "abs((math.comb(5,2)*math.comb(10,2))/math.comb(15,4) - 0.3297) < 1e-3"

  - id: C15.5
    chapter: 15
    tier: route_trainer
    archetype: "geometric wait-time"
    outcomes: ["2d2"]
    distributions: [geometric]
    provenance: original
    difficulty: 1
    narrative_hook: "Mock B: the slot streak at the Celadon Game Corner."
    statement: |
      At the Celadon Game Corner each pull wins independently with probability
      0.2. Find P(first win on the 4th pull).
    solution: |
      'Number of trials until the first success' => geometric. First success
      on trial 4: (1-p)^3 * p = (0.8)^3 (0.2) = 0.512(0.2) = 0.1024.
    answer: 0.1024
    shortcut_used: ["geometric pmf (1-p)^(k-1) p"]
    verify: "abs((0.8**3)*0.2 - 0.1024) < 1e-9"

  - id: C15.6
    chapter: 15
    tier: route_trainer
    archetype: "normal standardization"
    outcomes: ["2d3"]
    distributions: [normal]
    provenance: original
    difficulty: 1
    narrative_hook: "Mock B: Sabrina's psychic-power reading."
    statement: |
      A psychic-power reading X is Normal(mu=50, sigma^2=64). Find P(X>62)
      using the provided Z-table.
    solution: |
      Standardize: Z = (62 - 50)/8 = 1.5. P(X>62) = 1 - Phi(1.5)
      = 1 - 0.9332 = 0.0668.
    answer: 0.0668
    shortcut_used: ["standardize then 1 - Phi"]
    verify: "abs((1 - st.norm.cdf((62-50)/8)) - 0.0668) < 1e-3"

  - id: C15.7
    chapter: 15
    tier: route_trainer
    archetype: "per-loss exponential deductible, memorylessness"
    outcomes: ["2e", "2f"]
    distributions: [exponential]
    provenance: original
    difficulty: 2
    narrative_hook: "Mock C warm-up quote: a fled Pokemon's gear cost."
    statement: |
      A fled Pokemon's gear cost X ~ Exponential(theta=4) (thousands). With
      ordinary deductible d=2, find the expected payment per loss.
    solution: |
      For an exponential loss with ordinary deductible, the memoryless
      property gives E[(X-d)_+] = theta * e^(-d/theta) = 4 e^(-2/4)
      = 4 e^(-0.5) ~= 2.426 thousand.
    answer: 2.426
    shortcut_used: ["memoryless exponential: E[(X-d)_+]=theta*e^(-d/theta)"]
    verify: "abs(4*math.exp(-2/4) - 2.426) < 1e-3"

  - id: C15.8
    chapter: 15
    tier: route_trainer
    archetype: "equally-likely outcomes, mutually-exclusive union"
    outcomes: ["1a", "1e"]
    distributions: []
    provenance: original
    difficulty: 1
    narrative_hook: "Mock C: two dice on the Game Corner table."
    statement: |
      Roll two fair six-sided dice. Find P(sum = 7 or sum = 11).
    solution: |
      Sum 7: 6 ways; sum 11: 2 ways; the events are disjoint, over 36 equally
      likely outcomes: P = (6+2)/36 = 8/36 ~= 0.2222.
    answer: 0.2222
    shortcut_used: ["count favorable / total; addition rule for disjoint events"]
    verify: "abs((6+2)/36 - 0.2222) < 1e-3"

  - id: C15.9
    chapter: 15
    tier: route_trainer
    archetype: "uniform variance"
    outcomes: ["2d3", "2c"]
    distributions: [uniform]
    provenance: original
    difficulty: 1
    narrative_hook: "Mock C: a Pokemon's roaming distance is uniform."
    statement: |
      A Pokemon's roaming distance X is Uniform(0,10) km. Find Var(X).
    solution: |
      For Uniform(a,b), Var(X) = (b-a)^2 / 12 = (10-0)^2 / 12 = 100/12 ~= 8.333.
    answer: 8.333
    shortcut_used: ["Var of uniform = (b-a)^2/12"]
    verify: "abs((10-0)**2/12 - 8.333) < 1e-3"

  - id: C15.10
    chapter: 15
    tier: route_trainer
    archetype: "MGF kernel recognition"
    outcomes: ["2d"]
    distributions: [normal]
    provenance: original
    difficulty: 2
    narrative_hook: "Mock A: an MGF read-off for a random reward."
    statement: |
      A random reward has MGF M(t) = e^(3t + 2t^2). Identify the distribution
      and find Var.
    solution: |
      Match the normal MGF M(t) = e^(mu t + sigma^2 t^2 / 2): mu = 3 and
      sigma^2/2 = 2 => sigma^2 = 4. The reward is Normal(3, 4), so Var = 4.
    answer: 4
    shortcut_used: ["MGF kernel-match to e^(mu t + sigma^2 t^2/2)"]
    verify: "abs(2*2 - 4) < 1e-9"

  - id: C15.11
    chapter: 15
    tier: route_trainer
    archetype: "exponential memorylessness"
    outcomes: ["2d3"]
    distributions: [exponential]
    provenance: original
    difficulty: 1
    narrative_hook: "Mock B: a fainted Pokemon's memoryless recovery time."
    statement: |
      A fainted Pokemon's recovery time is Exponential(theta=10) minutes. Given
      it has already rested 4 minutes, find P(at least 6 more minutes needed).
    solution: |
      Exponential is memoryless, so the past 4 minutes are irrelevant:
      P(X > 4+6 | X > 4) = P(X > 6) = e^(-6/10) = e^(-0.6) ~= 0.5488.
    answer: 0.5488
    shortcut_used: ["memorylessness: condition drops out"]
    verify: "abs(math.exp(-6/10) - 0.5488) < 1e-3"

  - id: C15.12
    chapter: 15
    tier: route_trainer
    archetype: "ordered count, permutation"
