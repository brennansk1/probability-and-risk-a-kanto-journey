  - id: C9.20
    chapter: 9
    tier: gym_battle
    archetype: "beta mode and a probability via scipy CDF"
    outcomes: ["2d3", "2b"]
    distributions: ["beta"]
    provenance: original
    difficulty: 3
    narrative_hook: "The share of a Saffron blackout that Sabrina's barrier absorbs."
    statement: |
      The absorbed share X is Beta(alpha = 5, beta = 2). Find the mode
      (alpha-1)/(alpha+beta-2), the mean, and P(X > 0.8).
    solution: |
      Mode = (alpha-1)/(alpha+beta-2) = 4/5 = 0.8. Mean = alpha/(alpha+beta)
      = 5/7 ~= 0.7143. Tail: P(X>0.8) = 1 - F(0.8) where F is the Beta(5,2) CDF;
      numerically 1 - 0.65536 = 0.34464.
    answer: "mode=0.8; mean=5/7~=0.7143; P(X>0.8)~=0.3446"
    shortcut_used: ["beta mode formula", "beta mean", "beta tail via CDF"]
    verify: "abs((5-1)/(5+2-2) - 0.8) < 1e-9 and abs(5/7 - 0.71429) < 1e-4 and abs((1 - st.beta.cdf(0.8,5,2)) - 0.34464) < 1e-4"