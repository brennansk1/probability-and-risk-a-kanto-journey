    verify: "abs((40 + 1.645*5) - 48.225) < 1e-3 and abs(st.norm.ppf(0.95) - 1.645) < 1e-2"

  # ===================== GYM BATTLES (true SOA difficulty) =====================

  - id: C9.8
    chapter: 9
    tier: gym_battle
    archetype: "exponential memorylessness: conditional survival and remaining mean"
    outcomes: ["2d3"]
    distributions: ["exponential"]
    provenance: original
    difficulty: 3
    narrative_hook: "A fainted Hypno whose recovery clock refuses to drop."
    statement: |
      A fainted Hypno's recovery time is exponential with mean 20 minutes; it has
      rested 8 minutes. Find the probability it needs more than 15 additional
      minutes, and the expected additional time. (Use memorylessness.)
    solution: |
      theta = 20. Memoryless: the extra wait is a fresh Exponential(20).
      P(extra > 15) = e^{-15/20} = e^{-0.75} = 0.4724.
      Expected additional time = theta = 20 minutes.
    answer: "P(extra>15)=0.4724; expected additional=20 min"
    shortcut_used: ["memorylessness collapses elapsed time", "remaining mean = theta"]
    verify: "abs(math.exp(-15/20) - 0.4724) < 1e-4 and abs(math.exp(-(8+15)/20)/math.exp(-8/20) - math.exp(-15/20)) < 1e-12"

  - id: C9.9
    chapter: 9
    tier: gym_battle
    archetype: "gamma kernel recognition: normalize and read mean"
    outcomes: ["2d3"]
    distributions: ["gamma"]
    provenance: original
    difficulty: 3
    narrative_hook: "Identifying Saffron's interference density from its kernel."
    statement: |
      Saffron's psychic interference X has density f(x) = c x e^{-x/4} for x > 0.
      Find c, identify the named distribution and its parameters, and compute E[X].
    solution: |
      f(x) ∝ x^1 e^{-x/4} is the kernel of a Gamma(alpha = 2, theta = 4).
      Normalize: c = 1/(Gamma(2) 4^2) = 1/16 (since integral_0^inf x e^{-x/4} dx
      = Gamma(2) 4^2 = 16). E[X] = alpha*theta = 2*4 = 8.
    answer: "c=1/16; Gamma(2,4); E[X]=8"
    shortcut_used: ["Master-Ball integral Gamma(alpha)theta^alpha", "gamma mean alpha*theta"]
    verify: "abs(1/(math.gamma(2)*4**2) - 1/16) < 1e-12 and abs(2*4 - 8) < 1e-9"

  - id: C9.10
    chapter: 9
    tier: gym_battle
    archetype: "normal interval and within-2-sigma (68-95-99.7)"
    outcomes: ["2d3"]
    distributions: ["normal"]
    provenance: original
    difficulty: 3
    narrative_hook: "Bracketing Alakazam's surge intensity around its mean."
    statement: |
      Alakazam's surge intensity is X ~ Normal(mu = 100, sigma = 15). Find
      P(85 < X < 130) and the probability the intensity is within 2 standard
      deviations of the mean. (Use Phi(2) = 0.9772, Phi(1) = 0.8413.)
    solution: |
      (85-100)/15 = -1, (130-100)/15 = 2.
      P(85<X<130) = Phi(2) - Phi(-1) = 0.9772 - (1 - 0.8413) = 0.8185.
      Within 2 sigma: 2*Phi(2) - 1 = 2*0.9772 - 1 = 0.9544.
    answer: "P(85<X<130)=0.8185; within 2 sigma=0.9544"
    shortcut_used: ["band = Phi(z2)-Phi(z1)", "within k sigma = 2*Phi(k)-1"]
    verify: "abs((st.norm.cdf(2) - (1 - st.norm.cdf(1))) - 0.8185) < 1e-3 and abs((2*0.9772 - 1) - 0.9544) < 1e-9"

  - id: C9.11
    chapter: 9
    tier: gym_battle
    archetype: "transformation Y=X^2 via cdf method (non-monotone handled)"
    outcomes: ["2d3"]
    distributions: ["uniform"]
    provenance: original
    difficulty: 3
    narrative_hook: "A psychic pulse position squared into a new readout."
    statement: |
      A psychic pulse arrives at position X ~ Uniform(0, 10). Let Y = X^2. Find
      the density f_Y(y) for 0 < y < 100 by the cdf method.
    solution: |
      For 0<y<100, F_Y(y) = P(X^2 <= y) = P(X <= sqrt(y)) = sqrt(y)/10
      (since X ~ Uniform(0,10)). Differentiate:
      f_Y(y) = (1/10)*(1/(2 sqrt(y))) = 1/(20 sqrt(y)), 0 < y < 100.
    answer: "f_Y(y)=1/(20 sqrt(y)), 0<y<100"
    shortcut_used: ["cdf method", "F_Y(y)=F_X(sqrt y) then differentiate"]
    verify: "abs((1/(20*math.sqrt(25))) - (1/10)*(1/(2*math.sqrt(25)))) < 1e-12 and abs((math.sqrt(100)/10 - math.sqrt(0)/10) - 1.0) < 1e-12"

  - id: C9.12
    chapter: 9
