problems:

  # ===================== ROUTE TRAINERS (mechanics) =====================

  - id: C9.1
    chapter: 9
    tier: route_trainer
    archetype: "continuous uniform: band probability, mean, variance"
    outcomes: ["2d3"]
    distributions: ["uniform"]
    provenance: original
    difficulty: 1
    narrative_hook: "Dodging a glitching Porygon that spawns uniformly on a corridor."
    statement: |
      A glitching Porygon spawns at X ~ Uniform(2, 10). Find P(4 < X < 7), and
      state E[X] and Var(X).
    solution: |
      P(4<X<7) = (7-4)/(10-2) = 3/8 = 0.375.
      E[X] = (a+b)/2 = (2+10)/2 = 6.
      Var(X) = (b-a)^2/12 = (10-2)^2/12 = 64/12 = 5.3333.
    answer: "P(4<X<7)=0.375; E[X]=6; Var(X)=64/12=5.3333"
    shortcut_used: ["uniform band = length ratio", "mean midpoint", "variance (b-a)^2/12"]
    verify: "abs((7-4)/(10-2) - 0.375) < 1e-9 and abs((2+10)/2 - 6) < 1e-9 and abs((10-2)**2/12 - 5.3333) < 1e-3"

  - id: C9.2
    chapter: 9
    tier: route_trainer
    archetype: "exponential survival and cdf"
    outcomes: ["2d3"]
    distributions: ["exponential"]
    provenance: original
    difficulty: 1
    narrative_hook: "A Drowzee's hypnosis whose duration is an exponential wait."
    statement: |
      A Drowzee's hypnosis lasts X ~ Exponential(theta = 6) minutes. Find P(X > 6)
      and P(X <= 3).
    solution: |
      S(x) = e^{-x/theta}. P(X>6) = e^{-6/6} = e^{-1} = 0.3679.
      P(X<=3) = 1 - e^{-3/6} = 1 - e^{-0.5} = 0.3935.
    answer: "P(X>6)=0.3679; P(X<=3)=0.3935"
    shortcut_used: ["exponential survival e^{-x/theta}", "cdf 1 - e^{-x/theta}"]
    verify: "abs(math.exp(-6/6) - 0.3679) < 1e-4 and abs((1 - math.exp(-3/6)) - 0.3935) < 1e-4"

  - id: C9.3
    chapter: 9
    tier: route_trainer
    archetype: "normal standardization: left area and right tail"
    outcomes: ["2d3"]
    distributions: ["normal"]
    provenance: original
    difficulty: 1
    narrative_hook: "Reading a Kadabra's idle-energy meter off the Phi table."
    statement: |
      A Kadabra's idle-energy reading is X ~ Normal(mu = 70, sigma = 10). Find
      P(X < 85) and P(X > 60) using Phi(1.5) = 0.9332, Phi(1) = 0.8413.
    solution: |
      P(X<85) = Phi((85-70)/10) = Phi(1.5) = 0.9332.
      P(X>60) = 1 - Phi((60-70)/10) = 1 - Phi(-1) = Phi(1) = 0.8413.
    answer: "P(X<85)=0.9332; P(X>60)=0.8413"
    shortcut_used: ["standardize z=(x-mu)/sigma", "symmetry Phi(-z)=1-Phi(z)"]
    verify: "abs(st.norm.cdf((85-70)/10) - 0.9332) < 1e-3 and abs(st.norm.cdf((70-60)/10) - 0.8413) < 1e-3"

  - id: C9.4
    chapter: 9
    tier: route_trainer
    archetype: "gamma read-off: mean, variance, density"
    outcomes: ["2d3"]
    distributions: ["gamma"]
    provenance: original
    difficulty: 1
    narrative_hook: "Sabrina's spoon-bending duration as a gamma wait."
    statement: |
      Sabrina's spoon-bending duration is X ~ Gamma(alpha = 2, theta = 3) seconds.
      State E[X], Var(X), and write the density f(x).
    solution: |
      E[X] = alpha*theta = 2*3 = 6.
      Var(X) = alpha*theta^2 = 2*9 = 18.
      f(x) = 1/(Gamma(2) 3^2) x^1 e^{-x/3} = (1/9) x e^{-x/3}, x > 0.
    answer: "E[X]=6; Var(X)=18; f(x)=(1/9) x e^{-x/3}"
    shortcut_used: ["gamma mean alpha*theta", "gamma variance alpha*theta^2", "Gamma(2)=1"]
    verify: "abs(2*3 - 6) < 1e-9 and abs(2*3**2 - 18) < 1e-9 and abs(1/(math.gamma(2)*3**2) - 1/9) < 1e-12"

  - id: C9.5
    chapter: 9
    tier: route_trainer
    archetype: "beta moments and tilt direction"
    outcomes: ["2d3"]
    distributions: ["beta"]
    provenance: original
    difficulty: 2
    narrative_hook: "The fraction of a psychic barrier that holds is a beta proportion."
    statement: |
      The fraction X of a psychic barrier that holds is X ~ Beta(alpha = 2,
      beta = 3). Find E[X] and Var(X), and say whether the mean is below or above
      1/2.
    solution: |
      E[X] = alpha/(alpha+beta) = 2/5 = 0.4 (below 1/2, leaning toward 0).
      Var(X) = alpha*beta / ((alpha+beta)^2 (alpha+beta+1))
             = 6 / (25*6) = 6/150 = 0.04.
    answer: "E[X]=0.4 (below 1/2); Var(X)=0.04"
    shortcut_used: ["beta mean alpha/(alpha+beta)", "beta variance formula"]
    verify: "abs(2/(2+3) - 0.4) < 1e-9 and abs((2*3)/((2+3)**2*(2+3+1)) - 0.04) < 1e-9 and 2/(2+3) < 0.5"

  - id: C9.6
