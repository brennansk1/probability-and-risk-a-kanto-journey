  - id: C9.14
    chapter: 9
    tier: gym_battle
    archetype: "transformation Y=2X via Jacobian method (scaled exponential)"
    outcomes: ["2d3"]
    distributions: ["exponential"]
    provenance: original
    difficulty: 3
    narrative_hook: "A teleport delay shown at double scale on the display."
    statement: |
      A teleport delay is X ~ Exponential(theta = 4). The display shows Y = 2X.
      Find the density of Y and its mean by the Jacobian method.
    solution: |
      Y = 2X => x = y/2, |dx/dy| = 1/2.
      f_Y(y) = f_X(y/2)*(1/2) = (1/4) e^{-(y/2)/4} * (1/2) = (1/8) e^{-y/8}.
      So Y ~ Exponential(theta = 8) and E[Y] = 8 (matches E[2X] = 2*4).
    answer: "Y~Exponential(8); E[Y]=8"
    shortcut_used: ["Jacobian f_Y=f_X(g^{-1})|dx/dy|", "scaling exponential by 2 -> theta*2"]
    verify: "abs((1/4)*math.exp(-(8/2)/4)*(1/2) - (1/8)*math.exp(-8/8)) < 1e-12 and abs(2*4 - 8) < 1e-9"

  - id: C9.15
    chapter: 9
    tier: gym_battle
    archetype: "recover normal mu and sigma from two percentiles"
    outcomes: ["2d3"]
    distributions: ["normal"]
    provenance: original
    difficulty: 4
    narrative_hook: "Pinning down Sabrina's peak-power law from two quantiles."
    statement: |
      Sabrina's daily peak-power reading is Normal(mu, sigma^2). You observe
      P(X < 58) = 0.2 and P(X < 82) = 0.9. Solve for mu and sigma. (Use
      Phi^{-1}(0.2) = -0.84, Phi^{-1}(0.9) = 1.28.)
    solution: |
      58 = mu - 0.84 sigma and 82 = mu + 1.28 sigma.
      Subtract: 24 = 2.12 sigma => sigma = 11.32.
      Then mu = 58 + 0.84(11.32) = 67.51 ~= 67.5.
    answer: "mu=67.5; sigma=11.32"
    shortcut_used: ["x = mu + z*sigma at each percentile", "subtract to isolate sigma"]
    verify: "abs(24/2.12 - 11.32) < 1e-2 and abs((58 + 0.84*(24/2.12)) - 67.5) < 0.05"

  # ===================== ELITE CHALLENGE (integrative / stretch) =====================

  - id: C9.16
    chapter: 9
    tier: elite_challenge
    archetype: "integrative: linear map of normal + tail + memorylessness + independence"
    outcomes: ["2d3"]
    distributions: ["normal", "exponential"]
    provenance: original
    difficulty: 4
    narrative_hook: "Timing an action window against Alakazam's amplified surge and a teammate's recovery."
    statement: |
      Alakazam's base intensity is X ~ Normal(100, 15^2), and her amplifier
      outputs Y = 0.8X + 30. A teammate's recovery is T ~ Exponential(theta = 10),
      already running 4 minutes. (a) Find the distribution of Y and P(Y > 120)
      (use Phi(0.83) = 0.7967). (b) Find P(T > 10 | T > 4) and the expected
      remaining recovery. (c) If you may act only when both "Y <= 120" and "T lasts
      >= 6 more minutes" occur (independently), find the probability you get your
      window.
    solution: |
      (a) Y = 0.8X + 30 ~ Normal(0.8*100+30, 0.8^2*225) = Normal(110, 144),
          sigma_Y = 12. P(Y>120) = 1 - Phi((120-110)/12) = 1 - Phi(0.83)
          = 1 - 0.7967 = 0.2033.
      (b) Memoryless: P(T>10 | T>4) = P(T>6) = e^{-6/10} = e^{-0.6} = 0.5488;
          expected remaining = theta = 10 minutes.
      (c) Independent: P(Y<=120)*P(T>10 | T>4) = (1 - 0.2033)(0.5488)
          = 0.7967*0.5488 = 0.4372.
    answer: "(a) Y~Normal(110,144), P(Y>120)=0.2033; (b) 0.5488, 10 min; (c) 0.4372"
    shortcut_used: ["linear rule Normal(a*mu+b, a^2*sigma^2)", "memorylessness", "independence multiplies"]
    verify: "abs(0.8*100+30 - 110) < 1e-9 and abs(0.8**2*225 - 144) < 1e-9 and abs(math.exp(-6/10) - 0.5488) < 1e-4 and abs((1-0.2033)*0.5488 - 0.4372) < 1e-3"

  - id: C9.17
    chapter: 9
    tier: elite_challenge
    archetype: "Rayleigh-type: density from cdf, median, and X^2 is exponential"
    outcomes: ["2d3"]
    distributions: ["exponential"]
    provenance: original
    difficulty: 4
    narrative_hook: "A surge whose squared magnitude turns out memoryless."
    statement: |
      A continuous surge X has cdf F(x) = 1 - e^{-(x/3)^2} for x > 0. (a) Find
      f(x). (b) Find the median m (with F(m) = 0.5). (c) Show W = X^2 is
      exponential and give its mean.
    solution: |
      (a) f(x) = F'(x) = e^{-(x/3)^2} * (2x/9) = (2x/9) e^{-x^2/9}, x > 0.
      (b) F(m) = 0.5 => e^{-(m/3)^2} = 0.5 => (m/3)^2 = ln 2
          => m = 3*sqrt(ln 2) = 3(0.8326) = 2.498.
      (c) W = X^2: P(W<=w) = P(X<=sqrt w) = 1 - e^{-(sqrt w/3)^2} = 1 - e^{-w/9},
          so W ~ Exponential(theta = 9) and E[W] = 9.
    answer: "(a) (2x/9)e^{-x^2/9}; (b) m=2.498; (c) W~Exponential(9), E[W]=9"
    shortcut_used: ["f = F'", "median from F(m)=0.5", "cdf method to identify Exponential"]
    verify: "abs(3*math.sqrt(math.log(2)) - 2.498) < 1e-3 and abs((1 - math.exp(-9/9)) - (1 - math.exp(-(math.sqrt(9)/3)**2))) < 1e-12"

  - id: C9.18
    chapter: 9
    tier: elite_challenge
    archetype: "gamma as sum of exponentials: moments and integer-shape cdf"
    outcomes: ["2d3"]
    distributions: ["gamma", "exponential"]
    provenance: original
    difficulty: 4
    narrative_hook: "Three teleport ticks stacked into a single gamma wait."
    statement: |
      The sum S = T1 + T2 + T3 of three independent Exponential(theta = 2) waits.
      (a) Name the distribution of S and give E[S], Var(S). (b) Using the gamma
      cdf, evaluate P(S < 2). (c) Compare E[S] to a single Exponential(2) mean and
      explain.
    solution: |
      (a) S ~ Gamma(alpha = 3, theta = 2). E[S] = alpha*theta = 6;
          Var(S) = alpha*theta^2 = 12.
      (b) Integer-shape gamma cdf:
          P(S<2) = 1 - e^{-2/2}(1 + 2/2 + (2/2)^2/2) = 1 - e^{-1}(1 + 1 + 0.5)
                 = 1 - 2.5 e^{-1} = 1 - 0.9197 = 0.0803.
      (c) E[S] = 6 = 3 * E[Exponential(2)]: the mean of a sum of 3 exponentials
          is 3 times the single-wait mean of 2, since means add.
    answer: "(a) Gamma(3,2), E=6, Var=12; (b) 0.0803; (c) means add (6 = 3*2)"
    shortcut_used: ["sum of exponentials is gamma", "means/independent variances add", "integer-shape gamma cdf via Poisson sum"]
    verify: "abs(3*2 - 6) < 1e-9 and abs(3*2**2 - 12) < 1e-9 and abs((1 - 2.5*math.exp(-1)) - 0.0803) < 1e-4"

