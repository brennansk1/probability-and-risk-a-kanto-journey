    shortcut_used: ["negbin mean rq/p plus r", "locked last success: C(k+r-1,k)"]
    verify: "abs((4*0.4/0.6 + 4) - 6.6667) < 1e-3 and abs(math.comb(5,2)*0.6**4*0.4**2 - 0.20736) < 1e-5"

  - id: C8.15
