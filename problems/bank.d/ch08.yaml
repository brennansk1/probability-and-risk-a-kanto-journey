# Problem bank — Chapter 8 (Bill's lighthouse / the HM "Calculus"): the calculus
# prerequisites the SOA silently assumes. Differentiation (rules, modes,
# L'Hopital), integration (u-sub, improper over [0, inf)), integration by parts
# (tabular), and the gamma integral (the "Master Ball of integrals"). Outcome:
# prereq. Tier-C chapter. Locale: Bill's lighthouse / a training montage (no gym,
# no badge — the HM you acquire to enter the continuous wilds).
#
# Schema per problem (MASTER_PLAN_V3 §22, §28):
#   id, chapter, tier (route_trainer|gym_battle|elite_challenge),
#   archetype (audit|rival_trap|decision|standard), outcomes, distributions,
#   provenance, difficulty (1-5), actor, stakes, consequence, quest_step,
#   tia_section, narrative_hook, statement, solution, answer, shortcut_used, verify.
#
# verify: a SELF-CONTAINED Python boolean the seed-151 harness can eval (exposes
# math, st (scipy.stats), __import__). Chained problems RESTATE the prior value as a
# given so verify never depends on another problem's answer.
#
# This is a calculus prerequisite chapter with NO probability distribution, so the
# structural `distributions` tag is `none` / `other` throughout (per the ch08
# blueprint row: "tag structural none/other (calculus, no distribution)"). All
# outcomes are ["prereq"].
#
# Immersion quotas met: audit >=3 (C8.8, C8.10, C8.18); rival_trap >=2 (C8.13,
# C8.14); decision >=1 (C8.14, C8.17). The canonical Team-Rocket error (gamma
# off-by-one on alpha) is recycled into the audit drill C8.8.

problems:

  # ===================== ROUTE TRAINERS (the early legs) =====================

  - id: C8.1
    chapter: 8
    tier: route_trainer
    archetype: standard
    outcomes: ["prereq"]
    distributions: ["none"]
    provenance: original
    difficulty: 1
    actor: "a foraging Caterpie"
    stakes: "Bill wants the Caterpie's lifetime-foraging integral before the door will budge."
    consequence: "A wrong integral leaves the lighthouse model uncalibrated and the door shut."
    quest_step: 1
    tia_section: "B.0.2 (gamma integral)"
    narrative_hook: "Evaluating a power-times-exponential integral the Master-Ball way."
    statement: |
      Evaluate integral_0^inf x^2 e^{-x} dx.
    solution: |
      Gamma shape: power on x is 2, so alpha = 2 + 1 = 3; scale theta = 1.
      integral = Gamma(3) * 1^3 = 2! = 2.
    answer: "2"
    shortcut_used: ["gamma integral Gamma(alpha) theta^alpha", "alpha = power + 1", "Gamma(3) = 2! = 2"]
    verify: "abs(math.gamma(3)*1**3 - 2) < 1e-9"

  - id: C8.2
    chapter: 8
