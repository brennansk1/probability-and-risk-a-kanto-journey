problems:

  # ===================== ROUTE TRAINERS (mechanics) =====================

  - id: C8.1
    chapter: 8
    tier: route_trainer
    archetype: "binomial mean and all-successes probability"
    outcomes: ["2d2"]
    distributions: ["binomial"]
    provenance: original
    difficulty: 1
    narrative_hook: "Battling a trainer's 6 Pokemon one at a time on Route 7."
    statement: |
      You battle 6 Pokemon one at a time; each round you win independently with
      probability 0.7. Find the expected number of wins, and the probability you
      win all six.
    solution: |
      X ~ Binomial(6, 0.7). E[X] = np = 6(0.7) = 4.2.
      P(X=6) = 0.7^6 = 0.117649 ~= 0.1176.
    answer: "E[X]=4.2; P(all six)=0.1176"
    shortcut_used: ["binomial mean np", "all-success = p^n (single arrangement)"]
    verify: "abs(6*0.7 - 4.2) < 1e-9 and abs(0.7**6 - 0.1176) < 1e-4"

  - id: C8.2
    chapter: 8
    tier: route_trainer
    archetype: "geometric, trials convention: mean and exact-trial probability"
    outcomes: ["2d2"]
    distributions: ["geometric"]
    provenance: original
    difficulty: 1
    narrative_hook: "Throwing at a wild Bellsprout until it flees."
    statement: |
      A wild Bellsprout flees on each throw with probability 0.4, independently;
      you throw until it flees. With X = the throw on which it flees, find E[X]
      and P(X=3).
    solution: |
      X ~ Geom(0.4), trials version. E[X] = 1/p = 1/0.4 = 2.5.
      P(X=3) = q^2 p = 0.6^2 (0.4) = 0.36(0.4) = 0.144.
    answer: "E[X]=2.5; P(X=3)=0.144"
    shortcut_used: ["geometric mean 1/p", "p(k)=q^(k-1) p"]
    verify: "abs(1/0.4 - 2.5) < 1e-9 and abs(0.6**2 * 0.4 - 0.144) < 1e-9"

  - id: C8.3
    chapter: 8
    tier: route_trainer
    archetype: "discrete uniform mean and variance"
    outcomes: ["2d2"]
    distributions: ["discrete_uniform"]
    provenance: original
    difficulty: 1
    narrative_hook: "Game Corner roulette with 18 equally likely slots."
    statement: |
      The Game Corner roulette has 18 numbered slots, each equally likely. Let X
      be the landing slot, discrete uniform on {1,...,18}. Find E[X] and Var(X).
    solution: |
      m = 18. E[X] = (m+1)/2 = 19/2 = 9.5.
      Var(X) = (m^2 - 1)/12 = (324 - 1)/12 = 323/12 = 26.9167.
    answer: "E[X]=9.5; Var(X)=323/12=26.9167"
    shortcut_used: ["discrete uniform mean (m+1)/2", "variance (m^2-1)/12"]
    verify: "abs((18+1)/2 - 9.5) < 1e-9 and abs((18**2-1)/12 - 26.9167) < 1e-3"

  - id: C8.4
    chapter: 8
    tier: route_trainer
    archetype: "Poisson single window, exact masses"
    outcomes: ["2d2"]
    distributions: ["poisson"]
    provenance: original
    difficulty: 1
    narrative_hook: "Gastly drifting through the Tower window at 1.5 per minute."
    statement: |
      Gastly drift through the window at an average rate lambda = 1.5 per minute
      (Poisson). For a single minute, find P(exactly 0) and P(exactly 2).
    solution: |
      lambda = 1.5. P(0) = e^{-1.5} = 0.2231.
      P(2) = e^{-1.5}(1.5)^2/2! = 0.2231(2.25)/2 = 0.2510.
    answer: "P(0)=0.2231; P(2)=0.2510"
    shortcut_used: ["Poisson pmf e^{-lambda} lambda^k / k!"]
    verify: "abs(math.exp(-1.5) - 0.2231) < 1e-4 and abs(math.exp(-1.5)*1.5**2/2 - 0.2510) < 1e-4"

  - id: C8.5
    chapter: 8
