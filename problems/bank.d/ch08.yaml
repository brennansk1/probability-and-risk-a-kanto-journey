    quest_step: 7
    tia_section: "B.0.2 (gamma integral)"
    narrative_hook: "Evaluating Bill's cold-open lighthouse integral in one line."
    statement: |
      For integral_0^inf x^3 e^{-x/theta} dx with scale theta = 2, evaluate the
