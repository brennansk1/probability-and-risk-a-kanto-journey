  - id: C8.3
    chapter: 8
    tier: route_trainer
    archetype: standard
    outcomes: ["prereq"]
    distributions: ["none"]
    provenance: original
    difficulty: 1
    actor: "Bill's intensity calibrator"
    stakes: "The encounter density must integrate to 1 before it can be used at all."
    consequence: "An un-normalized density makes every probability it reports meaningless."
    quest_step: 3
    tia_section: "B.0.2 (improper integral, normalize, survival)"
    narrative_hook: "Forcing total area to 1 to find a normalizing constant, then its survival tail."
    statement: |
      Find the constant c making f(x) = c e^{-x/7} (x > 0) a valid density, and
      write the survival S(t) = P(X > t).
    solution: |
      integral_0^inf e^{-x/7} dx = 7, so 7c = 1 and c = 1/7. Survival:
      S(t) = integral_t^inf (1/7) e^{-u/7} du = e^{-t/7} (note S(0) = 1).
    answer: "c = 1/7; S(t) = e^{-t/7}"
    shortcut_used: ["integral_0^inf e^{-x/theta} dx = theta", "normalize: int f = 1", "survival e^{-t/theta}"]
    verify: "abs(1/7 - 1/7) < 1e-12 and abs(math.exp(-0/7) - 1) < 1e-12 and abs(7*(1/7) - 1) < 1e-12"

  - id: C8.4
    chapter: 8
    tier: route_trainer
    archetype: standard
    outcomes: ["prereq"]
    distributions: ["none"]
    provenance: original
    difficulty: 2
    actor: "a wild encounter curve"
    stakes: "You need the single most likely value of the encounter density to set the catch trap."
    consequence: "Set the trap off the peak and the most-common encounter slips past."
    quest_step: 4
    tia_section: "B.0.1 (differentiation, modes)"
    narrative_hook: "Finding a density's mode by setting the derivative to zero."
    statement: |
      A wild encounter density is f(x) = (1/4) x e^{-x/2} for x > 0. Find the mode
      (the most likely value) by optimization.
    solution: |
      Product + chain rule: f'(x) = (1/4) e^{-x/2} (1 - x/2). Since e^{-x/2} > 0,
      f' = 0 requires 1 - x/2 = 0, so x = 2. Sign of f' goes + to -, a maximum.
      Mode = 2.
    answer: "mode = 2"
    shortcut_used: ["mode: solve f'(x) = 0", "product rule + chain rule", "e^{-x/2} > 0 never zero"]
    verify: "abs(2 - 2) < 1e-12 and (1 - 2/2) == 0"

  - id: C8.5
    chapter: 8
    tier: route_trainer
    archetype: standard
    outcomes: ["prereq"]
    distributions: ["none"]
    provenance: original
    difficulty: 1
    actor: "a recovery clock"
    stakes: "Bill wants the chance a recovery wait runs past time t, as a clean formula."
    consequence: "Confuse survival with the cdf and every long-wait estimate is inverted."
    quest_step: 5
    tia_section: "B.0.2 (improper integral, survival vs cdf)"
    narrative_hook: "Integrating an exponential tail to a survival function and checking the endpoints."
    statement: |
      Compute the survival probability S(t) = integral_t^inf (1/4) e^{-u/4} du as a
      formula in t, and state S(0).
    solution: |
      S(t) = [-e^{-u/4}]_t^inf = 0 - (-e^{-t/4}) = e^{-t/4}. S(0) = e^0 = 1
      (a survival function starts at 1; this is NOT the cdf 1 - e^{-t/4}).
    answer: "S(t) = e^{-t/4}; S(0) = 1"
    shortcut_used: ["survival tail integral", "endpoint test S(0)=1, S(inf)=0", "survival vs cdf"]
    verify: "abs(math.exp(-0/4) - 1) < 1e-12 and abs(math.exp(-4/4) - math.exp(-1)) < 1e-12"

  - id: C8.6
    chapter: 8
    tier: route_trainer
    archetype: standard
    outcomes: ["prereq"]
    distributions: ["none"]
    provenance: original
    difficulty: 2
    actor: "a tangled integrand"
    stakes: "An integral looks ugly until you spot the inside function hiding in it."
    consequence: "Miss the substitution and you waste minutes on a non-elementary-looking integral."
    quest_step: 6
    tia_section: "B.0.2 (u-substitution)"
    narrative_hook: "Collapsing an integral by spotting g'(x) sitting beside g(x)."
    statement: |
      Evaluate integral_0^1 y^2 e^{y^3} dy by u-substitution.
    solution: |
      Inside function g = y^3 has derivative 3y^2, which is (up to 1/3) in the
      integrand. Let u = y^3, du = 3y^2 dy. Then integral = (1/3) integral_0^1 e^u du
      = (1/3)(e - 1) = 0.5728.
    answer: "(1/3)(e - 1) = 0.5728"
    shortcut_used: ["u-substitution reverses the chain rule", "u = y^3, du = 3y^2 dy"]
    verify: "abs((1/3)*(math.e - 1) - 0.5728) < 1e-3"

  # ===================== GYM BATTLES (true exam difficulty) =====================

  - id: C8.7
    chapter: 8
    tier: gym_battle
    archetype: standard
    outcomes: ["prereq"]
    distributions: ["none"]
    provenance: original
    difficulty: 2
    actor: "Bill's locked monitor"
