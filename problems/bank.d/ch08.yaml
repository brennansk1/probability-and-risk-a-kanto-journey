    archetype: "hypergeometric exact mass"
    outcomes: ["2d2"]
    distributions: ["hypergeometric"]
    provenance: original
    difficulty: 2
    narrative_hook: "Pulling 4 items at once from a 10-item grab-bag."
    statement: |
      A grab-bag holds 10 items: 3 rare TMs and 7 Potions. You pull 4 at once
      (without replacement). Find the probability exactly 2 are TMs.
    solution: |
      N=10, K=3, n=4. C(10,4)=210.
      P(X=2) = C(3,2) C(7,2) / C(10,4) = (3)(21)/210 = 63/210 = 0.3000.
    answer: "0.3000"
    shortcut_used: ["hypergeometric counting C(K,k)C(N-K,n-k)/C(N,n)"]
    verify: "abs(math.comb(3,2)*math.comb(7,2)/math.comb(10,4) - 0.30) < 1e-9"

  - id: C8.6
