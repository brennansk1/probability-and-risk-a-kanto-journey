  # ===================== GYM BATTLES (true SOA difficulty) =====================

  - id: C8.7
    chapter: 8
    tier: gym_battle
    archetype: "binomial-to-Poisson approximation, tail by complement"
    outcomes: ["2d2"]
    distributions: ["binomial", "poisson"]
    provenance: original
    difficulty: 3
    narrative_hook: "Misty pulls a low-payout slot 40 times."
    statement: |
      A slot pays out on each pull with probability p = 0.05; Misty pulls 40
      times. Using the Poisson approximation, estimate P(at least two payouts),
      and state whether it over- or under-estimates the true binomial tail.
    solution: |
      lambda = np = 40(0.05) = 2. P(X>=2) = 1 - e^{-2} - 2e^{-2} = 1 - 3e^{-2}
      = 1 - 0.40601 = 0.5940. The Poisson over-estimates the binomial tail:
      binomial variance npq = 1.9 < 2 makes it slightly more concentrated.
    answer: "0.5940 (Poisson over-estimates)"
    shortcut_used: ["Bin(n,p) ~ Pois(np)", "P(>=2)=1-P(0)-P(1)"]
    verify: "abs((1 - math.exp(-2) - 2*math.exp(-2)) - 0.5940) < 1e-4"

  - id: C8.8
    chapter: 8
    tier: gym_battle
    archetype: "Poisson rescaled to a sub-hour window"
    outcomes: ["2d2"]
    distributions: ["poisson"]
    provenance: original
    difficulty: 3
    narrative_hook: "Calls to the Pokemon Center while Nurse Joy steps away."
    statement: |
      Calls arrive Poisson at 4 per hour. Nurse Joy steps away for 15 minutes.
      Find P(at least one call) and P(exactly three).
    solution: |
      Rate 4/hr over 0.25 hr -> lambda = 1.
      P(>=1) = 1 - e^{-1} = 0.6321. P(=3) = e^{-1} (1)^3/3! = 0.3679/6 = 0.0613.
    answer: "P(>=1)=0.6321; P(=3)=0.0613"
    shortcut_used: ["rescale lambda = rate * window", "P(>=1)=1-P(0)"]
    verify: "abs((1 - math.exp(-1)) - 0.6321) < 1e-4 and abs(math.exp(-1)/math.factorial(3) - 0.0613) < 1e-4"

  - id: C8.9
    chapter: 8
    tier: gym_battle
    archetype: "hypergeometric mean and variance vs binomial"
    outcomes: ["2d2"]
    distributions: ["hypergeometric", "binomial"]
    provenance: original
    difficulty: 3
    narrative_hook: "Drawing dual types from Erika's tournament bed."
    statement: |
      In a bed of N = 15 Pokemon, K = 5 are dual types; Erika draws n = 4 without
      replacement. Let X be the dual types drawn. Find E[X] and Var(X), and
      compare Var(X) to a binomial model.
    solution: |
      E[X] = nK/N = 4(5)/15 = 1.3333.
      Var(X) = n (K/N)(1-K/N)(N-n)/(N-1) = 4(1/3)(2/3)(11/14) = 0.6984.
      Binomial p=1/3 gives npq = 4(1/3)(2/3) = 0.8889, larger; correction
      11/14 = 0.7857 shrinks it.
    answer: "E[X]=1.3333; Var(X)=0.6984 (< binomial 0.8889)"
    shortcut_used: ["hypergeometric mean nK/N", "finite-population correction (N-n)/(N-1)"]
    verify: "abs(4*5/15 - 1.3333) < 1e-3 and abs(4*(5/15)*(10/15)*(11/14) - 0.6984) < 1e-3"

  - id: C8.10
    chapter: 8
