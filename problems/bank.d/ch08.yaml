    archetype: "recover binomial parameters from moments"
    outcomes: ["2d2"]
    distributions: ["binomial"]
    provenance: original
    difficulty: 4
    narrative_hook: "Reverse-engineering a binomial from its mean and variance."
    statement: |
      A binomial X ~ Binomial(n, p) has E[X] = 6 and Var(X) = 4.2. Recover n and
      p, then find P(X = 0).
    solution: |
      np = 6, npq = 4.2 => q = 4.2/6 = 0.7, so p = 0.3 and n = 6/0.3 = 20.
      P(X=0) = q^20 = 0.7^20 = 0.000798.
    answer: "n=20, p=0.3; P(X=0)=0.000798"
    shortcut_used: ["q = Var/E", "n = E/p"]
    verify: "abs(4.2/6 - 0.7) < 1e-9 and abs(6/0.3 - 20) < 1e-9 and abs(0.7**20 - 0.000798) < 1e-5"

